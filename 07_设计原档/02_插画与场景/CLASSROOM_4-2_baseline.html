<!DOCTYPE html>
<html lang="zh">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#F0EBE3;color:#2A2018;padding:24px 16px 48px}
h1{font-family:'Noto Serif JP',serif;font-size:20px;text-align:center;letter-spacing:.06em}
.sub{text-align:center;font-size:11px;color:#8A7860;margin:6px 0 20px}
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1px solid #C8B8A8;border-radius:20px;background:#FBF7F2;cursor:pointer;font-size:12px}
.tab.on{background:#3A5A3A;color:#F5F0E8;border-color:#3A5A3A}
.panel{display:none;max-width:960px;margin:0 auto}
.panel.on{display:block}
.card{background:#FBF7F2;border:1px solid #E0D5C5;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(60,40,20,.08)}
.card h2{font-size:13px;color:#3A5A3A;margin-bottom:10px;border-bottom:1px solid #E8DFD4;padding-bottom:6px}
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:10px;margin-top:12px;color:#6A5A4A}
.legend i{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle}
svg{width:100%;height:auto;display:block}
.note{font-size:10px;color:#8A7060;line-height:1.7;margin-top:10px}
.scale{font-size:10px;fill:#8A7060}
.char{font-size:9px;font-weight:700}
</style>
</head>

<script>

  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');

});
</script>
