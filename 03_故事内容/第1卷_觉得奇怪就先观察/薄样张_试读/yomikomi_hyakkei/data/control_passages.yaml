# 对照样本 · 面板健康检测用
version: "1.0.0"

passages:
  - id: CTRL_SLOW_01
    label: 已知拖沓段
    purpose: detect_dropout_sensitivity
    text: |
      この段落は、同じ説明を三ページにわたって繰り返します。
      観察クラブの活動について、もう一度、詳しく、長く説明します。
      読者はここで眠くなるはずです。事件も謎も進みません。
    expected_signals:
      child_experience:
        skip_risk_min: 7
        continue_will_max: 4
      pro_diagnosis:
        structure_pace_min: 7

  - id: CTRL_UNFAIR_01
    label: 已知线索不公平段
    purpose: detect_mystery_fairness
    text: |
      犯人は、これまで一度も登場していない人物でした。
      しかも、読者に見せられていない日記だけが決定的な手がかりでした。
    expected_signals:
      child_experience:
        puzzle_engagement_max: 4
      pro_diagnosis:
        mystery_fairness_min: 8
