没出声——\n\n\n全校广播忽然响了。\n\n\n是 **他的声音**。\n\n\n「水野根本不该参加。」\n\n\n光站在讲台前，嘴还张着——只有气声。声音却从天花板上的喇叭里下来，盖过一切。\n\n\n有人小声：「保健室不是说他 **不能说话** 吗？」\n\n\n教室静了一秒。然后像有人把锅掀开。\n\n\n全班都穿着 **上履き** —— 地板不留室外鞋印。四月的光从铝窗斜进，把讲台和后排切成两半。\n\n\n「就是光！」「他刚才说的！」「水野在后排——」\n\n\n有人回头去看水野。她没抬头，只把节目单对折的角压平。纸边白得刺眼。\n\n\n窗缝灌进来四月的风。黑板槽里还留着昨天展示膜测试的细灰。光站在讲台前，手不知道往哪放——袖口 **禁声回执** 露出一角，像一张还没撕掉的标签。\n\n\n陸珣没看光的脸。他看的是讲台旁 **播音台屏幕** —— 一行小字在跳：PLAY · 三周前彩排录音（像提前录好的带子）\n\n\n光的嘴唇 **没有动** 完那一句。甚至还没动。广播里的声音明亮、完整，甚至带着笑——和光今天 **说不出话** 的样子，对不上。\n\n\n本子：**广播 · 光声 · 唇不同步**。\n\n\n广播里又「滋」了一声。\n\n\n「……根本不该参加。」\n\n\n同一句话重复了一遍。最后一排翻书的声音都停了。\n\n\n水野真帆坐在靠窗第二列。她没有抬头，只把手中的节目单对折了一次，又对折了一次。纸边压得很整齐，几乎看不出她的指尖在抖。\n\n\n光用气声挤出两个字：「……不是我。」\n\n\n他昨天下午还在保健室登记——不是「喊哑了」，是医嘱禁声。可扬声器里的声音明亮、完整。\n\n\n有人小声说：「但就是你的声音。」\n\n\n另一边立刻有人接上：「上周你不是还说，她不适合做广播吗？」\n\n\n第三个人没有说话，只把椅子向水野那边挪远了一点。\n\n\n班主任从门口走进来，抬手关掉教室广播。\n\n\n「午休前，先不要传播未经确认的说法。」她看了看光，也看了看其他人，「广播委员和器材负责人一起检查。伊藤，在查清楚之前，你先不要碰放送设备。」\n\n\n光张了张嘴。只有气声。没有人再笑他的嗓子——大家已经在心里说完了。\n\n\n加藤慧美从5年1組那边挤过来，笔记本已经翻开。她没写「犯人」。浅黄开衫、银框眼镜，低马尾别着细发带；志郎矮壮，绿格衫外是绿背心，已蹲到讲台侧查线；光白T配橙红导播背心，袖口禁声回执露着角。\n\n\n「观察社写趣事，不写审判。」\n\n\n松本志郎蹲下去查线：「谁按的播放？日志！」\n\n\n光脸色发白。他喉咙发紧，只能挤出气声：「……不是我按的。」旁边有人看见他袖口别着的保健室回执——今日禁声。\n\n\n后排，5年1組的水野真帆 **低着头**。她没有站起来。也没有反驳。像把自己缩进椅背里。\n\n\n陸珣在两三步外。他 **不急着站队**。先在本子画：水野 · 后排 · 未开口。\n\n\n他同时记下另一格：播音台屏幕 · PLAY · 三周前彩排录音（像提前录好的带子）。名字里有个日期，像一枚还没被读出来的钉。\n\n\n志郎已经蹲到讲台侧边的插座旁，手指沿电源线摸过去：「线没断。是 **平板** 在播。」\n\n\n光用气声比出「不是我按的」。慧美在 **已确认** 栏写：广播响起 · 光 **禁声** · 唇不同步 · 播放源为平板。她 **没写**「光说的」。\n\n\n侧廊有人小声：「又是观察社帮光说话吧。」\n\n\n慧美听见了，笔尖停在一格：**听说** —— 还没升格成 **已确认**。\n\n\n班主任敲讲台：「公开日彩排，还有四十分钟。」\n\n\n又看光：「午休前把这件事 **说明白**。否则……」\n\n\n没说完。意思都在 **导播协助** 的小徽上。\n\n\n**事件钟**：四十分钟后，彩排开始。\n\n**社交钟**：午休前，光可能失去协助资格。\n\n\n光想喊「我没说」。嗓子只出来一点嘶沙的气声——医嘱还在。慧美摇头，指了指他袖口禁声的回执。志郎已经抱着平板往器材车跑。\n\n\n水野真帆仍不开口。肩缩在椅背里，像怕一开口，大家就更相信广播里那句。\n\n\n午间休息前，观察社围住了移动媒体器材车。\n\n\n志郎把平板递过来。波形图在屏幕上像一排矮墙。\n\n\n陸珣指左上角：三月二十八日 · 三周前彩排录音\n\n\n「三周前。」慧美轻声。不是今天的现场录音。\n\n\n光闭了闭眼：「排练……我确实说过 **类似** 的话。」\n\n\n「类似？」志郎抬头。\n\n\n「迟到的人……不该参加今天的彩排。」光用气声挤出几个字，像怕嗓子裂开，「三周前……排练时说的。今天……我说不出。」\n\n\n慧美在 **听说** 栏打了圈。没有写进 **已确认**。\n\n\n平板屏幕上有十七段录音。名字乱得像把一盒字母倒在桌上。志郎从车后爬出来：「不是文件夹——像谁在喊救命。」\n\n\n水野把器材车从放送室推到五年二班，是因为公开日的班级展示要测试声音。她插上电源，旧平板自动连接了音箱。之后她去职员室拿审批表，广播就在无人操作的情况下响了。\n\n\n志郎调出平板 **播放队列**。最上面一行灰字：「继续上次 · 未发送项 · 1」。\n\n\n「自动播放？」志郎蹲下检查插座，「平板恢复供电后，有可能继续上次没播完的队列。」\n\n\n慧美问水野：「你插电源时，屏幕亮了吗？」\n\n\n水野声音很轻：「亮了一下。我以为在 **连接** ……就去拿表了。」\n\n\n陸珣画：旧文件 · 新播放 · 无人按键。\n\n\n志郎把波形放大。在「不该参加」前面，有一刀硬切 —— 像被剪刀剪过，上一段尾巴断在奇怪的位置，下一段突然起振。\n\n\n两段波峰像同一把剪刀剪出来的。「重复了。」志郎说，「不是人刚好吸得一样——是同一段录音被用了两次。」\n\n\n第三遍，他们戴上耳机。背景里传来一声短短的电子提示音：「施工车辆请从东门进入——」\n\n\n声音只露出半秒，就被光的说话声盖住。东门施工提示只在 **上周五下午** 播放过。也就是说，这不是今天的现场录音。\n\n\n软件的「自动清除停顿」功能还开着。上周五，广播委员为了把排练录音压缩成一分钟预览，勾选了自动删除静音和重复片段。平板性能太旧，处理过程中卡顿，预览文件把相邻两段话接错了。\n\n\n志郎把两段波形并排：前段尾巴落在「迟——」的「迟」上；后段从「不该参加」起振。中间没有呼吸，没有停顿，像被 **一把剪刀** 直接接在一起。\n\n\n「如果只听一遍，」慧美说，「会像他在 **重复** 骂人。」\n\n\n陸珣在本子补一行：**重复 ≠ 现场再说一遍**。\n\n\n慧美已经懂：**文件** 在说话，不是现场。\n\n\n社交钟还在走。走廊里传来别的班议论：「光排斥同学？」「公开日还搞这个？」\n\n\n误指，比机制跑得 **快**。\n\n\n「大家都 **听见** 了！」一个男生站起来，「还要狡辩？」\n\n\n光脸更白。他没骂人——也骂不出声。保健室登记的禁声日，让「听见他的声音」和「看见他张嘴」成了两件对不上的事。\n\n\n水野真帆在后排，肩又缩了一下。\n\n\n全班已经连好故事：光通过广播故意羞辱水野、破坏公开日团结。\n\n\n走廊外有人贴墙偷听，又跑开。消息比脚步快：「光在广播里骂水野」「公开日要黄了」「观察社又要洗」。\n\n\n值日生把节目单收进抽屉，动作很重。像怕纸也会 **传话**。\n\n\n水野仍低着头。她的肩线在窗光里 **细** 得像一条还没被写进 **已确认** 栏的线。\n\n\n陸珣看着屏幕上的 PLAY。他想起序里试音的那一声「ピ——」。怪事常常这样：只给你一半证据。另一半在时间里。\n\n\n他开口，声音不大：「先……看 **文件**。」\n\n\n班主任看他：「转学生？」\n\n\n「5年2組。陸珣。」慧美答，「观察社 **旁听**。」\n\n\n志郎接上学校的 **备份链**。完整排练文件里，句子是：\n\n\n……**迟到者**不该参加 **今天的彩排**。\n\n\n广播里播出的，却是中间一段，像被人 **掐头去尾**：\n\n\n ……（迟）……**不该参加**……\n\n\n再加上口语误听、传播缩写，到了班里，变成了：\n\n\n  「水野根本不该参加。」\n\n\n光站在那里，终于把话说完整：「我说过一句很像的话。可不是你们听到的那个意思。」\n\n\n他停了一下，像吞下一块很硬的东西：\n\n\n「我不该转述还没核实的话。但我没有在广播里当面说那句。」\n\n\n他转向水野：「这部分，是我的错。」\n\n\n水野没有马上说没关系。她只把折成小方块的节目单慢慢展开。纸上留下十几道白色折痕。\n\n\n「我确实不想做开场广播。」她说，「但不是不参加公开日。我只是……站在麦克风前会忘词。」\n\n\n教室里有人小声说：「我也是。」另一边有人说：「那可以两个人一起。」\n\n\n没有人突然变得特别善良。也没有人排队向水野道歉。只是原本向外挪开的椅子，被轻轻推回去了一点。\n\n\n志郎把完整句投在讲台小屏上。有人小声读出来：「迟到者不该参加 **今天的彩排**。」\n\n\n「原来中间还有 **迟到者** ……」\n\n\n「还有 **今天的彩排** ……」\n\n\n两句话像从同一锅汤里捞出不同的料。教室里没有立刻安静——安静太像认输。但推回去的椅子比刚才多了两把。\n\n\n**失声日** + 旧文件误触。压缩跳播。语境截断。\n\n生理上说不出；录音上不是现场——两层不可能，不能混成一句审判词。\n\n\n水野真帆抬头一秒。又低下去。那一秒里，陸珣看见的不是感谢，是累。\n\n\n班主任沉吟：「导播协助…… **暂缓取消**。书面说明，午休前交。」\n\n\n光对全班，也是对自己：「我会重新录 **说明**。第一句不是『我没说』——是『我说过一句很像的话，可不是你们听到的那个意思。』」\n\n\n器材车清单在侧门贴出。下一站：**5年2組黑板** · 展示膜测试记录。\n\n\n志郎捏着那卷膜：「黑板那边……也有 **怪事**。」\n\n\n慧美：「核实完再写。」\n\n\n广播安静了。可误传没有安静——它只是换了一个地方，等下一件看起来有人写过的东西。\n\n\n放学后，观察社三个人又围住陸珣。\n\n\n「你为什么先看时间？」光问。\n\n\n「声音已经有人听了。」陸珣说，「我再听一遍，也不会比全班多一双耳朵。」\n\n\n「所以你看屏幕？」\n\n\n「声音告诉我们像谁。时间告诉我们它能不能是现在发生的。」\n\n\n慧美合上笔记本：「来观察社吧。」\n\n\n「我刚转学。」\n\n\n「观察不看入学天数。」光说，「而且我们现在缺一个会先看时间的人。」\n\n\n陸珣没有立刻答应。他看向器材车。车顶那叠透明展示膜被风吹起一角。最上面一张印着白色的「对不起」，是公开日短剧要用的道具字样。志郎用手掌把它压平。谁也没有注意到，膜的背面在刚擦过的黑板边缘蹭了一下。\n\n\n（案① 收束 · L1 → 案② · shared_source）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：手机录音功能 · 两段短句（例如「今天先别参加测试」和「你根本不该把没确认的版本放进列表」）。\n\n步骤：分别录两段话，中间留三秒空白。用任意剪辑软件勾选「自动删除静音」，把两段接在一起播放。\n\n观察：完整句子是否变成从未说过的第三句？再对照波形图——硬切处是否像「同一把剪刀」？\n\n要点：每一个字可能都是真的，但顺序和语境会改意思。听见，不等于听见完整的话。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 大家都听见他的声音了。  \n\n> 可没有人听见，**他今天说不出话**。\n\n> 哥哥说，那是旧的录音。  \n\n> 我觉得，大家太想听见一个 **答案** 了。\n\n\n今天，全班都听见了伊藤同学的声音。  \n\n声音没有说谎。每一个字都是真的。\n\n\n放学路上，我问哥哥：「如果光今天说不出话，为什么大家还相信广播？」\n\n\n哥哥说：「因为听见比看见更快。」\n\n\n我觉得，大家不是故意冤枉他。  \n\n是大家太想先有一个能讲出口的原因。\n\n\n可是，把真的字接错了地方，  \n\n就会变成一句从来没有人说过的话。\n\n\n哥哥说，查广播要先看时间。  \n\n我觉得，听别人说话，也要给前后多留一点时间。\n\n\n因为有些误会，  \n\n不是从假话开始的。  \n\n是从一句被剪短的真话开始的。\n\n\n——第一案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A001\n\n\n---\n\n【EDITOR · PRODUCTION META · A001 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A001】\n\n  · 案①《全班都听见了他的声音》\n\n  · 案号：A001 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n  · 八秒句：全班都听见他说了，可医生说他今天一个字都不能讲。\n\n  · 错误责任：伊藤光故意在广播中排斥同学。\n\n  · 真实责任：误播旧录音+压缩跳播；光曾转述未核实片段。\n\n  · FC概要：FC-0 保健室禁声 · FC-1 唇不同步 · FC-2 旧时间戳 · FC-3 波形硬切 · FC-4 完整句还原\n\n  · 钩子：广播是他的声——他今天根本说不出话 → 器材车/展示膜 → A002\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 序/彩排 · SC-02 广播 · 个能讲出口的原因。", "可是，把真的字接错了地方，", "就会变成一句从来没有人说过的话。", "哥哥说，查广播要先看时间。", "我觉得，听别人说话，也要给前后多留一点时间。", "因为有些误会，", "不是从假话开始的。", "是从一句被剪短的真话开始的。", "——第一案完——", "---", "【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A001", "---", "【EDITOR · PRODUCTION META · A001 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A001】", "· 案①《全班都听见了他的声音》", "· 案号：A001 · Engine V2.0 · Campus Ripple", "· 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08", "· 八秒句：全班都听见他说了，可医生说他今天一个字都不能讲。", "· 错误责任：伊藤光故意在广播中排斥同学。", "· 真实责任：误播旧录音+压缩跳播；光曾转述未核实片段。", "· FC概要：FC-0 保健室禁声 · FC-1 唇不同步 · FC-2 旧时间戳 · FC-3 波形硬切 · FC-4 完整句还原", "· 钩子：广播是他的声——他今天根本说不出话 → 器材车/展示膜 → A002\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08", "---", "【V2.0 场级对照 · G-SHOT-T ready】", "SC-01 序/彩排 · SC-02 广播 · SC-03 观察社 · SC-04 双倒计时", "SC-05 文件时间 · SC-06 波形 · SC-07 误指峰值 · SC-08 语境/修复 · SC-09 尾钩", "FC-0 保健室禁声 · FC-1 唇不同步 · FC-2 旧时间戳 · FC-3 硬切 · FC-4 完整句还原", "wrong_responsibility：光恶意排斥水野 · true_responsibility：误播+未核实传播", "科学样本：V2迁移/06_制作参考/A001_广播录音证据样本/"], "highlights": [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改1稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n序 · 全校都在等他承认\n\n------------------\n\n\n全校广播忽然响了。\n\n\n是 **伊藤光** 的声音。\n\n\n「水野根本不该参加。」\n\n\n合班教室里，光站在讲台前，嘴还张着——只有气声。医嘱写得很清楚：今日 **禁声**。可天花板上的 **广播喇叭** 明亮、完整，甚至带着笑，盖过一切。\n\n\n有人小声：「保健室不是说他 **不能说话** 吗？」\n\n\n教室静了一秒。然后像有人把锅掀开。\n\n\n全班都穿着 **上履き** —— 地板不留室外鞋印。四月的光从铝窗斜进，把讲台和后排切成两半。\n\n\n「就是光！」「他刚才说的！」\n\n\n水野真帆坐在靠窗第二列。她没抬头，只把节目单对折的角压平。纸边白得刺眼。\n\n\n窗缝灌进来四月的风。黑板槽里还留着昨天展示膜测试的细灰。光的手不知道往哪放——袖口 **禁声回执** 露出一角，像一张还没撕掉的标签。\n\n\n陸珣没看光的脸。他看讲台旁 **播音台屏幕** —— 一行小字在跳：PLAY · 三周前彩排录音（像提前录好的带子）\n\n\n光的嘴唇 **没有动** 完那一句。甚至还没动。广播里的声音，和光今天 **说不出话** 的样子，对不上。\n\n\n怪事可以被重复。重复，就不叫怪。\n\n\n本子：**广播 · 光声 · 唇不同步**。\n\n\n广播里又「滋」了一声。\n\n\n「……根本不该参加。」\n\n\n同一句话重复了一遍。最后一排翻书的声音都停了。\n\n\n光用气声挤出两个字：「……不是我。」\n\n\n有人小声说：「但就是你的声音。」\n\n\n——这件事发生在两小时前。名古屋四月下旬，樱瓣落得比风慢。公開日準備。午後可能有小雨。\n\n\n一、全班都听见了他的声音\n\n------------------------\n\n\n陸珣来5年2組第三周。侧廊尽头有个 **观察社角落** —— 旧笔记墙、证物盒、一块故意留空的壁报栏。木门上钉着社徽： **翘起的海报角**，中间一只简笔眼睛。慧美说，空白栏是给还没核实的事留的。\n\n\n松本志郎正拿胶带「加固」社徽。贴完，角翘得更高。\n\n\n「更牢了。」他满意点头。\n\n\n加藤慧美把透明膜按回他手里：「还没登记。」\n\n\n「更牢了也比掉地上强。」志郎又扯了一截胶带，社徽彻底歪向一边。慧美叹气，在本子上写：**听说** · 志郎说更牢了 · 未确认是否更牢。\n\n\n灰白色的 **移动媒体器材车** 停在侧门。车侧标签：录音卡 · 展示膜 · 班级合照备份。\n\n\n光从保健室出来，白T配 **橙红导播背心**，袖口别着导播协助小徽和禁声回执。他比划「打字说明」，嗓子只挤出气声。\n\n\n陸珣蹲在车轮旁，看侧栏 **标签顺序**：录音卡在最上，展示膜在中间，班级合照备份在最下。角都朝外——像等人来读。他看得太专心，额头 **撞上车门** —— 嗡一声。\n\n\n志郎抬头：「车没事。你没事吧？」\n\n\n陸珣揉了下额头。本子角上：器材车 · 标签 · 撞门。\n\n\n合班教室的窗开着一条缝。光被点到名字，走上讲台做 **导播流程** 说明。他张嘴，还没出声——广播就响了。（见序。）\n\n\n班主任从门口走进来，抬手关掉教室广播。\n\n\n「午休前，先不要传播未经确认的说法。」她看了看光，也看了看其他人，「广播委员和器材负责人一起检查。伊藤，在查清楚之前，你先不要碰放送设备。」\n\n\n光张了张嘴。只有气声。没有人再笑他的嗓子——大家已经在心里说完了。\n\n\n慧美从5年1組挤过来，浅黄开衫、银框眼镜，低马尾别着细发带。笔记本翻开。她没写「犯人」。\n\n\n「观察社写趣事，不写审判。」\n\n\n志郎矮壮，绿格衫外是绿背心，已蹲到讲台侧查线：「谁按的播放？日志！」\n\n\n他顺手把垂下的电源线用扎带束紧。线弹了一下，平板屏幕闪了闪。\n\n\n「……更牢了。」志郎自言自语。\n\n\n光脸色发白，只能挤出气声：「……不是我按的。」\n\n\n后排，水野真帆 **低着头**。她没有站起来。也没有反驳。像把自己缩进椅背里。\n\n\n陸珣在两三步外。他 **不急着站队**。先在本子画：水野 · 后排 · 未开口。\n\n\n他同时记下另一格：播音台屏幕 · PLAY · 三周前彩排录音。名字里有个日期，像一枚还没被读出来的钉。\n\n\n志郎手指沿电源线摸过去：「线没断。是 **平板** 在播。」\n\n\n光用气声比出「不是我按的」。慧美在 **已确认** 栏写：广播响起 · 光 **禁声** · 唇不同步 · 播放源为平板。她 **没写**「光说的」。\n\n\n走廊有人嚷：「光在广播里骂水野，骂得可难听了！」\n\n\n慧美笔尖不停，一字不漏记在 **听说** 栏：骂得可难听了。然后抬头问传话的男生：「原话是什么？」\n\n\n男生愣住：「呃……就是……不该参加？」\n\n\n光听见「骂」，张嘴想反驳，只出来一声嘶沙的气声。他比划半天，慧美把本子推过去：「写下来。我帮你念。」\n\n\n侧廊有人小声：「又是观察社帮光说话吧。」\n\n\n慧美听见了，笔尖停在一格：**听说** —— 还没升格成 **已确认**。\n\n\n班主任敲讲台：「公开日彩排，还有四十分钟。」\n\n\n又看光：「午休前把这件事 **说明白**。否则……」\n\n\n没说完。意思都在 **导播协助** 的小徽上。\n\n\n**事件钟**：四十分钟后，彩排开始。\n\n**社交钟**：午休前，光可能失去协助资格。\n\n\n光想喊「我没说」。嗓子只出来一点嘶沙的气声——医嘱还在。慧美摇头，指了指他袖口禁声的回执。志郎已经抱着平板往器材车跑，扎带在口袋里叮当响。\n\n\n水野真帆仍不开口。肩缩在椅背里，像怕一开口，大家就更相信广播里那句。\n\n\n四年级走廊，陸瑆把观察社社徽描进日记本。翘角旁边，她画了一只圆眼睛。\n\n\n午间休息前，观察社围住了移动媒体器材车。\n\n\n志郎把平板递过来。波形图在屏幕上像一排矮墙。\n\n\n陸珣指左上角：三月二十八日 · 三周前彩排录音\n\n\n「三周前。」慧美轻声。不是今天的现场录音。\n\n\n光闭了闭眼：「排练……我确实说过 **类似** 的话。」\n\n\n「类似？」志郎抬头。\n\n\n「迟到的人……不该参加今天的彩排。」光用气声挤出几个字，像怕嗓子裂开，「三周前……排练时说的。今天……我说不出。」\n\n\n慧美在 **听说** 栏打了圈。没有写进 **已确认**。\n\n\n平板屏幕上有十七段录音。名字乱得像把一盒字母倒在桌上。志郎从车后爬出来：「不是文件夹——像谁在喊救命。」\n\n\n水野把器材车从放送室推到五年二班，是因为公开日的班级展示要测试声音。她插上电源，旧平板自动连接了音箱。之后她去职员室拿审批表，广播就在无人操作的情况下响了。\n\n\n志郎调出平板 **播放队列**。最上面一行灰字：「继续上次 · 未发送项 · 1」。\n\n\n「自动播放？」志郎蹲下检查插座，「平板恢复供电后，有可能继续上次没播完的队列。」\n\n\n慧美问水野：「你插电源时，屏幕亮了吗？」\n\n\n水野声音很轻：「亮了一下。我以为在 **连接** ……就去拿表了。」\n\n\n陸珣画：旧文件 · 新播放 · 无人按键。\n\n\n志郎把波形放大。在「不该参加」前面，有一刀硬切 —— 像被剪刀剪过，上一段尾巴断在奇怪的位置，下一段突然起振。\n\n\n两段波峰像同一把剪刀剪出来的。「重复了。」志郎说，「不是人刚好吸得一样——是同一段录音被用了两次。」\n\n\n第三遍，他们戴上耳机。背景里传来一声短短的电子提示音：「施工车辆请从东门进入——」\n\n\n声音只露出半秒，就被光的说话声盖住。东门施工提示只在 **上周五下午** 播放过。也就是说，这不是今天的现场录音。\n\n\n软件的「自动清除停顿」功能还开着。上周五，广播委员为了把排练录音压缩成一分钟预览，勾选了自动删除静音和重复片段。平板性能太旧，处理过程中卡顿，预览文件把相邻两段话接错了。\n\n\n志郎把两段波形并排：前段尾巴落在「迟——」的「迟」上；后段从「不该参加」起振。中间没有呼吸，没有停顿，像被 **一把剪刀** 直接接在一起。\n\n\n「如果只听一遍，」慧美说，「会像他在 **重复** 骂人。」\n\n\n陸珣在本子补一行：**重复 ≠ 现场再说一遍**。\n\n\n慧美已经懂：**文件** 在说话，不是现场。\n\n\n社交钟还在走。走廊里传来别的班议论：「光排斥同学？」「公开日还搞这个？」\n\n\n误指，比机制跑得 **快**。\n\n\n「大家都 **听见** 了！」一个男生站起来，「还要狡辩？」\n\n\n光脸更白。他没骂人——也骂不出声。保健室登记的禁声日，让「听见他的声音」和「看见他张嘴」成了两件对不上的事。\n\n\n水野真帆在后排，肩又缩了一下。\n\n\n全班已经连好故事：光通过广播故意羞辱水野、破坏公开日团结。\n\n\n走廊外有人贴墙偷听，又跑开。消息比脚步快：「光在广播里骂水野」「公开日要黄了」「观察社又要洗」。\n\n\n值日生把节目单收进抽屉，动作很重。像怕纸也会 **传话**。\n\n\n水野仍低着头。她的肩线在窗光里 **细** 得像一条还没被写进 **已确认** 栏的线。\n\n\n陸珣看着屏幕上的 PLAY。他想起两小时前撞上车门那声「嗡」。怪事常常这样：只给你一半证据。另一半在时间里。\n\n\n他开口，声音不大：「先……看 **文件**。」\n\n\n班主任看他：「转学生？」\n\n\n「5年2組。陸珣。」慧美答，「观察社 **旁听**。」\n\n\n志郎接上学校的 **备份链**。完整排练文件里，句子是：\n\n\n……**迟到者**不该参加 **今天的彩排**。\n\n\n广播里播出的，却是中间一段，像被人 **掐头去尾**：\n\n\n ……（迟）……**不该参加**……\n\n\n再加上口语误听、传播缩写，到了班里，变成了：\n\n\n  「水野根本不该参加。」\n\n\n光站在那里，终于把话说完整：「我说过一句很像的话。可不是你们听到的那个意思。」\n\n\n他停了一下，像吞下一块很硬的东西：\n\n\n「我不该转述还没核实的话。但我没有在广播里当面说那句。」\n\n\n他转向水野：「这部分，是我的错。」\n\n\n水野没有马上说没关系。她只把折成小方块的节目单慢慢展开。纸上留下十几道白色折痕。\n\n\n「我确实不想做开场广播。」她说，「但不是不参加公开日。我只是……站在麦克风前会忘词。」\n\n\n教室里有人小声说：「我也是。」另一边有人说：「那可以两个人一起。」\n\n\n没有人突然变得特别善良。也没有人排队向水野道歉。只是原本向外挪开的椅子，被轻轻推回去了一点。\n\n\n志郎把完整句投在讲台小屏上。有人小声读出来：「迟到者不该参加 **今天的彩排**。」\n\n\n「原来中间还有 **迟到者** ……」\n\n\n「还有 **今天的彩排** ……」\n\n\n两句话像从同一锅汤里捞出不同的料。教室里没有立刻安静——安静太像认输。但推回去的椅子比刚才多了两把。\n\n\n**失声日** + 旧文件误触。压缩跳播。语境截断。\n\n生理上说不出；录音上不是现场——两层不可能，不能混成一句审判词。\n\n\n水野真帆抬头一秒。又低下去。那一秒里，陸珣看见的不是感谢，是累。\n\n\n班主任沉吟：「导播协助…… **暂缓取消**。书面说明，午休前交。」\n\n\n光对全班，也是对自己：「我会重新录 **说明**。第一句不是『我没说』——是『我说过一句很像的话，可不是你们听到的那个意思。』」\n\n\n器材车清单在侧门贴出。下一站：**5年2組黑板** · 展示膜测试记录。\n\n\n志郎捏着那卷膜：「黑板那边……也有 **怪事**。」\n\n\n慧美：「核实完再写。」\n\n\n广播安静了。可误传没有安静——它只是换了一个地方，等下一件看起来有人写过的东西。\n\n\n放学后，观察社三个人又围住陸珣。\n\n\n「你为什么先看时间？」光问。\n\n\n「声音已经有人听了。」陸珣说，「我再听一遍，也不会比全班多一双耳朵。」\n\n\n「所以你看屏幕？」\n\n\n「声音告诉我们像谁。时间告诉我们它能不能是现在发生的。」\n\n\n慧美合上笔记本：「来观察社吧。」\n\n\n「我刚转学。」\n\n\n「观察不看入学天数。」光说，「而且我们现在缺一个会先看时间的人。」\n\n\n陸珣没有立刻答应。他看向器材车。车顶那叠透明展示膜被风吹起一角。最上面一张印着白色的「对不起」，是公开日短剧要用的道具字样。志郎用手掌把它压平。谁也没有注意到，膜的背面在刚擦过的黑板边缘蹭了一下。\n\n\n（案① 收束 · L1 → 案② · shared_source）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：手机录音功能 · 两段短句（例如「今天先别参加测试」和「你根本不该把没确认的版本放进列表」）。\n\n步骤：分别录两段话，中间留三秒空白。用任意剪辑软件勾选「自动删除静音」，把两段接在一起播放。\n\n观察：完整句子是否变成从未说过的第三句？再对照波形图——硬切处是否像「同一把剪刀」？\n\n要点：每一个字可能都是真的，但顺序和语境会改意思。听见，不等于听见完整的话。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 大家都听见他的声音了。  \n\n> 可没有人听见，**他今天说不出话**。\n\n> 哥哥说，那是旧的录音。  \n\n> 我觉得，大家太想听见一个 **答案** 了。\n\n\n今天，全班都听见了伊藤同学的声音。  \n\n声音没有说谎。每一个字都是真的。\n\n\n放学路上，我问哥哥：「如果光今天说不出话，为什么大家还相信广播？」\n\n\n哥哥说：「因为听见比看见更快。」\n\n\n我觉得，大家不是故意冤枉他。  \n\n是大家太想先有一个能讲出口的原因。\n\n\n可是，把真的字接错了地方，  \n\n就会变成一句从来没有人说过的话。\n\n\n哥哥说，查广播要先看时间。  \n\n我觉得，听别人说话，也要给前后多留一点时间。\n\n\n因为有些误会，  \n\n不是从假话开始的。  \n\n是从一句被剪短的真话开始的。\n\n\n——第一案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R16 · 2026-06-08】\n序+场1：全球IP专家 M1-M3（钩子前置/幽默/角色鲜活/观察社种子）· doc36 · 余文 R15\n\n\n---\n\n【EDITOR · PRODUCTION META · A001 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A001】\n\n  · 案①《全班都听见了他的声音》\n\n  · 案号：A001 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R16 · global IP M1-M3 · hook/humor/character · 2026-06-08\n\n  · 八秒句：全班都听见他说了，可医生说他今天一个字都不能讲。\n\n  · 错误责任：伊藤光故意在广播中排斥同学。\n\n  · 真实责任：误播旧录音+压缩跳播；光曾转述未核实片段。\n\n  · FC概要：FC-0 保健室禁声 · FC-1 唇不同步 · FC-2 旧时间戳 · FC-3 波形硬切 · FC-4 完整句还原\n\n  · 钩子：广播是他的声——他今天根本说不出话 → 器材车/展示膜 → A002\n· 状态：REVIEW_LOOP_R16 · global IP M1-M3 · doc36 · 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 序/彩排 · SC-02 广播 · SC-03 观察社 · SC-04 双倒计时\n\nSC-05 文件时间 · SC-06 波形 · SC-07 误指峰值 · SC-08 语境/修复 · SC-09 尾钩\n\nFC-0 保健室禁声 · FC-1 唇不同步 · FC-2 旧时间戳 · FC-3 硬切 · FC-4 完整句还原\n\nwrong_responsibility：光恶意排斥水野 · true_responsibility：误播+未核实传播\n\n科学样本：V2迁移/06_制作参考/A001_广播录音证据样本/\n", "paragraphs": ["《学堂趣事录》", "第1卷 · 觉得奇怪，就先观察", "单元 · （待定 · 工作名：全校都认错了人）", "========================", "序 · 全校都在等他承认", "------------------", "全校广播忽然响了。", "是 **伊藤光** 的声音。", "「水野根本不该参加。」", "合班教室里，光站在讲台前，嘴还张着——只有气声。医嘱写得很清楚：今日 **禁声**。可天花板上的 **广播喇叭** 明亮、完整，甚至带着笑，盖过一切。", "有人小声：「保健室不是说他 **不能说话** 吗？」", "教室静了一秒。然后像有人把锅掀开。", "全班都穿着 **上履き** —— 地板不留室外鞋印。四月的光从铝窗斜进，把讲台和后排切成两半。", "「就是光！」「他刚才说的！」", "水野真帆坐在靠窗第二列。她没抬头，只把节目单对折的角压平。纸边白得刺眼。", "窗缝灌进来四月的风。黑板槽里还留着昨天展示膜测试的细灰。光的手不知道往哪放——袖口 **禁声回执** 露出一角，像一张还没撕掉的标签。", "陸珣没看光的脸。他看讲台旁 **播音台屏幕** —— 一行小字在跳：PLAY · 三周  SC-04 双倒计时", "SC-05 文件时间 · SC-06 波形 · SC-07 误指峰值 · SC-08 语境/修复 · SC-09 尾钩", "FC-0 保健室禁声 · FC-1 唇不同步 · FC-2 旧时间戳 · FC-3 硬切 · FC-4 完整句还原", "wrong_responsibility：光恶意排斥水野 · true_responsibility：误播+未核实传播", "科学样本：V2迁移/06_制作参考/A001_广播录音证据样本/"], "highlights": [false, false, false, false, true, false, false, true, false, true, false, false, false, true, true, true, true, true, true, false, false, false, false, false, false, true, true, true, true, true, true, true, true, true, true, true, true, true, true, false, false, false, true, false, true, true, true, true, true, false, true, true, false, true, true, true, true, false, false, false, false, false, false, false, true, false, true, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false, false, true, false, false, false, false, true, false, false, false, false, false, false, false]}, "修改2稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n序 · 全校都在等他承认\n\n------------------\n\n\n全校广播忽然响了。\n\n\n是 **伊藤光** 的声音。\n\n\n「水野根本不该参加。」\n\n\n合班教室里，光站在讲台前，嘴还张着——只有气声。医嘱写得很清楚：今日 **禁声**。可天花板上的 **广播喇叭** 明亮、完整，甚至带着笑，盖过一切。\n\n\n有人小声：「保健室不是说他 **不能说话** 吗？」\n\n\n教室静了一秒。然后像有人把锅掀开。\n\n\n全班都穿着 **上履き** —— 地板不留室外鞋印。四月的光从铝窗斜进，把讲台和后排切成两半。\n\n\n「就是光！」「他刚才说的！」\n\n\n水野真帆坐在靠窗第二列。她没抬头，只把节目单对折的角压平。纸边白得刺眼。\n\n\n窗缝灌进来四月的风。黑板槽里还留着昨天展示膜测试的细灰。光的手不知道往哪放——袖口 **禁声回执** 露出一角，像一张还没撕掉的标签。\n\n\n陸珣没看光的脸。他看讲台旁 **播音台屏幕** —— 一行小字在跳：PLAY · 三周前彩排录音（像提前录好的带子）\n\n\n光的嘴唇 **没有动** 完那一句。甚至还没动。广播里的声音，和光今天 **说不出话** 的样子，对不上。\n\n\n怪事可以被重复。重复，就不叫怪。\n\n\n本子：**广播 · 光声 · 唇不同步**。\n\n\n广播里又「滋」了一声。\n\n\n「……根本不该参加。」\n\n\n同一句话重复了一遍。最后一排翻书的声音都停了。\n\n\n光用气声挤出两个字：「……不是我。」\n\n\n有人小声说：「但就是你的声音。」\n\n\n——这件事发生在两小时前。名古屋四月下旬，樱瓣落得比风慢。公開日準備。午後可能有小雨。\n\n\n一、全班都听见了他的声音\n\n------------------------\n\n\n陸珣来5年2組第三周。侧廊尽头有个 **观察社角落** —— 旧笔记墙、证物盒、一块故意留空的壁报栏。木门上钉着社徽： **翘起的海报角**，中间一只简笔眼睛。慧美说，空白栏是给还没核实的事留的。\n\n\n松本志郎正拿胶带「加固」社徽。贴完，角翘得更高。\n\n\n「更牢了。」他满意点头。\n\n\n加藤慧美把透明膜按回他手里：「还没登记。」\n\n\n「更牢了也比掉地上强。」志郎又扯了一截胶带，社徽彻底歪向一边。慧美叹气，在本子上写：**听说** · 志郎说更牢了 · 未确认是否更牢。\n\n\n灰白色的 **移动媒体器材车** 停在侧门。车侧标签：录音卡 · 展示膜 · 班级合照备份。\n\n\n光从保健室出来，白T配 **橙红导播背心**，袖口别着导播协助小徽和禁声回执。他比划「打字说明」，嗓子只挤出气声。\n\n\n陸珣蹲在车轮旁，看侧栏 **标签顺序**：录音卡在最上，展示膜在中间，班级合照备份在最下。角都朝外——像等人来读。他看得太专心，额头 **撞上车门** —— 嗡一声。\n\n\n志郎抬头：「车没事。你没事吧？」\n\n\n陸珣揉了下额头。本子角上：器材车 · 标签 · 撞门。\n\n\n合班教室的窗开着一条缝。光被点到名字，走上讲台做 **导播流程** 说明。他张嘴，还没出声——广播就响了。（见序。）\n\n\n班主任从门口走进来，抬手关掉教室广播。\n\n\n「午休前，先不要传播未经确认的说法。」她看了看光，也看了看其他人，「广播委员和器材负责人一起检查。伊藤，在查清楚之前，你先不要碰放送设备。」\n\n\n光张了张嘴。只有气声。没有人再笑他的嗓子——大家已经在心里说完了。\n\n\n慧美从5年1組挤过来，浅黄开衫、银框眼镜，低马尾别着细发带。笔记本翻开。她没写「犯人」。\n\n\n「观察社写趣事，不写审判。」\n\n\n志郎矮壮，绿格衫外是绿背心，已蹲到讲台侧查线：「谁按的播放？日志！」\n\n\n他顺手把垂下的电源线用扎带束紧。线弹了一下，平板屏幕闪了闪。\n\n\n「……更牢了。」志郎自言自语。\n\n\n光脸色发白，只能挤出气声：「……不是我按的。」\n\n\n后排，水野真帆 **低着头**。她没有站起来。也没有反驳。像把自己缩进椅背里。\n\n\n陸珣在两三步外。他 **不急着站队**。先在本子画：水野 · 后排 · 未开口。\n\n\n他同时记下另一格：播音台屏幕 · PLAY · 三周前彩排录音。名字里有个日期，像一枚还没被读出来的钉。\n\n\n志郎手指沿电源线摸过去：「线没断。是 **平板** 在播。」\n\n\n光用气声比出「不是我按的」。慧美在 **已确认** 栏写：广播响起 · 光 **禁声** · 唇不同步 · 播放源为平板。她 **没写**「光说的」。\n\n\n走廊有人嚷：「光在广播里骂水野，骂得可难听了！」\n\n\n慧美笔尖不停，一字不漏记在 **听说** 栏：骂得可难听了。然后抬头问传话的男生：「原话是什么？」\n\n\n男生愣住：「呃……就是……不该参加？」\n\n\n光听见「骂」，张嘴想反驳，只出来一声嘶沙的气声。他比划半天，慧美把本子推过去：「写下来。我帮你念。」\n\n\n侧廊有人小声：「又是观察社帮光说话吧。」\n\n\n慧美听见了，笔尖停在一格：**听说** —— 还没升格成 **已确认**。\n\n\n班主任敲讲台：「公开日彩排，还有四十分钟。」\n\n\n又看光：「午休前把这件事 **说明白**。否则……」\n\n\n没说完。意思都在 **导播协助** 的小徽上。\n\n\n**事件钟**：四十分钟后，彩排开始。\n\n**社交钟**：午休前，光可能失去协助资格。\n\n\n光想喊「我没说」。嗓子只出来一点嘶沙的气声——医嘱还在。慧美摇头，指了指他袖口禁声的回执。志郎已经抱着平板往器材车跑，扎带在口袋里叮当响。\n\n\n水野真帆仍不开口。肩缩在椅背里，像怕一开口，大家就更相信广播里那句。\n\n\n四年级走廊，陸瑆把观察社社徽描进日记本。翘角旁边，她画了一只圆眼睛。\n\n\n午间休息前，观察社围住了移动媒体器材车。\n\n\n志郎把平板递过来。波形图在屏幕上像一排矮墙。\n\n\n陸珣指左上角：三月二十八日 · 三周前彩排录音\n\n\n「三周前。」慧美轻声。不是今天的现场录音。\n\n\n光闭了闭眼：「排练……我确实说过 **类似** 的话。」\n\n\n「类似？」志郎抬头。\n\n\n「迟到的人……不该参加今天的彩排。」光用气声挤出几个字，像怕嗓子裂开，「三周前……排练时说的。今天……我说不出。」\n\n\n慧美在 **听说** 栏打了圈。没有写进 **已确认**。\n\n\n平板屏幕上有十七段录音。名字乱得像把一盒字母倒在桌上。志郎从车后爬出来：「不是文件夹——像谁在喊救命。」\n\n\n水野把器材车从放送室推到五年二班，是因为公开日的班级展示要测试声音。她插上电源，旧平板自动连接了音箱。之后她去职员室拿审批表，广播就在无人操作的情况下响了。\n\n\n志郎调出平板 **播放队列**。最上面一行灰字：「继续上次 · 未发送项 · 1」。\n\n\n「自动播放？」志郎蹲下检查插座，「平板恢复供电后，有可能继续上次没播完的队列。」\n\n\n慧美问水野：「你插电源时，屏幕亮了吗？」\n\n\n水野声音很轻：「亮了一下。我以为在 **连接** ……就去拿表了。」\n\n\n陸珣画：旧文件 · 新播放 · 无人按键。\n\n\n志郎把波形放大。在「不该参加」前面，有一刀硬切 —— 像被剪刀剪过，上一段尾巴断在奇怪的位置，下一段突然起振。\n\n\n两段波峰像同一把剪刀剪出来的。「重复了。」志郎说，「不是人刚好吸得一样——是同一段录音被用了两次。」\n\n\n第三遍，他们戴上耳机。背景里传来一声短短的电子提示音：「施工车辆请从东门进入——」\n\n\n声音只露出半秒，就被光的说话声盖住。东门施工提示只在 **上周五下午** 播放过。也就是说，这不是今天的现场录音。\n\n\n软件的「自动清除停顿」功能还开着。上周五，广播委员为了把排练录音压缩成一分钟预览，勾选了自动删除静音和重复片段。平板性能太旧，处理过程中卡顿，预览文件把相邻两段话接错了。\n\n\n志郎把两段波形并排：前段尾巴落在「迟——」的「迟」上；后段从「不该参加」起振。中间没有呼吸，没有停顿，像被 **一把剪刀** 直接接在一起。\n\n\n「如果只听一遍，」慧美说，「会像他在 **重复** 骂人。」\n\n\n陸珣在本子补一行：**重复 ≠ 现场再说一遍**。\n\n\n慧美已经懂：**文件** 在说话，不是现场。\n\n\n社交钟还在走。走廊里传来别的班议论：「光排斥同学？」「公开日还搞这个？」\n\n\n误指，比机制跑得 **快**。\n\n\n「大家都 **听见** 了！」一个男生站起来，「还要狡辩？」\n\n\n光脸更白。他没骂人——也骂不出声。保健室登记的禁声日，让「听见他的声音」和「看见他张嘴」成了两件对不上的事。\n\n\n水野真帆在后排，肩又缩了一下。\n\n\n全班已经连好故事：光通过广播故意羞辱水野、破坏公开日团结。\n\n\n走廊外有人贴墙偷听，又跑开。消息比脚步快：「光在广播里骂水野」「公开日要黄了」「观察社又要洗」。\n\n\n值日生把节目单收进抽屉，动作很重。像怕纸也会 **传话**。\n\n\n水野仍低着头。她的肩线在窗光里 **细** 得像一条还没被写进 **已确认** 栏的线。\n\n\n陸珣看着屏幕上的 PLAY。他想起两小时前撞上车门那声「嗡」。怪事常常这样：只给你一半证据。另一半在时间里。\n\n\n他开口，声音不大：「先……看 **文件**。」\n\n\n班主任看他：「转学生？」\n\n\n「5年2組。陸珣。」慧美答，「观察社 **旁听**。」\n\n\n志郎接上学校的 **备份链**。完整排练文件里，句子是：\n\n\n……**迟到者**不该参加 **今天的彩排**。\n\n\n广播里播出的，却是中间一段，像被人 **掐头去尾**：\n\n\n ……（迟）……**不该参加**……\n\n\n再加上口语误听、传播缩写，到了班里，变成了：\n\n\n  「水野根本不该参加。」\n\n\n光站在那里，终于把话说完整：「我说过一句很像的话。可不是你们听到的那个意思。」\n\n\n他停了一下，像吞下一块很硬的东西：\n\n\n「我不该转述还没核实的话。但我没有在广播里当面说那句。」\n\n\n他转向水野：「这部分，是我的错。」\n\n\n水野没有马上说没关系。她只把折成小方块的节目单慢慢展开。纸上留下十几道白色折痕。\n\n\n「我确实不想做开场广播。」她说，「但不是不参加公开日。我只是……站在麦克风前会忘词。」\n\n\n教室里有人小声说：「我也是。」另一边有人说：「那可以两个人一起。」\n\n\n没有人突然变得特别善良。也没有人排队向水野道歉。只是原本向外挪开的椅子，被轻轻推回去了一点。\n\n\n志郎把完整句投在讲台小屏上。有人小声读出来：「迟到者不该参加 **今天的彩排**。」\n\n\n「原来中间还有 **迟到者** ……」\n\n\n「还有 **今天的彩排** ……」\n\n\n两句话像从同一锅汤里捞出不同的料。教室里没有立刻安静——安静太像认输。但推回去的椅子比刚才多了两把。\n\n\n**失声日** + 旧文件误触。压缩跳播。语境截断。\n\n生理上说不出；录音上不是现场——两层不可能，不能混成一句审判词。\n\n\n水野真帆抬头一秒。又低下去。那一秒里，陸珣看见的不是感谢，是累。\n\n\n班主任沉吟：「导播协助…… **暂缓取消**。书面说明，午休前交。」\n\n\n光对全班，也是对自己：「我会重新录 **说明**。第一句不是『我没说』——是『我说过一句很像的话，可不是你们听到的那个意思。』」\n\n\n器材车清单在侧门贴出。下一站：**5年2組黑板** · 展示膜测试记录。\n\n\n志郎捏着那卷膜：「黑板那边……也有 **怪事**。」\n\n\n慧美：「核实完再写。」\n\n\n广播安静了。可误传没有安静——它只是换了一个地方，等下一件看起来有人写过的东西。\n\n\n放学后，观察社三个人又围住陸珣。\n\n\n「你为什么先看时间？」光问。\n\n\n「声音已经有人听了。」陸珣说，「我再听一遍，也不会比全班多一双耳朵。」\n\n\n「所以你看屏幕？」\n\n\n「声音告诉我们像谁。时间告诉我们它能不能是现在发生的。」\n\n\n慧美合上笔记本：「来观察社吧。」\n\n\n「我刚转学。」\n\n\n「观察不看入学天数。」光说，「而且我们现在缺一个会先看时间的人。」\n\n\n陸珣没有立刻答应。他看向器材车。车顶那叠透明展示膜被风吹起一角。最上面一张印着白色的「对不起」，是公开日短剧要用的道具字样。志郎用手掌把它压平。谁也没有注意到，膜的背面在刚擦过的黑板边缘蹭了一下。\n\n\n（案① 收束 · L1 → 案② · shared_source）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：手机录音功能 · 两段短句（例如「今天先别参加测试」和「你根本不该把没确认的版本放进列表」）。\n\n步骤：分别录两段话，中间留三秒空白。用任意剪辑软件勾选「自动删除静音」，把两段接在一起播放。\n\n观察：完整句子是否变成从未说过的第三句？再对照波形图——硬切处是否像「同一把剪刀」？\n\n要点：每一个字可能都是真的，但顺序和语境会改意思。听见，不等于听见完整的话。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 大家都听见他的声音了。  \n\n> 可没有人听见，**他今天说不出话**。\n\n> 哥哥说，那是旧的录音。  \n\n> 我觉得，大家太想听见一个 **答案** 了。\n\n\n今天，全班都听见了伊藤同学的声音。  \n\n声音没有说谎。每一个字都是真的。\n\n\n放学路上，我问哥哥：「如果光今天说不出话，为什么大家还相信广播？」\n\n\n哥哥说：「因为听见比看见更快。」\n\n\n我觉得，大家不是故意冤枉他。  \n\n是大家太想先有一个能讲出口的原因。\n\n\n可是，把真的字接错了地方，  \n\n就会变成一句从来没有人说过的话。\n\n\n哥哥说，查广播要先看时间。  \n\n我觉得，听别人说话，也要给前后多留一点时间。\n\n\n因为有些误会，  \n\n不是从假话开始的。  \n\n是从一句被剪短的真话开始的。\n\n\n——第一案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R16 · 2026-06-08】\n序+场1：全球IP专家 M1-M3（钩子前置/幽默/角色鲜活/观察社种子）· doc36 · 余文 R15\n\n\n---\n\n【EDITOR · PRODUCTION META · A001 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A001】\n\n  · 案①《全班都听见了他的声音》\n\n  · 案号：A001 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R16 · global IP M1-M3  "label": "Full R16 + H/C/S"}}, "stats": {"chars_原稿": 7157, "chars_修改1稿": 7157, "chars_修改2稿": 7080, "paragraphs_原稿": 203, "paragraphs_修改1稿": 203, "paragraphs_修改2稿": 204, "changed_p1_vs_p0": 0, "changed_p2_vs_p1": 33}, "drafts": {"原稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n二、没有人写过的道歉\n\n--------------------\n\n\n广播的事还没散干净，器材车已经转到5年2組侧廊。侧廊瓷砖还留着案①器材车轮迹，和昨天雨后的细泥不同——是 **干** 的粉灰。\n\n\n志郎抱着那卷透明膜，袋口标签写着：公开日 · 黑板测试 · 未登记。慧美跟在后面，笔还没干：「先测反光，再写记录。」\n\n\n光从走廊那头过来，导播协助的小徽还别在袖口。他看了志郎一眼，没说话，拐进教室。嗓子仍禁声 —— 案①的余波还在空气里。\n\n\n陸珣站在黑板前。板面昨天才擦过，绿得发暗。窗开着一条缝，四月的风把粉笔灰吹到板槽里。槽沿有一圈淡灰，像黑板还没完全睡醒。\n\n\n志郎把膜平铺在备课本上，用裁纸刀慢切一条。刀尖划过，发出细沙一样的声。透明边缘在斜光里亮了一下，像一条细线贴在绿板上。\n\n\n「先测反光，」慧美说，「再测湿擦后再显。」\n\n\n志郎点头，却没在登记表上签字。他总在动手前快一步——案①里，光也快一步转述过没核实的话。\n\n\n本子：**膜 · 标签 · 侧光 · 未登记**。\n\n\n第二天早自习前，值日生推开教室门，愣在原地。\n\n\n黑板上，粉笔字清清楚楚：\n\n\n  对不起。\n\n\n三个字居中。笔画圆钝，像谁 **慢慢** 写过。\n\n\n5年2組教室里，值日生和围观者都踩着 **上履き**。绿板在四月窗缝里发暗，槽沿一圈淡灰还没被风带走。\n\n\n值日生记得自己七点四十五分擦过板。他也记得志郎昨天蹲在这里贴膜——两件事在脑子里自动接在一起，像上一案里「听见」和「看见」自动接在一起。\n\n\n「志郎写的吧？」有人接话，「昨天他就蹲在黑板上搞膜！」\n\n\n话没说完，已经有人 **点头**。点头比查证快。\n\n\n志郎刚进教室，手里还拎着样品袋。他看见字，眉头拧起来：「……不是我。」\n\n\n他的字往右倾；板上的三个字圆钝居中。差别很小。小到不够在一秒里挡住点头。\n\n\n没人接「不是你」这三个字。大家接的是印象：志郎总在动手，总在现场。\n\n\n慧美把笔记本摊在讲台边。四栏格已经画好：**已确认** · **听说** · **仍不知道** · **趣事**。\n\n\n她在 **已确认** 写：字迹出现 · 早自习前 · 黑板中央。  \n\n在 **听说** 写：志郎昨日贴膜 · 志郎查广播线。\n\n仍不知道那一栏空着。她不帮空栏填名字。\n\n\n光压低声音：「先别……」\n\n\n慧美摇头：「观察社不写审判。写格子。」\n\n\n志郎把样品袋放到窗台上，袋口标签朝外。他 **没抢话**，只重复一次：「我没写。」\n\n\n光从后排经过，停了一下。他没接话 —— 案①里，他也曾被听见过。此刻他只看志郎袖口有没有登记回执。没有。\n\n\n陸珣在本子画：字 · 居中 · 圆钝。  \n\n又在旁边画：志郎握笔习惯偏斜 —— 和板上笔画不像。他又补一格：值日生擦过 · 门锁过 · 字仍出现 —— 时间线不对「刚写」。\n\n\n早晨七点五十八分，黑板上只有三个字。值日生说，他七点四十五分擦过黑板。教室门从清扫结束后一直锁着。\n\n\n班主任来了。字被擦掉。板面恢复一片绿。\n\n\n「公开日展示前清扫，」班主任说，「三十分钟。」\n\n\n**事件钟**：清扫后还要测展示。\n\n**社交钟**：志郎若不能「认错」，广播检修记录可能记在他名下。\n\n\n值日生出示门锁记录：7:46–7:57 无人进出 —— 像字在锁门期间自己长出来。\n\n\n值日生拖过水桶。湿抹布擦过黑板，水痕一道一道往下淌。志郎站在一旁，手指捏着膜的边缘，没动。\n\n\n陸珣看见：抹布蹭过板槽，却没揭起那条透明细边。水进去了。粉糊了。\n\n\n擦干净了。大家松一口气。\n\n\n然后——早自习铃响前十分钟，字 **又回来了**。还是那三个字。还是居中。像黑板记得什么，而不是刚有人写过。\n\n\n有女生摸了一下笔画——粉浮在绿面上，没有压进板里的沟。「不像新粉笔 ……」\n\n\n教室里倒抽一口气。\n\n\n「还说不是你？」值日生盯着志郎，「擦了又来，不是反复写是什么？」\n\n\n志郎脸色发白：「我昨晚就没进教室——」\n\n\n「膜是你贴的！」\n\n\n词多了，反而像掩饰。陸珣看见志郎的嘴唇动了一下，又闭上。\n\n\n清扫当番走了。教室空了一半。\n\n\n陸珣没围过去。他站在黑板侧面，看 **斜光**。\n\n\n四月上午的光移动很快。一分钟前膜边不亮，现在亮——像在等人来看。\n\n\n膜的边缘还在——昨天测试没撕干净，一条透明细线贴着板槽。抹布擦字时 **蹭过** 那条边，没蹭掉膜。\n\n\n他蹲下去，看板槽里的粉尘。湿擦过后，粉尘 **糊** 在绿板上，像一层淡灰。\n\n\n志郎忽然开口，声音很短：「……清洁液。」\n\n\n慧美从样品袋里取出小瓶，标签和膜 **配套**。「公开日流程里，」志郎说，「湿擦后要等干再贴膜。昨天我反了 —— 先贴边角，后湿擦演示。」\n\n\n陸珣没抬头，只在本子写：**湿擦 · 粉尘 · 膜边 · 顺序反了**。\n\n\n慧美凑过来，声音也轻：「笔迹角度呢？」\n\n\n陸珣指给她看：板上笔画圆钝居中；志郎平时记设备编号，字往右倾。\n\n\n「已确认：不像他的握笔。」慧美写在格子里。没写「不是他」。只写不像。\n\n\n志郎把膜对着窗。膜背面是反字——湿擦后，粉笔灰停在边缘就会「浮」出来。备课本上一试：压膜、湿擦，板上同形。\n\n\n班主任再次进门时，教室里已经分成两拨。\n\n\n一拨指着志郎：秘密写道歉、擦了又来、破坏展示现场。  \n\n一拨小声说：「观察社又要帮 **动手的人** 说话。」\n\n\n中间还有第三拨——不站队，只拍照发群。慧美拦住：「核实前不发。」\n\n\n志郎被推到黑板前。样品袋捏在手里，标签皱了。\n\n\n「公开日材料 **登记** 有没有你？」班主任问。\n\n\n「……膜是我测的。」志郎说，「字不是我写的。」\n\n\n「谁信？」值日生反问。\n\n\n志郎没骂人。他也没法立刻证明负 —— 没法证明「这三个字不是他的笔迹」之外，还有什么会写字。\n\n\n值日生把门锁记录拍给慧美看：7:46–7:57 无人进出——字却在 7:58 出现。时间线一样：先有「像他」，后有「不可能刚写」。\n\n\n陸珣补一格：锁门 · 字再现 · 膜边未揭 · 更像「显」不是「写」。\n\n\n有人把案① 和案② 接在一起：「动手的人总在现场。」「广播是他，字也是他。」\n\n\n陸珣站在侧窗。他想起上一案屏幕上的 PLAY。怪事换了一种样子：这一次不是声音，是字。可大家仍然只想听见答案。\n\n\n窗缝的光移了一寸。板槽里那条膜边又亮了一下——像在等人来看。\n\n\n他开口，声音不大：「先……看 **板槽**。」\n\n\n班主任看他。\n\n\n「5年2組。陸珣。」慧美答，「观察社 **旁听**。」\n\n\n志郎抬头。眼里不是感谢，是累 —— 和后排水野真帆那种累有点像。\n\n\n黑板上的「对不起」还在。擦不掉 **故事**，因为大家已经连好了：志郎秘密道歉、反复擦除、破坏公开日。\n\n\n志郎把样品袋摊在窗台上，取出配套清洁液。\n\n\n「不是写字。」他说，「是膜留下的。」\n\n\n备课本上一试：压膜、湿擦，字没了；点一点清洁液，旧痕又浮出。\n\n\n「膜边昨天没撕净。」志郎指板槽，「湿擦把粉打进去。清洁液一干，旧痕再显——字不是新写的，是被显出来的。」\n\n\n志郎让三位同学闭眼回忆 「谁写的」 —— 三人都说志郎。睁眼对照握笔角度—— 三人都改口「像膜」但仍不信「没写」。\n\n\n它不是粉笔写成的道歉。更像一枚被黑板暂时记住的印章。\n\n\n对照实验重复三次。每一次湿擦→等干→撒粉→显字，围观仍有人说 「就是志郎写的——他承认做过实验嘛。」\n\n\n慧美只在 **已确认** 写：机制可复现 · 非新写 · 握笔仍不符 · 未登记。\n\n\n志郎声音发涩：「……昨天我测膜，没走 **登记**。」\n\n\n教室里有人哦了一声。不是道歉。是重新算账。\n\n\n班主任看完对照，没让志郎站在板前了。她只说：「展示前 **三十分钟** 清扫，还作数。」\n\n\n志郎点头，从样品袋里抽出登记表。笔迹往右倾，和板上圆钝居中仍不像。\n\n\n他在「备注」栏补一行，写得很慢：\n\n\n  实验也会制造新的现场。\n\n\n他又 补流程三行：贴膜前登记 · 湿擦后等干 · 测试后 整板揭膜—— 像给下一班留说明书。\n\n\n慧美记结论：机制已核对 · 动机已陈述（材料未登记）· 审判词降级为流程。\n\n\n志郎对全班：「对不起，不是这三个字。是 **我没先登记**。」\n\n\n黑板上的「对不起」还在。班主任让人 **整板揭膜** 重擦。字终于没了。\n\n\n揭膜时，板槽发出一声轻粘——像迟到的登记终于被撕下来。\n\n\n光在后排记下流程：「书面说明 · 先机制后动机。」\n\n\n陸珣在本子写：**字可再现 · 人未新写 · 膜未登记**。\n\n\n侧廊传来撕胶带的声音。不是黑板。是 **壁报** 栏。\n\n\n有人嚷：「慧美，你记不记得那张海报？写着 **水野不得参加** 的那张！」\n\n\n慧美笔尖顿住。她明明记得没有贴完 —— 可三个人的口述，连标题大小都不一样。\n\n\n「我也记得有。」第四个声音加入，「红底占半栏。」\n\n\n「我只看见标题条 ……」第五个声音更小。\n\n\n口述 **又开始分叉** —— 像案③ **提前** 在壁报栏 **排练**。\n\n\n陸珣看向壁报栏。昨天黑板安静了，那里却像还记得什么从没整张贴出的东西。\n\n\n午休前，观察社把那张透明膜放回媒体器材车。慧美在每张膜的角上贴了编号。光负责按日期重命名音频文件。\n\n\n器材车侧面的磁性展示板上已经贴了许多零散材料：一张水野的排练照片、一条红色标题「不得参加」、一枚蓝色箭头。车转过走廊拐角时，轮子压过门槛。磁铁轻轻滑了一下。红色的「不得参加」，停在水野照片正上方——只有两秒。\n\n\n陸珣拿出学校公用相机，拍了一张。「因为有些东西只出现两秒。」他说，「两天以后，大家可能会记得它出现过很久。」\n\n\n慧美把照片贴进笔记本「听说」栏旁边—— 不升格成「已确认海报」。\n\n\n志郎 **检查** 车磁铁力度：「公开日前要换强磁条。」\n\n\n光记尾钩：壁报 · 记得 · **无实体** —— 案③的门已经开了。\n\n\n班主任 没有让志郎再站黑板前道歉三个字。她让全班看对照实验——像公开日前的最后一堂「出现≠刚写」课。\n\n\n有同学仍说：「他动手的人嘛。」慧美只在格子写：动手·已确认·不等于写字。\n\n\n志郎补登记时，手仍抖——不是怕字，是怕下次又忘登记。光在后排记：案②repair=流程+动机陈述，不是黑板三字。\n\n\n慧美把四栏格举给全班看——不是审判台，是过滤器。\n\n\n「已确认」只收看得见的：字在、膜在、志郎昨日贴膜。\n\n\n「听说」收印象：他总在动手、他查过广播线。\n\n\n「仍不知道」空着——不填名字。像案③预告。\n\n\n陸珣在旁听席记：格子比点头慢，但比点头准。\n\n\n值日生 后来承认：擦黑板时没注意膜边——不是帮志郎 hide， 是帮黑板 remember。\n\n\n志郎 对慧美说：「下次我先登记，再动手。」慧美只点头：「写进repair，不写进审判。」\n\n\n陸珣 给低年级看案②抓拍：「两秒像整张海报——案③会考这题。」他们不懂，但记住了「两秒」两个字。\n\n\n侧窗 斜光再移一寸，膜边又亮。陸珣请全班安静三秒——三秒里只听见四月风和粉笔槽里细灰。\n\n\n「** 先看板槽。」他第四句对外话。班主任顺着看——膜边像一条没撕净的线。\n\n\n志郎 眼里不是感谢，是累——和后排水野那种累同family。误会换了载体，累没换。\n\n\n志郎 把对照做给全班看第二遍：湿擦→等干→撒粉→字浮。有人仍说「你练过所以会」。慧美：「练过的是流程，不是撒谎。」\n\n\n早自习 铃还没响，对不起三字已在黑板上等。等的不是志郎——是所有人心里那个「动手的人」。\n\n\n值日生 手还湿着——湿擦是字能回来的第一把钥匙。第二把是膜边。第三把是清洁液。三把钥匙都在志郎样品袋里，却没人先看袋。\n\n\n志郎 用备课本压印再湿擦的对照，在窗边做第三遍给迟到的同学看。第三遍才有人说：「像印章，不像字。」——公平线索需要重复才可见。\n\n\n登记表 备注「实验也会制造新的现场」贴在样品袋——像给案③留：出现的字也可能只是现场，不是意图。\n\n\n公开日前夜，志郎把膜边、湿擦、清洁液写进流程卡给下一班值日：出现不等于刚写。陸珣在旁听席记：案②公平线索=锁门时段+膜边+握笔不符+对照可复现。\n\n\n慧美 把案②四栏誊进观察栏：机制已核·流程已补·审判词已降级——尾钩指向壁报两秒抓拍与「记得」海报。案②repair完成，误传换地方等案③。观察社记录：出现不等于刚写，流程先于审判。\n\n\n（案② 收束 · L2 → 案③ · mirror）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：透明胶带或保鲜膜 · 湿抹布 · 少量粉笔灰或爽身粉 · 一块深色光滑板面（如旧文件夹）。\n\n步骤：在板面贴一条透明膜（可印字或空白），撕下后湿擦板面，再撒少量粉尘，开窗或用电扇吹干。\n\n观察：是否出现淡灰字形轮廓？再对照：这是「刚写的字」，还是「膜和清洁留下的痕」？\n\n要点：文字出现，不等于有人刚刚写过。\n\n\n延伸：换三种清洁液浓度各试一次——只有配套离型剂那瓶能让字再现。像给机制上第二把锁。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 志郎说不是他写的。  \n\n> 可黑板记得他来过——是膜和清洁液，不是幽灵。  \n\n> 哥哥说，字可以回来，人也会算错。\n\n> 我觉得，大家记得的，是 **志郎总在动手** 这件事。\n\n\n今天我在家 **试** 了哥哥的实验。\n\n\n透明膜 湿擦后撒粉—— 字回来了。\n\n\n没有人写。是板和膜记得。\n\n\n哥哥说，  \n\n出现≠刚写。\n\n\n我觉得，  \n\n大家 看见对不起三个字，  \n\n就 以为对不起三个人——\n\n志郎 、观察社、公开日——都该低头。\n\n\n可 真正该写进登记表的，  \n\n是 他没登记那一行。\n\n\n黑板记住了一句没有人写过的道歉。\n\n\n松本同学没有写那三个字。  \n\n可他确实在黑板上做过实验，  \n\n还忘了把这件事记下来。\n\n\n我问哥哥：「为什么大家宁愿相信字，也不相信没写？」\n\n\n哥哥说：「因为出现比没出现更好讲。」\n\n\n我觉得，志郎 **总在动手** 这件事，\n\n被大家记成了总会做错这件事。\n\n\n哥哥说，  \n\n洗清自己不是把所有责任都擦掉。\n\n\n有些字不是你写的，你可以说不是。  \n\n有些痕迹是你留下的，也要承认是。\n\n\n我觉得，  \n\n真正的「对不起」不是黑板上那三个字。  \n\n是一个人终于肯把自己做过的那一小块，  \n\n放回事情里面。\n\n\n——第二案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A002\n\n\n---\n\n【EDITOR · PRODUCTION META · A002 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A002】\n\n  · 案②《没有人写过的道歉》\n\n  · 案号：A002 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n  · 八秒句：黑板上写着对不起，可写字的人根本没进教室。\n\n  · 错误责任：松本志郎因破坏器材而在黑板上秘密认错。\n\n  · 真实责任：透明膜残留+清洁显字；志郎未登记材料测试。\n\n  · FC概要：FC-1 膜边反光 · FC-2 握笔角度不符 · FC-3 清洁后再现 · FC-4 样品袋标签\n\n  · 钩子：透明膜、清洁流程 → 壁报「记得」海报 → A003\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 膜到黑板 · SC-02 对不起出现 · SC-03 证据格\n\nSC-04 擦后再现 · SC-05 膜边/角度 · SC-06 误指峰值\n\nSC-07 对照实验 · SC-08 登记修复 · SC-09 壁报尾钩\n\nFC-1 膜边缘反光 · FC-2 字迹与握笔角度不符 · FC-3 清洁后再现时序 · FC-4 样品袋标签\n\nwrong_responsibility：志郎秘密写道歉反复擦 · true_responsibility：膜+清洁显字；未登记材料\n\nrelation：A001 shared_source → A003 壁报「记得」· mirror\n\n科学样本：V2迁移/05_科学验证/P0_科学顾问签核记录_V0.2.md §A002\n\n---\n\n【EDITOR NOTE · C4 · 2026-06-08】\n器材车在本案为 **运输/侧廊展示板/物件经过** · **非** 透明膜显字 direct 物理因。\n下一修订 pass：弱化「车=机制主因」叙述 · 保留膜+清洁+侧廊压力场。\nSSOT：V2迁移/16_V2空间资产复用… §7 · 20_C1-C7_IP裁定 C4 · 正文本批次不改场景。", "paragraphs": ["《学堂趣事录》", "第1卷 · 觉得奇 更好讲。」", "我觉得，志郎 **总在动手** 这件事，", "被大家记成了总会做错这件事。", "哥哥说，", "洗清自己不是把所有责任都擦掉。", "有些字不是你写的，你可以说不是。", "有些痕迹是你留下的，也要承认是。", "我觉得，", "真正的「对不起」不是黑板上那三个字。", "是一个人终于肯把自己做过的那一小块，", "放回事情里面。", "——第二案完——", "---", "【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A002", "---", "【EDITOR · PRODUCTION META · A002 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A002】", "· 案②《没有人写过的道歉》", "· 案号：A002 · Engine V2.0 · Campus Ripple", "· 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08", "· 八秒句：黑板上写着对不起，可写字的人根本没进教室。", "· 错误责任：松本志郎因破坏器材而在黑板上秘密认错。", "· 真实责任：透明膜残留+清洁显字；志郎未登记材料测试。", "· FC概要：FC-1 膜边反光 · FC-2 握笔角度不符 · FC-3 清洁后再现 · FC-4 样品袋标签", "· 钩子：透明膜、清洁流程 → 壁报「记得」海报 → A003\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08", "---", "【V2.0 场级对照 · G-SHOT-T ready】", "SC-01 膜到黑板 · SC-02 对不起出现 · SC-03 证据格", "SC-04 擦后再现 · SC-05 膜边/角度 · SC-06 误指峰值", "SC-07 对照实验 · SC-08 登记修复 · SC-09 壁报尾钩", "FC-1 膜边缘反光 · FC-2 字迹与握笔角度不符 · FC-3 清洁后再现时序 · FC-4 样品袋标签", "wrong_responsibility：志郎秘密写道歉反复擦 · true_responsibility：膜+清洁显字；未登记材料", "relation：A001 shared_source → A003 壁报「记得」· mirror", "科学样本：V2迁移/05_科学验证/P0_科学顾问签核记录_V0.2.md §A002", "---", "【EDITOR NOTE · C4 · 2026-06-08】\n器材车在本案为 **运输/侧廊展示板/物件经过** · **非** 透明膜显字 direct 物理因。\n下一修订 pass：弱化「车=机制主因」叙述 · 保留膜+清洁+侧廊压力场。\nSSOT：V2迁移/16_V2空间资产复用… §7 · 20_C1-C7_IP裁定 C4 · 正文本批次不改场景。"], "highlights": [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改1稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n二、没有人写过的道歉\n\n--------------------\n\n\n广播的事还没散干净，器材车已经转到5年2組侧廊。侧廊瓷砖还留着案①器材车轮迹，和昨天雨后的细泥不同——是 **干** 的粉灰。\n\n\n志郎抱着那卷透明膜，袋口标签写着：公开日 · 黑板测试 · 未登记。慧美跟在后面，笔还没干：「先测反光，再写记录。」\n\n\n光从走廊那头过来，导播协助的小徽还别在袖口。他看了志郎一眼，没说话，拐进教室。嗓子仍禁声 —— 案①的余波还在空气里。\n\n\n陸珣站在黑板前。板面昨天才擦过，绿得发暗。窗开着一条缝，四月的风把粉笔灰吹到板槽里。槽沿有一圈淡灰，像黑板还没完全睡醒。\n\n\n志郎把膜平铺在备课本上，用裁纸刀慢切一条。刀尖划过，发出细沙一样的声。透明边缘在斜光里亮了一下，像一条细线贴在绿板上。\n\n\n「先测反光，」慧美说，「再测湿擦后再显。」\n\n\n志郎点头，却没在登记表上签字。他总在动手前快一步——案①里，光也快一步转述过没核实的话。\n\n\n本子：**膜 · 标签 · 侧光 · 未登记**。\n\n\n第二天早自习前，值日生推开教室门，愣在原地。\n\n\n黑板上，粉笔字清清楚楚：\n\n\n  对不起。\n\n\n三个字居中。笔画圆钝，像谁 **慢慢** 写过。\n\n\n5年2組教室里，值日生和围观者都踩着 **上履き**。绿板在四月窗缝里发暗，槽沿一圈淡灰还没被风带走。\n\n\n值日生记得自己七点四十五分擦过板。他也记得志郎昨天蹲在这里贴膜——两件事在脑子里自动接在一起，像上一案里「听见」和「看见」自动接在一起。\n\n\n「志郎写的吧？」有人接话，「昨天他就蹲在黑板上搞膜！」\n\n\n话没说完，已经有人 **点头**。点头比查证快。\n\n\n志郎刚进教室，手里还拎着样品袋。他看见字，眉头拧起来：「……不是我。」\n\n\n他的字往右倾；板上的三个字圆钝居中。差别很小。小到不够在一秒里挡住点头。\n\n\n没人接「不是你」这三个字。大家接的是印象：志郎总在动手，总在现场。\n\n\n慧美把笔记本摊在讲台边。四栏格已经画好：**已确认** · **听说** · **仍不知道** · **趣事**。\n\n\n她在 **已确认** 写：字迹出现 · 早自习前 · 黑板中央。  \n\n在 **听说** 写：志郎昨日贴膜 · 志郎查广播线。\n\n仍不知道那一栏空着。她不帮空栏填名字。\n\n\n光压低声音：「先别……」\n\n\n慧美摇头：「观察社不写审判。写格子。」\n\n\n志郎把样品袋放到窗台上，袋口标签朝外。他 **没抢话**，只重复一次：「我没写。」\n\n\n光从后排经过，停了一下。他没接话 —— 案①里，他也曾被听见过。此刻他只看志郎袖口有没有登记回执。没有。\n\n\n陸珣在本子画：字 · 居中 · 圆钝。  \n\n又在旁边画：志郎握笔习惯偏斜 —— 和板上笔画不像。他又补一格：值日生擦过 · 门锁过 · 字仍出现 —— 时间线不对「刚写」。\n\n\n早晨七点五十八分，黑板上只有三个字。值日生说，他七点四十五分擦过黑板。教室门从清扫结束后一直锁着。\n\n\n班主任来了。字被擦掉。板面恢复一片绿。\n\n\n「公开日展示前清扫，」班主任说，「三十分钟。」\n\n\n**事件钟**：清扫后还要测展示。\n\n**社交钟**：志郎若不能「认错」，广播检修记录可能记在他名下。\n\n\n值日生出示门锁记录：7:46–7:57 无人进出 —— 像字在锁门期间自己长出来。\n\n\n值日生拖过水桶。湿抹布擦过黑板，水痕一道一道往下淌。志郎站在一旁，手指捏着膜的边缘，没动。\n\n\n陸珣看见：抹布蹭过板槽，却没揭起那条透明细边。水进去了。粉糊了。\n\n\n擦干净了。大家松一口气。\n\n\n然后——早自习铃响前十分钟，字 **又回来了**。还是那三个字。还是居中。像黑板记得什么，而不是刚有人写过。\n\n\n有女生摸了一下笔画——粉浮在绿面上，没有压进板里的沟。「不像新粉笔 ……」\n\n\n教室里倒抽一口气。\n\n\n「还说不是你？」值日生盯着志郎，「擦了又来，不是反复写是什么？」\n\n\n志郎脸色发白：「我昨晚就没进教室——」\n\n\n「膜是你贴的！」\n\n\n词多了，反而像掩饰。陸珣看见志郎的嘴唇动了一下，又闭上。\n\n\n清扫当番走了。教室空了一半。\n\n\n陸珣没围过去。他站在黑板侧面，看 **斜光**。\n\n\n四月上午的光移动很快。一分钟前膜边不亮，现在亮——像在等人来看。\n\n\n膜的边缘还在——昨天测试没撕干净，一条透明细线贴着板槽。抹布擦字时 **蹭过** 那条边，没蹭掉膜。\n\n\n他蹲下去，看板槽里的粉尘。湿擦过后，粉尘 **糊** 在绿板上，像一层淡灰。\n\n\n志郎忽然开口，声音很短：「……清洁液。」\n\n\n慧美从样品袋里取出小瓶，标签和膜 **配套**。「公开日流程里，」志郎说，「湿擦后要等干再贴膜。昨天我反了 —— 先贴边角，后湿擦演示。」\n\n\n陸珣没抬头，只在本子写：**湿擦 · 粉尘 · 膜边 · 顺序反了**。\n\n\n慧美凑过来，声音也轻：「笔迹角度呢？」\n\n\n陸珣指给她看：板上笔画圆钝居中；志郎平时记设备编号，字往右倾。\n\n\n「已确认：不像他的握笔。」慧美写在格子里。没写「不是他」。只写不像。\n\n\n志郎把膜对着窗。膜背面是反字——湿擦后，粉笔灰停在边缘就会「浮」出来。备课本上一试：压膜、湿擦，板上同形。\n\n\n班主任再次进门时，教室里已经分成两拨。\n\n\n一拨指着志郎：秘密写道歉、擦了又来、破坏展示现场。  \n\n一拨小声说：「观察社又要帮 **动手的人** 说话。」\n\n\n中间还有第三拨——不站队，只拍照发群。慧美拦住：「核实前不发。」\n\n\n志郎被推到黑板前。样品袋捏在手里，标签皱了。\n\n\n「公开日材料 **登记** 有没有你？」班主任问。\n\n\n「……膜是我测的。」志郎说，「字不是我写的。」\n\n\n「谁信？」值日生反问。\n\n\n志郎没骂人。他也没法立刻证明负 —— 没法证明「这三个字不是他的笔迹」之外，还有什么会写字。\n\n\n值日生把门锁记录拍给慧美看：7:46–7:57 无人进出——字却在 7:58 出现。时间线一样：先有「像他」，后有「不可能刚写」。\n\n\n陸珣补一格：锁门 · 字再现 · 膜边未揭 · 更像「显」不是「写」。\n\n\n有人把案① 和案② 接在一起：「动手的人总在现场。」「广播是他，字也是他。」\n\n\n陸珣站在侧窗。他想起上一案屏幕上的 PLAY。怪事换了一种样子：这一次不是声音，是字。可大家仍然只想听见答案。\n\n\n窗缝的光移了一寸。板槽里那条膜边又亮了一下——像在等人来看。\n\n\n他开口，声音不大：「先……看 **板槽**。」\n\n\n班主任看他。\n\n\n「5年2組。陸珣。」慧美答，「观察社 **旁听**。」\n\n\n志郎抬头。眼里不是感谢，是累 —— 和后排水野真帆那种累有点像。\n\n\n黑板上的「对不起」还在。擦不掉 **故事**，因为大家已经连好了：志郎秘密道歉、反复擦除、破坏公开日。\n\n\n志郎把样品袋摊在窗台上，取出配套清洁液。\n\n\n「不是写字。」他说，「是膜留下的。」\n\n\n备课本上一试：压膜、湿擦，字没了；点一点清洁液，旧痕又浮出。\n\n\n「膜边昨天没撕净。」志郎指板槽，「湿擦把粉打进去。清洁液一干，旧痕再显——字不是新写的，是被显出来的。」\n\n\n志郎让三位同学闭眼回忆 「谁写的」 —— 三人都说志郎。睁眼对照握笔角度—— 三人都改口「像膜」但仍不信「没写」。\n\n\n它不是粉笔写成的道歉。更像一枚被黑板暂时记住的印章。\n\n\n对照实验重复三次。每一次湿擦→等干→撒粉→显字，围观仍有人说 「就是志郎写的——他承认做过实验嘛。」\n\n\n慧美只在 **已确认** 写：机制可复现 · 非新写 · 握笔仍不符 · 未登记。\n\n\n志郎声音发涩：「……昨天我测膜，没走 **登记**。」\n\n\n教室里有人哦了一声。不是道歉。是重新算账。\n\n\n班主任看完对照，没让志郎站在板前了。她只说：「展示前 **三十分钟** 清扫，还作数。」\n\n\n志郎点头，从样品袋里抽出登记表。笔迹往右倾，和板上圆钝居中仍不像。\n\n\n他在「备注」栏补一行，写得很慢：\n\n\n  实验也会制造新的现场。\n\n\n他又 补流程三行：贴膜前登记 · 湿擦后等干 · 测试后 整板揭膜—— 像给下一班留说明书。\n\n\n慧美记结论：机制已核对 · 动机已陈述（材料未登记）· 审判词降级为流程。\n\n\n志郎对全班：「对不起，不是这三个字。是 **我没先登记**。」\n\n\n黑板上的「对不起」还在。班主任让人 **整板揭膜** 重擦。字终于没了。\n\n\n揭膜时，板槽发出一声轻粘——像迟到的登记终于被撕下来。\n\n\n光在后排记下流程：「书面说明 · 先机制后动机。」\n\n\n陸珣在本子写：**字可再现 · 人未新写 · 膜未登记**。\n\n\n侧廊传来撕胶带的声音。不是黑板。是 **壁报** 栏。\n\n\n有人嚷：「慧美，你记不记得那张海报？写着 **水野不得参加** 的那张！」\n\n\n慧美笔尖顿住。她明明记得没有贴完 —— 可三个人的口述，连标题大小都不一样。\n\n\n「我也记得有。」第四个声音加入，「红底占半栏。」\n\n\n「我只看见标题条 ……」第五个声音更小。\n\n\n口述 **又开始分叉** —— 像案③ **提前** 在壁报栏 **排练**。\n\n\n陸珣看向壁报栏。昨天黑板安静了，那里却像还记得什么从没整张贴出的东西。\n\n\n午休前，观察社把那张透明膜放回媒体器材车。慧美在每张膜的角上贴了编号。光负责按日期重命名音频文件。\n\n\n器材车侧面的磁性展示板上已经贴了许多零散材料：一张水野的排练照片、一条红色标题「不得参加」、一枚蓝色箭头。车转过走廊拐角时，轮子压过门槛。磁铁轻轻滑了一下。红色的「不得参加」，停在水野照片正上方——只有两秒。\n\n\n陸珣拿出学校公用相机，拍了一张。「因为有些东西只出现两秒。」他说，「两天以后，大家可能会记得它出现过很久。」\n\n\n慧美把照片贴进笔记本「听说」栏旁边—— 不升格成「已确认海报」。\n\n\n志郎 **检查** 车磁铁力度：「公开日前要换强磁条。」\n\n\n光记尾钩：壁报 · 记得 · **无实体** —— 案③的门已经开了。\n\n\n班主任 没有让志郎再站黑板前道歉三个字。她让全班看对照实验——像公开日前的最后一堂「出现≠刚写」课。\n\n\n有同学仍说：「他动手的人嘛。」慧美只在格子写：动手·已确认·不等于写字。\n\n\n志郎补登记时，手仍抖——不是怕字，是怕下次又忘登记。光在后排记：案②repair=流程+动机陈述，不是黑板三字。\n\n\n慧美把四栏格举给全班看——不是审判台，是过滤器。\n\n\n「已确认」只收看得见的：字在、膜在、志郎昨日贴膜。\n\n\n「听说」收印象：他总在动手、他查过广播线。\n\n\n「仍不知道」空着——不填名字。像案③预告。\n\n\n陸珣在旁听席记：格子比点头慢，但比点头准。\n\n\n值日生 后来承认：擦黑板时没注意膜边——不是帮志郎 hide， 是帮黑板 remember。\n\n\n志郎 对慧美说：「下次我先登记，再动手。」慧美只点头：「写进repair，不写进审判。」\n\n\n陸珣 给低年级看案②抓拍：「两秒像整张海报——案③会考这题。」他们不懂，但记住了「两秒」两个字。\n\n\n侧窗 斜光再移一寸，膜边又亮。陸珣请全班安静三秒——三秒里只听见四月风和粉笔槽里细灰。\n\n\n「** 先看板槽。」他第四句对外话。班主任顺着看——膜边像一条没撕净的线。\n\n\n志郎 眼里不是感谢，是累——和后排水野那种累同family。误会换了载体，累没换。\n\n\n志郎 把对照做给全班看第二遍：湿擦→等干→撒粉→字浮。有人仍说「你练过所以会」。慧美：「练过的是流程，不是撒谎。」\n\n\n早自习 铃还没响，对不起三字已在黑板上等。等的不是志郎——是所有人心里那个「动手的人」。\n\n\n值日生 手还湿着——湿擦是字能回来的第一把钥匙。第二把是膜边。第三把是清洁液。三把钥匙都在志郎样品袋里，却没人先看袋。\n\n\n志郎 用备课本压印再湿擦的对照，在窗边做第三遍给迟到的同学看。第三遍才有人说：「像印章，不像字。」——公平线索需要重复才可见。\n\n\n登记表 备注「实验也会制造新的现场」贴在样品袋——像给案③留：出现的字也可能只是现场，不是意图。\n\n\n公开日前夜，志郎把膜边、湿擦、清洁液写进流程卡给下一班值日：出现不等于刚写。陸珣在旁听席记：案②公平线索=锁门时段+膜边+握笔不符+对照可复现。\n\n\n慧美 把案②四栏誊进观察栏：机制已核·流程已补·审判词已降级——尾钩指向壁报两秒抓拍与「记得」海报。案②repair完成，误传换地方等案③。观察社记录：出现不等于刚写，流程先于审判。\n\n\n（案② 收束 · L2 → 案③ · mirror）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：透明胶带或保鲜膜 · 湿抹布 · 少量粉笔灰或爽身粉 · 一块深色光滑板面（如旧文件夹）。\n\n步骤：在板面贴一条透明膜（可印字或空白），撕下后湿擦板面，再撒少量粉尘，开窗或用电扇吹干。\n\n观察：是否出现淡灰字形轮廓？再对照：这是「刚写的字」，还是「膜和清洁留下的痕」？\n\n要点：文字出现，不等于有人刚刚写过。\n\n\n延伸：换三种清洁液浓度各试一次——只有配套离型剂那瓶能让字再现。像给机制上第二把锁。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 志郎说不是他写的。  \n\n> 可黑板记得他来过——是膜和清洁液，不是幽灵。  \n\n> 哥哥说，字可以回来，人也会算错。\n\n> 我觉得，大家记得的，是 **志郎总在动手** 这件事。\n\n\n今天我在家 **试** 了哥哥的实验。\n\n\n透明膜 湿擦后撒粉—— 字回来了。\n\n\n没有人写。是板和膜记得。\n\n\n哥哥说，  \n\n出现≠刚写。\n\n\n我觉得，  \n\n大家 看见对不起三个字，  \n\n就 以为对不起三个人——\n\n志郎 、观察社、公开日——都该低头。\n\n\n可 真正该写进登记表的，  \n\n是 他没登记那一行。\n\n\n黑板记住了一句没有人写过的道歉。\n\n\n松本同学没有写那三个字。  \n\n可他确实在黑板上做过实验，  \n\n还忘了把这件事记下来。\n\n\n我问哥哥：「为什么大家宁愿相信字，也不相信没写？」\n\n\n哥哥说：「因为出现比没出现更好讲。」\n\n\n我觉得，志郎 **总在动手** 这件事，\n\n被大家记成了总会做错这件事。\n\n\n哥哥说，  \n\n洗清自己不是把所有责任都擦掉。\n\n\n有些字不是你写的，你可以说不是。  \n\n有些痕迹是你留下的，也要承认是。\n\n\n我觉得，  \n\n真正的「对不起」不是黑板上那三个字。  \n\n是一个人终于肯把自己做过的那一小块，  \n\n放回事情里面。\n\n\n——第二案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A002\n\n\n---\n\n【EDITOR · PRODUCTION META · A002 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A002】\n\n  · 案②《没有人写过的道歉》\n\n  · 案号：A002 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n  · 八秒句：黑板上写着对不起，可写字的人根本没进教室。\n\n  · 错误责任：松本志郎因破坏器材而在黑板上秘密认错。\n\n  · 真实责任：透明膜残留+清洁显字；志郎未登记材料测试。\n\n  · FC概要：FC-1 膜边反光 · FC-2 握笔角度不符 · FC-3 清洁后再现 · FC-4 样品袋标签\n\n  · 钩子：透明膜、清洁流程 → 壁报「记得」海报 → A003\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 膜到黑板 · SC-02 ），撕下后湿擦板面，再撒少量粉尘，开窗或用电扇吹干。", "观察：是否出现淡灰字形轮廓？再对照：这是「刚写的字」，还是「膜和清洁留下的痕」？", "要点：文字出现，不等于有人刚刚写过。", "延伸：换三种清洁液浓度各试一次——只有配套离型剂那瓶能让字再现。像给机制上第二把锁。", "---", "瑆笔记 · 第二真相", "----------------", "> 志郎说不是他写的。", "> 可黑板记得他来过——是膜和清洁液，不是幽灵。", "> 哥哥说，字可以回来，人也会算错。", "> 我觉得，大家记得的，是 **志郎总在动手** 这件事。", "今天我在家 **试** 了哥哥的实验。", "透明膜 湿擦后撒粉—— 字回来了。", "没有人写。是板和膜记得。", "哥哥说，", "出现≠刚写。", "我觉得，", "大家 看见对不起三个字，", "就 以为对不起三个人——", "志郎 、观察社、公开日——都该低头。", "可 真正该写进登记表的，", "是 他没登记那一行。", "黑板记住了一句没有人写过的道歉。", "松本同学没有写那三个字。", "可他确实在黑板上做过实验，", "还忘了把这件事记下来。", "我问哥哥：「为什么大家宁愿相信字，也不相信没写？」", "哥哥说：「因为出现比没出现更好讲。」", "我觉得，志郎 **总在动手** 这件事，", "被大家记成了总会做错这件事。", "哥哥说，", "洗清自己不是把所有责任都擦掉。", "有些字不是你写的，你可以说不是。", "有些痕迹是你留下的，也要承认是。", "我觉得，", "真正的「对不起」不是黑板上那三个字。", "是一个人终于肯把自己做过的那一小块，", "放回事情里面。", "——第二案完——", "---", "【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A002", "---", "【EDITOR · PRODUCTION META · A002 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A002】", "· 案②《没有人写过的道歉》", "· 案号：A002 · Engine V2.0 · Campus Ripple", "· 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08", "· 八秒句：黑板上写着对不起，可写字的人根本没进教室。", "· 错误责任：松本志郎因破坏器材而在黑板上秘密认错。", "· 真实责任：透明膜残留+清洁显字；志郎未登记材料测试。", "· FC概要：FC-1 膜边反光 · FC-2 握笔角度不符 · FC-3 清洁后再现 · FC-4 样品袋标签", "· 钩子：透明膜、清洁流程 → 壁报「记得」海报 → A003\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08", "---", "【V2.0 场级对照 · G-SHOT-T ready】", "SC-01 膜到黑板 · SC-02 对不起出现 · SC-03 证据格", "SC-04 擦后再现 · SC-05 膜边/角度 · SC-06 误指峰值", "SC-07 对照实验 · SC-08 登记修复 · SC-09 壁报尾钩", "FC-1 膜边缘反光 · FC-2 字迹与握笔角度不符 · FC-3 清洁后再现时序 · FC-4 样品袋标签", "wrong_responsibility：志郎秘密写道歉反复擦 · true_responsibility：膜+清洁显字；未登记材料", "relation：A001 shared_source → A003 壁报「记得」· mirror", "科学样本：V2迁移/05_科学验证/P0_科学顾问签核记录_V0.2.md §A002", "---", "【EDITOR NOTE · C4 · 2026-06-08】\n器材车在本案为 **运输/侧廊展示板/物件经过** · **非** 透明膜显字 direct 物理因。\n下一修订 pass：弱化「车=机制主因」叙述 · 保留膜+清洁+侧廊压力场。\nSSOT：V2迁移/16_V2空间资产复用… §7 · 20_C1-C7_IP裁定 C4 · 正文本批次不改场景。"], "highlights": [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改2稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n序 · 黑板上的三个字\n\n------------------\n\n\n教室门关着。\n\n\n黑板上，粉笔字清清楚楚：\n\n\n  对不起。\n\n\n值日生七点四十五分擦过板。门锁记录写：七点四十六到五十七，无人进出。\n\n\n字还在。\n\n\n二、没有人写过的道歉\n\n--------------------\n\n\n侧廊尽头，**观察社角落** 的社徽又翘了。旧笔记墙、证物盒、一块故意留空的壁报栏 —— 木门上 **翘角+观察眼** 的徽记，像在说：空白是给还没核实的事留的。\n\n\n志郎正拿胶带「加固」社徽。贴完，角翘得更高。\n\n\n「更牢了。」\n\n\n慧美把透明膜按回他手里，银框眼镜后的眼睛没笑：「**未登记**。」\n\n\n「更牢了也比掉地上强。」志郎又扯一截胶带。徽记彻底歪向一边。慧美在本子 **听说** 栏写：志郎说更牢了 · 未确认是否更牢。\n\n\n志郎抱着那卷透明膜，袋口标签写着：公开日 · 黑板测试 · **未登记**。慧美跟在后面：「先登记，再测反光。」\n\n\n志郎点头，却没在登记表上签字 —— 他总在动手前快一步。\n\n\n光从走廊过来，导播协助的小徽还别在袖口。嗓子仍 **禁声**，只比出「别传了」。案①的余波还在空气里。\n\n\n陸珣站在黑板前。板面昨天才擦过，绿得发暗。四月的风把粉笔灰吹到板槽里。\n\n\n他看的是 **板槽里的淡灰** —— 不是志郎的脸。\n\n\n第二天早自习前，值日生推开教室门，愣在原地。\n\n\n黑板上，还是那三个字。还是居中。还是圆钝笔画。\n\n\n5年2組教室里，值日生和围观者都踩着 **上履き**。绿板在四月窗缝里发暗。\n\n\n「志郎写的吧？」有人接话，「昨天他就蹲在黑板上搞膜！」\n\n\n志郎刚进教室，手里还拎着样品袋 —— 标签 **仍未登记**。他看见字，眉头拧起来：「……不是我。」\n\n\n他的字往右倾；板上的三个字圆钝居中。差别很小。小到不够在一秒里挡住点头。\n\n\n慧美把笔记本摊在讲台边。四栏格：**已确认** · **听说** · **仍不知道** · **趣事**。\n\n\n她在 **已确认** 写：字迹出现 · 早自习前 · 黑板中央。  \n\n在 **听说** 写：志郎昨日贴膜 · 标签未登记。\n\n\n志郎把样品袋放到窗台上，袋口朝外。他 **没抢话**，只重复：「我没写。」\n\n\n光从后排经过，停了一下。他没接话 —— 案①里，他也曾被听见过。此刻他只看志郎袖口有没有登记回执。没有。\n\n\n陸珣在本子画：字 · 居中 · 圆钝 · 门锁着 · 字仍在。\n\n\n早晨七点五十八分，班主任来了。字被擦掉。板面恢复一片绿。\n\n\n「公开日展示前清扫，」班主任说，「三十分钟。」\n\n\n**事件钟**：清扫后还要测展示。\n\n**社交钟**：志郎若不能「认错」，广播检修记录可能记在他名下。\n\n\n值日生拖过水桶。湿抹布擦过黑板，水痕一道一道往下淌。志郎站在一旁，手指捏着膜的边缘 —— 慧美提醒：「登记表呢？」\n\n\n「……测完就登记。」志郎说。\n\n\n陸珣看见：抹布蹭过板槽，却没揭起那条透明细边。水进去了。粉糊了。\n\n\n擦干净了。大家松一口气。\n\n\n然后——早自习铃响前十分钟，字 **又回来了**。还是那三个字。还是居中。像黑板记得什么，而不是刚有人写过。\n\n\n有女生摸了一下笔画——粉浮在绿面上，没有压进板里的沟。「不像新粉笔 ……」\n\n\n教室里倒抽一口气。\n\n\n「还说不是你？」值日生盯着志郎，「擦了又来，不是反复写是什么？」\n\n\n志郎脸色发白：「我昨晚就没进教室——」\n\n\n「膜是你贴的！标签 **还没登记**！」\n\n\n志郎嘴唇动了一下，又闭上。慧美在 **趣事** 栏补一行：志郎说测完就登记 · 字却先回来了。\n\n\n词多了，反而像掩饰。陸珣看见志郎的肩膀缩了一下 —— 像怕「动手的人」这四个字又贴回来。\n\n\n清扫当番走了。教室空了一半。\n\n\n陸珣没围过去。他站在黑板侧面，看 **斜光**。\n\n\n四月上午的光移动很快。一分钟前膜边不亮，现在亮——像在等人来看。\n\n\n膜的边缘还在——昨天测试没撕干净，一条透明细线贴着板槽。抹布擦字时 **蹭过** 那条边，没蹭掉膜。\n\n\n他蹲下去，看板槽里的粉尘。湿擦过后，粉尘 **糊** 在绿板上，像一层淡灰。\n\n\n志郎忽然开口，声音很短：「……清洁液。」\n\n\n慧美从样品袋里取出小瓶，标签和膜 **配套** —— 她先补登记：膜 · 清洁液 · 配套 · **今日补登**。\n\n\n「公开日流程里，」志郎说，「湿擦后要等干再贴膜。昨天我反了 —— 先贴边角，后湿擦演示。」\n\n\n陸珣没抬头，只在本子写：**湿擦 · 粉尘 · 膜边 · 顺序反了**。\n\n\n慧美凑过来，声音也轻：「笔迹角度呢？」\n\n\n陸珣指给她看：板上笔画圆钝居中；志郎平时记设备编号，字往右倾。\n\n\n「已确认：不像他的握笔。」慧美写在格子里。没写「不是他」。只写不像。\n\n\n志郎把膜对着窗。膜背面是反字——湿擦后，粉笔灰停在边缘就会「浮」出来。备课本上一试：压膜、湿擦，板上同形。\n\n\n班主任再次进门时，教室里已经分成两拨。\n\n\n一拨指着志郎：秘密写道歉、擦了又来、破坏展示现场。  \n\n一拨小声说：「观察社又要帮 **动手的人** 说话。」\n\n\n中间还有第三拨——不站队，只拍照发群。慧美拦住：「核实前不发。」\n\n\n志郎被推到黑板前。样品袋捏在手里，标签皱了 —— 角上刚补写的登记时间还是湿的。\n\n\n「公开日材料 **登记** 有没有你？」班主任问。\n\n\n「……膜是我测的。」志郎说，「字不是我写的。」\n\n\n「谁信？」值日生反问。\n\n\n志郎没骂人。他也没法立刻证明负 —— 没法证明「这三个字不是他的笔迹」之外，还有什么会写字。\n\n\n值日生把门锁记录拍给慧美看：7:46–7:57 无人进出——字却在 7:58 出现。时间线一样：先有「像他」，后有「不可能刚写」。\n\n\n陸珣补一格：锁门 · 字再现 · 膜边未揭 · 更像「显」不是「写」。\n\n\n有人把案① 和案② 接在一起：「动手的人总在现场。」「广播是他，字也是他。」\n\n\n陸珣站在侧窗。他想起上一案屏幕上的 PLAY。怪事换了一种样子：这一次不是声音，是字。可大家仍然只想听见答案。\n\n\n窗缝的光移了一寸。板槽里那条膜边又亮了一下——像在等人来看。\n\n\n他开口，声音不大：「先……看 **板槽**。」\n\n\n班主任看他。\n\n\n「5年2組。陸珣。」慧美答，「观察社 **旁听**。」\n\n\n志郎抬头。眼里不是感谢，是累 —— 和后排水野真帆那种累有点像。\n\n\n黑板上的「对不起」还在。擦不掉 **故事**，因为大家已经连好了：志郎秘密道歉、反复擦除、破坏公开日。\n\n\n志郎把样品袋摊在窗台上，取出配套清洁液。\n\n\n「不是写字。」他说，「是膜留下的。」\n\n\n备课本上一试：压膜、湿擦，字没了；点一点清洁液，旧痕又浮出。\n\n\n「膜边昨天没撕净。」志郎指板槽，「湿擦把粉打进去。清洁液一干，旧痕再显——字不是新写的，是被显出来的。」\n\n\n志郎让三位同学闭眼回忆 「谁写的」 —— 三人都说志郎。睁眼对照握笔角度—— 三人都改口「像膜」但仍不信「没写」。\n\n\n它不是粉笔写成的道歉。更像一枚被黑板暂时记住的印章。\n\n\n对照实验重复三次。每一次湿擦→等干→撒粉→显字，围观仍有人说 「就是志郎写的——他承认做过实验嘛。」\n\n\n慧美只在 **已确认** 写：机制可复现 · 非新写 · 握笔仍不符 · 未登记。\n\n\n志郎声音发涩：「……昨天我测膜，没走 **登记**。」\n\n\n教室里有人哦了一声。不是道歉。是重新算账。\n\n\n班主任看完对照，没让志郎站在板前了。她只说：「展示前 **三十分钟** 清扫，还作数。」\n\n\n志郎点头，从样品袋里抽出登记表。笔迹往右倾，和板上圆钝居中仍不像。\n\n\n他在「备注」栏补一行，写得很慢：\n\n\n  实验也会制造新的现场。\n\n\n他又 补流程三行：贴膜前登记 · 湿擦后等干 · 测试后 整板揭膜—— 像给下一班留说明书。\n\n\n慧美记结论：机制已核对 · 动机已陈述（材料未登记）· 审判词降级为流程。\n\n\n志郎对全班：「对不起，不是这三个字。是 **我没先登记**。」\n\n\n黑板上的「对不起」还在。班主任让人 **整板揭膜** 重擦。字终于没了。\n\n\n揭膜时，板槽发出一声轻粘——像迟到的登记终于被撕下来。\n\n\n光在后排记下流程：「书面说明 · 先机制后动机。」\n\n\n陸珣在本子写：**字可再现 · 人未新写 · 膜未登记**。\n\n\n侧廊传来撕胶带的声音。不是黑板。是 **壁报** 栏。\n\n\n有人嚷：「慧美，你记不记得那张海报？写着 **水野不得参加** 的那张！」\n\n\n慧美笔尖顿住。她明明记得没有贴完 —— 可三个人的口述，连标题大小都不一样。\n\n\n「我也记得有。」第四个声音加入，「红底占半栏。」\n\n\n「我只看见标题条 ……」第五个声音更小。\n\n\n口述 **又开始分叉** —— 像案③ **提前** 在壁报栏 **排练**。\n\n\n陸珣看向壁报栏。昨天黑板安静了，那里却像还记得什么从没整张贴出的东西。\n\n\n午休前，观察社把那张透明膜放回媒体器材车。慧美在每张膜的角上贴了编号。光负责按日期重命名音频文件。\n\n\n器材车侧面的磁性展示板上已经贴了许多零散材料：一张水野的排练照片、一条红色标题「不得参加」、一枚蓝色箭头。车转过走廊拐角时，轮子压过门槛。磁铁轻轻滑了一下。红色的「不得参加」，停在水野照片正上方——只有两秒。\n\n\n陸珣拿出学校公用相机，拍了一张。「因为有些东西只出现两秒。」他说，「两天以后，大家可能会记得它出现过很久。」\n\n\n慧美把照片贴进笔记本「听说」栏旁边—— 不升格成「已确认海报」。\n\n\n志郎 **检查** 车磁铁力度：「公开日前要换强磁条。」\n\n\n光记尾钩：壁报 · 记得 · **无实体** —— 案③的门已经开了。\n\n\n班主任 没有让志郎再站黑板前道歉三个字。她让全班看对照实验——像公开日前的最后一堂「出现≠刚写」课。\n\n\n有同学仍说：「他动手的人嘛。」慧美只在格子写：动手·已确认·不等于写字。\n\n\n志郎补登记时，手仍抖——不是怕字，是怕下次又忘登记。光在后排记：案②repair=流程+动机陈述，不是黑板三字。\n\n\n慧美把四栏格举给全班看——不是审判台，是过滤器。\n\n\n「已确认」只收看得见的：字在、膜在、志郎昨日贴膜。\n\n\n「听说」收印象：他总在动手、他查过广播线。\n\n\n「仍不知道」空着——不填名字。像案③预告。\n\n\n陸珣在旁听席记：格子比点头慢，但比点头准。\n\n\n值日生 后来承认：擦黑板时没注意膜边——不是帮志郎 hide， 是帮黑板 remember。\n\n\n志郎 对慧美说：「下次我先登记，再动手。」慧美只点头：「写进repair，不写进审判。」\n\n\n陸珣 给低年级看案②抓拍：「两秒像整张海报——案③会考这题。」他们不懂，但记住了「两秒」两个字。\n\n\n侧窗 斜光再移一寸，膜边又亮。陸珣请全班安静三秒——三秒里只听见四月风和粉笔槽里细灰。\n\n\n「** 先看板槽。」他第四句对外话。班主任顺着看——膜边像一条没撕净的线。\n\n\n志郎 眼里不是感谢，是累——和后排水野那种累同family。误会换了载体，累没换。\n\n\n志郎 把对照做给全班看第二遍：湿擦→等干→撒粉→字浮。有人仍说「你练过所以会」。慧美：「练过的是流程，不是撒谎。」\n\n\n早自习 铃还没响，对不起三字已在黑板上等。等的不是志郎——是所有人心里那个「动手的人」。\n\n\n值日生 手还湿着——湿擦是字能回来的第一把钥匙。第二把是膜边。第三把是清洁液。三把钥匙都在志郎样品袋里，却没人先看袋。\n\n\n志郎 用备课本压印再湿擦的对照，在窗边做第三遍给迟到的同学看。第三遍才有人说：「像印章，不像字。」——公平线索需要重复才可见。\n\n\n登记表 备注「实验也会制造新的现场」贴在样品袋——像给案③留：出现的字也可能只是现场，不是意图。\n\n\n公开日前夜，志郎把膜边、湿擦、清洁液写进流程卡给下一班值日：出现不等于刚写。陸珣在旁听席记：案②公平线索=锁门时段+膜边+握笔不符+对照可复现。\n\n\n慧美 把案②四栏誊进观察栏：机制已核·流程已补·审判词已降级——尾钩指向壁报两秒抓拍与「记得」海报。案②repair完成，误传换地方等案③。观察社记录：出现不等于刚写，流程先于审判。\n\n\n（案② 收束 · L2 → 案③ · mirror）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：透明胶带或保鲜膜 · 湿抹布 · 少量粉笔灰或爽身粉 · 一块深色光滑板面（如旧文件夹）。\n\n步骤：在板面贴一条透明膜（可印字或空白），撕下后湿擦板面，再撒少量粉尘，开窗或用电扇吹干。\n\n观察：是否出现淡灰字形轮廓？再对照：这是「刚写的字」，还是「膜和清洁留下的痕」？\n\n要点：文字出现，不等于有人刚刚写过。\n\n\n延伸：换三种清洁液浓度各试一次——只有配套离型剂那瓶能让字再现。像给机制上第二把锁。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 志郎说不是他写的。  \n\n> 可黑板记得他来过——是膜和清洁液，不是幽灵。  \n\n> 哥哥说，字可以回来，人也会算错。\n\n> 我觉得，大家记得的，是 **志郎总在动手** 这件事。\n\n\n今天我在家 **试** 了哥哥的实验。\n\n\n透明膜 湿擦后撒粉—— 字回来了。\n\n\n没有人写。是板和膜记得。\n\n\n哥哥说，  \n\n出现≠刚写。\n\n\n我觉得，  \n\n大家 看见对不起三个字，  \n\n就 以为对不起三个人——\n\n志郎 、观察社、公开日——都该低头。\n\n\n可 真正该写进登记表的，  \n\n是 他没登记那一行。\n\n\n黑板记住了一句没有人写过的道歉。\n\n\n松本同学没有写那三个字。  \n\n可他确实在黑板上做过实验，  \n\n还忘了把这件事记下来。\n\n\n我问哥哥：「为什么大家宁愿相信字，也不相信没写？」\n\n\n哥哥说：「因为出现比没出现更好讲。」\n\n\n我觉得，志郎 **总在动手** 这件事，\n\n被大家记成了总会做错这件事。\n\n\n哥哥说，  \n\n洗清自己不是把所有责任都擦掉。\n\n\n有些字不是你写的，你可以说不是。  \n\n有些痕迹是你留下的，也要承认是。\n\n\n我觉得，  \n\n真正的「对不起」不是黑板上那三个字。  \n\n是一个人终于肯把自己做过的那一小块，  \n\n放回事情里面。\n\n\n——第二案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A002\n\n\n---\n\n【EDITOR · PRODUCTION META · A002 · foot · R3 2026-06-08】 不知道那一栏，她停笔很久，没填「谁删的」。\n\n\n志郎翻器材车备份：公开日班级合照文件夹里，侧廊壁报栏空 —— 没有那张海报。他又查打印登记 · 壁报张贴表 · 教师审批夹 —— 三处皆无 「水野不得参加」 成稿记录。\n\n\n「正式照片没有。」志郎说，「不是拍糊了，是没有。」\n\n\n慧美指尖发白：「……排练照片另存了。还没公开。」\n\n\n这句话像承认什么。人群往前涌一寸。\n\n\n有人嚷：「没有贴完也是你管的！」\n\n\n慧美没辩。她只把仍不知道栏空着 —— 不替空栏填「删稿人」。\n\n\n陸珣没围在慧美前面。他站在侧廊尽头，看远处标题 —— 公开日指引牌上写着「我们眼中的学校」，和口述里的标题只差两个字。\n\n\n又看 **占位**：壁报栏左下角，还留着半枚 **图钉印**，尺寸和口述 C 的「左上角小标题」 **有点像**，又像 **只是旧钉痕**。\n\n\n钉印 旁没有A3残胶矩形—— 像从未贴满过一张整海报。\n\n\n他在本子画：远标题 · 钉印 · 三版式 **不重合** · 无完整轮廓。\n\n\n他们把器材车上的材料摊在空教室地板上：红标题条、水野排练照、蓝箭头、便签、安全说明、空白底纸、四枚磁铁——每一件都真实存在，却没有一件单独构成「水野不得参加展示」。\n\n\n陸珣把空白海报底纸单独举起：「这张从未被贴满。」\n\n\n「昨天车拐弯时，它们排在一起过。」陸珣把前一天拍下的照片放到桌上。画面里，红色「不得参加」在水野照片上方，蓝箭头正好指向她。如果只看两秒，确实像一张完整海报。\n\n\n「两秒像整张。」慧美轻声，「像不等于是。」\n\n\n远标题「我们眼中的学校」+ 钉印 + 口述碎片 → **可能** 拼出 **从未存在** 的 **整张**。\n\n\n班主任来时，壁报栏前已经 **站满**。\n\n\n「壁报张贴须登记。」班主任看慧美，「排练照片为何不并入公开文件夹？」\n\n\n慧美张嘴，又闭上。她看的是志郎手里另一袋样品——里面不是膜，是排练现场的备份卡，角上写着：水野 · 未授权 · 勿播。\n\n\n「……我在保护一段不该被贴出来的声音。」\n\n\n教室侧廊静了一秒。不是理解的静。是重新编故事的静。\n\n\n年级老师暂时收回了观察社编辑展示板的权限。放学前，如果无法说明那张海报是否存在，展示资料将由教师统一保管。\n\n\n慧美点头，没有辩解。她的沉默让走廊里的声音更响。\n\n\n有人把沉默翻译成删稿：「不辩就是默认 ！」\n\n\n光第一次开口，声音低：「她否认的是贴完 —— 你们听成否认存在。」\n\n\n没人接光的气声之后的句子。大家接的是慧美沉默的形状。\n\n\n慧美被请去 **准备室** 前，把笔记本留在折叠桌上。最后一行还没写完：\n\n\n 已确认：无实体完整海报 · 口述 **三版**\n\n\n志郎捡起一张草稿夹页，尺寸和口述 B 的「半栏标题」 对不上 —— 夹页更小，像误把排练分镜当成了成稿。夹页角上铅笔写着：「排练 · 勿贴 · 哭声段打码」—— 不是壁报成稿标题。\n\n\n他们分别采访走廊里的五个人。第一个人只看见红色标题和照片。第二个人没看见，只听第一个人说「水野上了不得参加的海报」。第三个人看到黄色便签，于是补上「公开日」。第四个人记得蓝色边框，其实那是展示板本身。第五个人说名字被划掉，因为他听别人说「她被取消了」。\n\n\n第六个人坚持「红底占半栏」——陸珣请她指壁报栏：空。她愣住：「我明明看见……」\n\n\n「两秒照片和半栏海报不是同一件。」慧美把上一案相机抓拍递过去。\n\n\n第七个人说慧美裁过边——慧美伸出手给看创可贴：「裁的是排练卡角，不是成稿。」\n\n\n每一次转述，都补上一个让故事更完整的细节。没有人撒谎。他们只是在回忆时，把后来听到的内容放回了自己最初看到的两秒钟里。\n\n\n第八个人说看见「水野不得参加公开日展示」完整句——陸珣请她在空白底纸上写标题：写出来的和口述 C 仍不同。\n\n\n第九个人没看见任何海报——但说「大家都在说有」所以觉得自己也见过。像上一案：先有传播，后有记忆。\n\n\n三次强调无实体：打印登记无 · 正式照无 · 残胶轮廓无——第三次写在壁报边，用红铅笔圈空白底纸。\n\n\n陸珣把九份口述画成九张小海报——没有两张相同。像案③的公平线索不是「找到海报」，而是「找不到同一张」。\n\n\n志郎 **又** 查印刷室废纸桶—— 无「水野不得参加」成稿残页。第三次核对「无实体」。\n\n\n陸珣看向侧廊另一头：失物招领柜的玻璃门反着光，像还有下一件怪事在等被打开。\n\n\n准备室门关上。走廊里，故事已经自己跑完：慧美删了海报 · 慧美包庇水野 · 观察社又要帮熟人。\n\n\n「壁报编辑 **资格**，今天就得停。」有人嚷。\n\n\n志郎举起草稿夹页：「这不是成稿。是排练分镜的角。」\n\n\n陸珣在本子写：碎片 ≠ 整张 · 记得 ≠ 见过。\n\n\n慧美做了一张采访表。第一列：你亲眼看见什么？第二列：你后来听见什么？第三列：你现在记得什么？九个人填写后，三列几乎没有一张相同。\n\n\n佐佐木盯着自己的表看了很久。「我真的觉得我看到完整句子了。」「水野的名字呢？」「听别人说的。」\n\n\n他又补一句：「如果没有完整海报，那我记得的是什么？」\n\n\n陸珣只在本子写：完整句 = 碎片 + 转述 + 空白。\n\n\n他不是被骗了。他的大脑只是讨厌不完整。看见标题、照片和箭头以后，它替他把缺少的部分补齐了。补得太自然，以至于他忘了哪些是眼睛看见的，哪些是后来知道的。\n\n\n光翻查班级群的纸质留言记录和校内平板公告。最早的一条留言是：「走廊那张关于水野的海报怎么回事？」没有照片。没有完整描述。但这句话默认「那张海报」已经存在。后面的人不再问「有没有」，只问「为什么」。\n\n\n「第一句话把问题问错了。」陸珣说。\n\n\n慧美点头：「从那以后，所有回答都只能在『海报存在』的前提里选。」\n\n\n她 **又** 补一句：「 **完整海报没有存在过** —— 这不是 **辩护**，是 **已确认**。」\n\n\n修复分三步当众做：\n\n①贴九份采访表——让人看见记忆分叉；  \n\n②贴空白底纸——让人看见「无实体」；  \n\n③贴三标识——让人看见「仍不知道」可以合法空着。\n\n\n观察社把折叠桌又摊开。慧美手还在抖，四栏格却 **写得稳**：\n\n\n**已确认**：无实体完整海报 · 三人口述版式 **不一致** · 正式合照文件夹 **无该图** · 草稿夹页为 **排练分镜角**\n\n\n听说：红底黑字 · 水野不得参加 · 慧美裁边 · 标题左上/居中/半栏三版\n\n\n仍不知道：谁删稿（因无稿可删）\n\n\n她在 **趣事** 栏补一行：\n\n\n 远标题「我们眼中的学校」+ 钉印 + 口述碎片 → 记忆拼出了从没存在过的整张。\n\n\n慧美终于说清动机：「排练照片里……有水野哭的那一段。我不该让那段被贴出来。」\n\n\n放学前，他们在展示板前说明。慧美没有说「你们都记错了」。她先把九份采访表贴出来。\n\n\n「每个人都记得一张海报。」她说，「但大家记得的内容来自不同时间、不同物件和不同人的转述。」\n\n\n她把真实材料一件件贴回原位。最后，空白海报底纸仍旧空着。\n\n\n「没有完整实体。」慧美指空白底纸，「三次核对：打印登记无 · 正式照无 · 残胶轮廓无。」\n\n\n「我没有删除完整海报。」慧美说，「因为 **完整海报没有存在过**。」\n\n\n班主任来时，慧美递上登记表。壁报栏旁，新贴三张 **小标识**：\n\n\n  已确认 · 听说 · 仍不知道\n\n\n修复动作就写在这三张边上—— **不替空栏填名字**。\n\n\n侧廊安静了一截。可误传没停——它只是换了一个抽屉。\n\n\n他们推着媒体器材车回资料室。经过展示准备室时，车轮再次压过门槛。柜子里传来很轻的一声「嗒」。\n\n\n最下方抽屉贴着水野的名字。她走过来，打开。一枚本应在一班展示盒里的蓝色徽章，静静躺在她的抽屉角落。所有人都看见了。这一次，没有任何视觉碎片。东西确实在那里。\n\n\n慧美先在纸上写：\n\n\n  我们亲眼看见：蓝色徽章位于最下层抽屉。  \n\n  我们尚不知道：它怎样进去。\n\n\n采访表贴出后，侧廊静了半分钟。有人问：「所以……海报到底有没有？」\n\n\n慧美指空白底纸：「完整的，没有。碎片，有。记忆把碎片拼满了空白。」\n\n\n陸珣在本子画：空白·三版·无实体——公平线索不是找到海报，是找不到同一张。\n\n\n光补一句：「完整海报没有——这句要早说。」\n\n\n让开半步的动作，像给慧美留一个审判席。她没坐。只把笔记本摊在折叠桌——席位换成格子。\n\n\n走廊越长，故事越满：删稿、包庇、观察社特权。每一个词都不需要完整海报，只需要慧美沉默过。\n\n\n空教室地板上七件物件围成圈——像案③的「反海报」：每件都真，没有一件是成稿。\n\n\n黄色便签写「节目调整中」；安全说明写「不得参加搬运」——口述时，它们被听成「水野不得参加」。\n\n\n陸珣把七件拍成一圈照片：「碎片≠整张。这张照片才是案③的实体。」\n\n\n九份表贴墙后，佐佐木问：「那我该信哪张？」慧美：「信你第一列——你亲眼看见的。第三列若更满，说明后来听太多。」\n\n\n三人 背身画海报后，陸珣把三张纸叠在空白底纸上——没有一张能贴满A3。\n\n\n「** 记得的，是三张不同的海报。」他说。「学校找不到第四张——因为完整的从未存在。」\n\n\n壁报资格要停的喊声里，慧美没哭。只把采访表抱紧——像抱一叠「仍不知道」的证据。\n\n\n志郎 举草稿夹页：「排练分镜角≠成稿。」有人接：「那也说明你藏东西！」光气声：「藏排练声≠删海报。」\n\n\n嗒一声后，慧美纸上两行成为案④的第一格：看见徽章在抽屉·不知如何进入。不写偷。\n\n\n打印 登记无、正式照无、残胶无——志郎把三句写在透明胶带上贴空白底纸边。像给「无实体」立碑。\n\n\n慧美 指尖白：「排练照片另存……」被听成「我藏了成稿」。她后来说：沉默的代价，是别人替你写满空白。\n\n\n第三次 强调无实体时，低年级问：「那大家记得的是什么？」慧美：「碎片、转述、和讨厌空白的脑子。」\n\n\n七件 物件摊圈后，陸珣请每人只选一件写「海报标题」——七个标题仍不同。完整海报在记忆里，不在地上。\n\n\n九表 贴墙后，三标识贴旁：已确认·听说·仍不知道成为案③repair的可见部分。第四栏空白留给下案——失物柜的嗒声。\n\n\n打印无、正式照无、残胶无——第三次写在公开说明横幅上：完整海报从未存在过。慧美说：沉默的代价，是别人替你写满空白。repair=九表+空白底纸+三标识，不替空栏填删稿人。\n\n\n失物柜打开前，慧美把采访表最后一行读出来：「完整海报没有存在过——这不是辩护，是已确认。」侧廊风把纸角掀起，她用胶带压平——像预演案⑤壁报。\n\n\n陸珣补笔记：案③FC总结——口述三版不重合·打印正式照残胶三无·两秒抓拍≠半栏海报·空白底纸仍空。失物柜的嗒声，是案④的第一格已确认。慧美不喊偷——只写：看见徽章在抽屉，尚不知如何进入。三标识贴壁后，案③repair完成。完整海报从未存在——三次核对无实体写进观察栏档案，供案④失物柜对照：实体在时，先写机制再写名字。陸珣记：案③八秒句——都记得，却找不到完整一张。观察社档案袋上贴空白底纸复印件——袋口写：无实体×3核对済。案③收——记得≠见过同一张，沉默≠删稿，空白可以合法空着。三标识成为全单元规矩预告——已确认·听说·仍不知道。案③八秒句归档：都记得，却找不到完整一张。失物柜嗒声后，案③向案④递交第一格：看见实体·不知进入方式。案③repair完成，误传进抽屉。三标识·九表·空白底纸——案③完。\n\n\n（案③ 收束 · L3 → 案④ · puzzle_piece）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：三张不同颜色的纸条（写「不得参加」「公开日」、贴一张小人照片）· 一枚箭头贴纸。\n\n步骤：把三张纸条 **分开** 摆在桌上。请三位家人各看两秒钟，然后背过身描述「你看见的海报」。\n\n观察：三人描述是否像同一张完整海报？再 **拼在一起** 给第四人看——是否像「一直贴在那里」？\n\n要点：所有人都记得，不等于所有人见过同一件东西。空白会让人把碎片拼成 **从未存在** 的整张。\n\n\n**追问实验**：请第四人只看上一案两秒抓拍——能否画出「半栏红底海报」？多数会画——像案③机制的家庭版。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 大家记得同一张海报。  \n\n> 可画出来，连标题 **放哪** 都不一样。\n\n> 哥哥说，也许是 **碎片** 拼错了。\n\n> 我觉得，慧美沉默的时候，大家已经替她判完了。\n\n\n今天有一张所有人都记得的海报。\n\n\n它没有被撕掉。  \n\n也没有被藏起来。\n\n\n**因为它从来没有完整地存在过。**\n\n\n哥哥 **画** 了三张「大家记得的海报」。\n\n三张 **连标题放哪** 都不一样。\n\n\n我觉得，记得有时候比看见更满 —— \n\n满到把空白也填满了。\n\n\n有人看见标题，  \n\n有人看见照片，  \n\n有人听见别人说了一句话。\n\n\n后来，大家把这些东西放进同一张记忆里。\n\n\n哥哥说，人不喜欢空白。\n\n\n我觉得，  \n\n空白不是一定要马上填满的地方。  \n\n有时候，「我还不知道」  \n\n比一个很完整、却把别人困住的故事更诚实。\n\n\n哥哥 **教** 我画三种海报—— 标题放哪都不一样。\n\n\n没有一张是同一张。\n\n\n慧美 姐姐沉默的时候，  \n\n大家 帮她把空白填成「删稿」。\n\n\n我觉得，  \n\n沉默有时候是保护——\n\n不是删东西的证据。\n\n\n——第三案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对 \n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A003", "---", "【EDITOR · PRODUCTION META · A003 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A003】", "· 案③《每个人都记得的海报》", "· 案号：A003 · Engine V2.0 · Campus Ripple", "· 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08", "· 八秒句：全班都记得那张海报——可学校连一张完整的都找不到。", "· 错误责任：加藤慧美删除一张排斥水野的海报，替同学掩盖事实。", "· 真实责任：无完整实体海报；慧美为保护排练照片沉默，空白被传言填满。", "· FC概要：FC-1 口述版式不一致 · FC-2 正式照无海报 · FC-3 草稿夹页尺寸不符 · FC-4 远标题+占位", "· 钩子：碎片化信息 → 失物柜/抽屉 → A004\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08", "---", "【V2.0 场级对照 · G-SHOT-T ready】", "SC-01 三版口述 · SC-02 指认慧美 · SC-03 证据格/正式照无", "SC-04 远标题+钉印 · SC-05 排练卡压力 · SC-06 三版本", "SC-07 误指峰值 · SC-08 三标识/repair · SC-09 失物柜尾钩", "FC-1 口述版式不一致 · FC-2 正式照片无海报 · FC-3 草稿夹页尺寸不符 · FC-4 远标题占位", "wrong_responsibility：慧美删稿包庇 · true_responsibility：无实体海报；保护排练声音沉默", "relation：A002 mirror → A004 失物柜钩", "科学样本：V2迁移/05_科学验证/A001-A005_机制科学验证清单_V0.2.md §A003", "---", "【EDITOR NOTE · C4 · 2026-06-08】\n器材车在本案为 **备份文件夹/视觉材料运输/门槛经过** · **非**「无实体海报」direct 机制因。\n下一修订 pass：壁报栏+口述不一致为主 · 车仅动线/物件经过。\nSSOT：V2迁移/16_V2空间资产复用… §7 · 20_C1-C7_IP裁定 C4 · 正文本批次不改场景。"], "highlights": [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改1稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n三、每个人都记得的海报\n\n----------------------\n\n\n公开日周，侧廊 **壁报** 栏还留着昨天黑板的胶带印。志郎揭膜的声音远了，这里换成人声。\n\n\n「那张海报呢？」值日生指着空栏，「写着水野不得参加的—— 红底黑字，标题占半栏。」\n\n\n「我明明记得贴在这。」另一个女生接话，「慧美 **亲手裁** 的边。」\n\n\n第三个声音更小：「标题在左上角，不是居中。字更粗。」\n\n\n三个人，三种 **版式**。没有一张 **完整的** 照片可对。\n\n\n陸珣让三人背过身，各画一张「你记得的海报」。三张纸并排：A 红底半栏 · B 左上粗标题 · C 居中黑字—— 连边框都不重合。\n\n\n公开日展示板上，现在只剩四枚磁铁和一块长方形的空白。空白的大小刚好能容下一张A3海报。没有原稿。没有打印记录。没有残胶完整轮廓 —— 像从未贴满过。\n\n\n侧廊是引き戸那一侧：瓷砖干灰，四栏壁报镶在铝窗下，四月的光把 **空栏** 和 **钉印** 切得清清楚楚。人人 **上履き**，鞋边不留泥。\n\n\n陸珣在本子画：口述 A · B · C · **无实体**。\n\n\n慧美从5年1組过来，笔记本还没翻开，已经有人让开半步 —— 不是欢迎，是留证距离。\n\n\n「观察社 **删稿** 了吧？」\n\n\n「壁报编辑 **资格** 不是你们说了算吗？」\n\n\n慧美停住。她没否认记得那张海报。她否认的是另一件事：「…… 没有贴完。」\n\n\n「什么叫没贴完？」有人追问，「你裁过边总是真的吧？」\n\n\n没人接「没有贴完」。大家接的是印象：慧美管壁报 · 慧美认识水野 · 慧美沉默过。\n\n\n光站在人群外，袖口的小徽没亮。他不抢话 —— 上一案里，他也曾被听见过。此刻他只记一件事：没有人拿出完整海报的照片。\n\n\n走廊里的人越来越多。「昨天你不是一直在整理器材车？」「你还把水野的照片收走了。」\n\n\n最后一句话最轻，却像一根线，把前两天发生的事全部串了起来。广播里的声音被解释成误播。黑板上的道歉被解释成材料残留。现在，连一张大家都见过的海报，也要说不存在。\n\n\n这一次，被看的人不是光，也不是志郎。是慧美。\n\n\n慧美把笔记本摊在壁报栏下的折叠桌。四栏格：**已确认** · **听说** · **仍不知道** · **趣事**。\n\n\n她在 **已确认** 写：三人口述版式 **不一致** · 栏位 **无残胶完整轮廓**。  \n\n在 **听说** 写：红底黑字 · 水野不得参加 · 慧美裁边。\n\n仍不知道那一栏，她停笔很久，没填「谁删的」。\n\n\n志郎翻器材车备份：公开日班级合照文件夹里，侧廊壁报栏空 —— 没有那张海报。他又查打印登记 · 壁报张贴表 · 教师审批夹 —— 三处皆无 「水野不得参加」 成稿记录。\n\n\n「正式照片没有。」志郎说，「不是拍糊了，是没有。」\n\n\n慧美指尖发白：「……排练照片另存了。还没公开。」\n\n\n这句话像承认什么。人群往前涌一寸。\n\n\n有人嚷：「没有贴完也是你管的！」\n\n\n慧美没辩。她只把仍不知道栏空着 —— 不替空栏填「删稿人」。\n\n\n陸珣没围在慧美前面。他站在侧廊尽头，看远处标题 —— 公开日指引牌上写着「我们眼中的学校」，和口述里的标题只差两个字。\n\n\n又看 **占位**：壁报栏左下角，还留着半枚 **图钉印**，尺寸和口述 C 的「左上角小标题」 **有点像**，又像 **只是旧钉痕**。\n\n\n钉印 旁没有A3残胶矩形—— 像从未贴满过一张整海报。\n\n\n他在本子画：远标题 · 钉印 · 三版式 **不重合** · 无完整轮廓。\n\n\n他们把器材车上的材料摊在空教室地板上：红标题条、水野排练照、蓝箭头、便签、安全说明、空白底纸、四枚磁铁——每一件都真实存在，却没有一件单独构成「水野不得参加展示」。\n\n\n陸珣把空白海报底纸单独举起：「这张从未被贴满。」\n\n\n「昨天车拐弯时，它们排在一起过。」陸珣把前一天拍下的照片放到桌上。画面里，红色「不得参加」在水野照片上方，蓝箭头正好指向她。如果只看两秒，确实像一张完整海报。\n\n\n「两秒像整张。」慧美轻声，「像不等于是。」\n\n\n远标题「我们眼中的学校」+ 钉印 + 口述碎片 → **可能** 拼出 **从未存在** 的 **整张**。\n\n\n班主任来时，壁报栏前已经 **站满**。\n\n\n「壁报张贴须登记。」班主任看慧美，「排练照片为何不并入公开文件夹？」\n\n\n慧美张嘴，又闭上。她看的是志郎手里另一袋样品——里面不是膜，是排练现场的备份卡，角上写着：水野 · 未授权 · 勿播。\n\n\n「……我在保护一段不该被贴出来的声音。」\n\n\n教室侧廊静了一秒。不是理解的静。是重新编故事的静。\n\n\n年级老师暂时收回了观察社编辑展示板的权限。放学前，如果无法说明那张海报是否存在，展示资料将由教师统一保管。\n\n\n慧美点头，没有辩解。她的沉默让走廊里的声音更响。\n\n\n有人把沉默翻译成删稿：「不辩就是默认 ！」\n\n\n光第一次开口，声音低：「她否认的是贴完 —— 你们听成否认存在。」\n\n\n没人接光的气声之后的句子。大家接的是慧美沉默的形状。\n\n\n慧美被请去 **准备室** 前，把笔记本留在折叠桌上。最后一行还没写完：\n\n\n 已确认：无实体完整海报 · 口述 **三版**\n\n\n志郎捡起一张草稿夹页，尺寸和口述 B 的「半栏标题」 对不上 —— 夹页更小，像误把排练分镜当成了成稿。夹页角上铅笔写着：「排练 · 勿贴 · 哭声段打码」—— 不是壁报成稿标题。\n\n\n他们分别采访走廊里的五个人。第一个人只看见红色标题和照片。第二个人没看见，只听第一个人说「水野上了不得参加的海报」。第三个人看到黄色便签，于是补上「公开日」。第四个人记得蓝色边框，其实那是展示板本身。第五个人说名字被划掉，因为他听别人说「她被取消了」。\n\n\n第六个人坚持「红底占半栏」——陸珣请她指壁报栏：空。她愣住：「我明明看见……」\n\n\n「两秒照片和半栏海报不是同一件。」慧美把上一案相机抓拍递过去。\n\n\n第七个人说慧美裁过边——慧美伸出手给看创可贴：「裁的是排练卡角，不是成稿。」\n\n\n每一次转述，都补上一个让故事更完整的细节。没有人撒谎。他们只是在回忆时，把后来听到的内容放回了自己最初看到的两秒钟里。\n\n\n第八个人说看见「水野不得参加公开日展示」完整句——陸珣请她在空白底纸上写标题：写出来的和口述 C 仍不同。\n\n\n第九个人没看见任何海报——但说「大家都在说有」所以觉得自己也见过。像上一案：先有传播，后有记忆。\n\n\n三次强调无实体：打印登记无 · 正式照无 · 残胶轮廓无——第三次写在壁报边，用红铅笔圈空白底纸。\n\n\n陸珣把九份口述画成九张小海报——没有两张相同。像案③的公平线索不是「找到海报」，而是「找不到同一张」。\n\n\n志郎 **又** 查印刷室废纸桶—— 无「水野不得参加」成稿残页。第三次核对「无实体」。\n\n\n陸珣看向侧廊另一头：失物招领柜的玻璃门反着光，像还有下一件怪事在等被打开。\n\n\n准备室门关上。走廊里，故事已经自己跑完：慧美删了海报 · 慧美包庇水野 · 观察社又要帮熟人。\n\n\n「壁报编辑 **资格**，今天就得停。」有人嚷。\n\n\n志郎举起草稿夹页：「这不是成稿。是排练分镜的角。」\n\n\n陸珣在本子写：碎片 ≠ 整张 · 记得 ≠ 见过。\n\n\n慧美做了一张采访表。第一列：你亲眼看见什么？第二列：你后来听见什么？第三列：你现在记得什么？九个人填写后，三列几乎没有一张相同。\n\n\n佐佐木盯着自己的表看了很久。「我真的觉得我看到完整句子了。」「水野的名字呢？」「听别人说的。」\n\n\n他又补一句：「如果没有完整海报，那我记得的是什么？」\n\n\n陸珣只在本子写：完整句 = 碎片 + 转述 + 空白。\n\n\n他不是被骗了。他的大脑只是讨厌不完整。看见标题、照片和箭头以后，它替他把缺少的部分补齐了。补得太自然，以至于他忘了哪些是眼睛看见的，哪些是后来知道的。\n\n\n光翻查班级群的纸质留言记录和校内平板公告。最早的一条留言是：「走廊那张关于水野的海报怎么回事？」没有照片。没有完整描述。但这句话默认「那张海报」已经存在。后面的人不再问「有没有」，只问「为什么」。\n\n\n「第一句话把问题问错了。」陸珣说。\n\n\n慧美点头：「从那以后，所有回答都只能在『海报存在』的前提里选。」\n\n\n她 **又** 补一句：「 **完整海报没有存在过** —— 这不是 **辩护**，是 **已确认**。」\n\n\n修复分三步当众做：\n\n①贴九份采访表——让人看见记忆分叉；  \n\n②贴空白底纸——让人看见「无实体」；  \n\n③贴三标识——让人看见「仍不知道」可以合法空着。\n\n\n观察社把折叠桌又摊开。慧美手还在抖，四栏格却 **写得稳**：\n\n\n**已确认**：无实体完整海报 · 三人口述版式 **不一致** · 正式合照文件夹 **无该图** · 草稿夹页为 **排练分镜角**\n\n\n听说：红底黑字 · 水野不得参加 · 慧美裁边 · 标题左上/居中/半栏三版\n\n\n仍不知道：谁删稿（因无稿可删）\n\n\n她在 **趣事** 栏补一行：\n\n\n 远标题「我们眼中的学校」+ 钉印 + 口述碎片 → 记忆拼出了从没存在过的整张。\n\n\n慧美终于说清动机：「排练照片里……有水野哭的那一段。我不该让那段被贴出来。」\n\n\n放学前，他们在展示板前说明。慧美没有说「你们都记错了」。她先把九份采访表贴出来。\n\n\n「每个人都记得一张海报。」她说，「但大家记得的内容来自不同时间、不同物件和不同人的转述。」\n\n\n她把真实材料一件件贴回原位。最后，空白海报底纸仍旧空着。\n\n\n「没有完整实体。」慧美指空白底纸，「三次核对：打印登记无 · 正式照无 · 残胶轮廓无。」\n\n\n「我没有删除完整海报。」慧美说，「因为 **完整海报没有存在过**。」\n\n\n班主任来时，慧美递上登记表。壁报栏旁，新贴三张 **小标识**：\n\n\n  已确认 · 听说 · 仍不知道\n\n\n修复动作就写在这三张边上—— **不替空栏填名字**。\n\n\n侧廊安静了一截。可误传没停——它只是换了一个抽屉。\n\n\n他们推着媒体器材车回资料室。经过展示准备室时，车轮再次压过门槛。柜子里传来很轻的一声「嗒」。\n\n\n最下方抽屉贴着水野的名字。她走过来，打开。一枚本应在一班展示盒里的蓝色徽章，静静躺在她的抽屉角落。所有人都看见了。这一次，没有任何视觉碎片。东西确实在那里。\n\n\n慧美先在纸上写：\n\n\n  我们亲眼看见：蓝色徽章位于最下层抽屉。  \n\n  我们尚不知道：它怎样进去。\n\n\n采访表贴出后，侧廊静了半分钟。有人问：「所以……海报到底有没有？」\n\n\n慧美指空白底纸：「完整的，没有。碎片，有。记忆把碎片拼满了空白。」\n\n\n陸珣在本子画：空白·三版·无实体——公平线索不是找到海报，是找不到同一张。\n\n\n光补一句：「完整海报没有——这句要早说。」\n\n\n让开半步的动作，像给慧美留一个审判席。她没坐。只把笔记本摊在折叠桌——席位换成格子。\n\n\n走廊越长，故事越满：删稿、包庇、观察社特权。每一个词都不需要完整海报，只需要慧美沉默过。\n\n\n空教室地板上七件物件围成圈——像案③的「反海报」：每件都真，没有一件是成稿。\n\n\n黄色便签写「节目调整中」；安全说明写「不得参加搬运」——口述时，它们被听成「水野不得参加」。\n\n\n陸珣把七件拍成一圈照片：「碎片≠整张。这张照片才是案③的实体。」\n\n\n九份表贴墙后，佐佐木问：「那我该信哪张？」慧美：「信你第一列——你亲眼看见的。第三列若更满，说明后来听太多。」\n\n\n三人 背身画海报后，陸珣把三张纸叠在空白底纸上——没有一张能贴满A3。\n\n\n「** 记得的，是三张不同的海报。」他说。「学校找不到第四张——因为完整的从未存在。」\n\n\n壁报资格要停的喊声里，慧美没哭。只把采访表抱紧——像抱一叠「仍不知道」的证据。\n\n\n志郎 举草稿夹页：「排练分镜角≠成稿。」有人接：「那也说明你藏东西！」光气声：「藏排练声≠删海报。」\n\n\n嗒一声后，慧美纸上两行成为案④的第一格：看见徽章在抽屉·不知如何进入。不写偷。\n\n\n打印 登记无、正式照无、残胶无——志郎把三句写在透明胶带上贴空白底纸边。像给「无实体」立碑。\n\n\n慧美 指尖白：「排练照片另存……」被听成「我藏了成稿」。她后来说：沉默的代价，是别人替你写满空白。\n\n\n第三次 强调无实体时，低年级问：「那大家记得的是什么？」慧美：「碎片、转述、和讨厌空白的脑子。」\n\n\n七件 物件摊圈后，陸珣请每人只选一件写「海报标题」——七个标题仍不同。完整海报在记忆里，不在地上。\n\n\n九表 贴墙后，三标识贴旁：已确认·听说·仍不知道成为案③repair的可见部分。第四栏空白留给下案——失物柜的嗒声。\n\n\n打印无、正式照无、残胶无——第三次写在公开说明横幅上：完整海报从未存在过。慧美说：沉默的代价，是别人替你写满空白。repair=九表+空白底纸+三标识，不替空栏填删稿人。\n\n\n失物柜打开前，慧美把采访表最后一行读出来：「完整海报没有存在过——这不是辩护，是已确认。」侧廊风把纸角掀起，她用胶带压平——像预演案⑤壁报。\n\n\n陸珣补笔记：案③FC总结——口述三版不重合·打印正式照残胶三无·两秒抓拍≠半栏海报·空白底纸仍空。失物柜的嗒声，是案④的第一格已确认。慧美不喊偷——只写：看见徽章在抽屉，尚不知如何进入。三标识贴壁后，案③repair完成。完整海报从未存在——三次核对无实体写进观察栏档案，供案④失物柜对照：实体在时，先写机制再写名字。陸珣记：案③八秒句——都记得，却找不到完整一张。观察社档案袋上贴空白底纸复印件——袋口写：无实体×3核对済。案③收——记得≠见过同一张，沉默≠删稿，空白可以合法空着。三标识成为全单元规矩预告——已确认·听说·仍不知道。案③八秒句归档：都记得，却找不到完整一张。失物柜嗒声后，案③向案④递交第一格：看见实体·不知进入方式。案③repair完成，误传进抽屉。三标识·九表·空白底纸——案③完。\n\n\n（案③ 收束 · L3 → 案④ · puzzle_piece）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：三张不同颜色的纸条（写「不得参加」「公开日」、贴一张小人照片）· 一枚箭头贴纸。\n\n步骤：把三张纸条 **分开** 摆在桌上。请三位家人各看两秒钟，然后背过身描述「你看见的海报」。\n\n观察：三人描述是否像同一张完整海报？再 **拼在一起** 给第四人看——是否像「一直贴在那里」？\n\n要点：所有人都记得，不等于所有人见过同一件东西。空白会让人把碎片拼成 **从未存在** 的整张。\n\n\n**追问实验**：请第四人只看上一案两秒抓拍——能否画出「半栏红底海报」？多数会画——像案③机制的家庭版。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 大家记得同一张海报。  \n\n> 可画出来，连标题 **放哪** 都不一样。\n\n> 哥哥说，也许是 **碎片** 拼错了。\n\n> 我觉得，慧美沉默的时候，大家已经替她判完了。\n\n\n今天有一张所有人都记得的海报。\n\n\n它没有被撕掉。  \n\n也没有被藏起来。\n\n\n**因为它从来没有完整地存在过。**\n\n\n哥哥 **画** 了三张「大家记得的海报」。\n\n三张 **连标题放哪** 都不一样。\n\n\n我觉得，记得有时候比看见更满 —— \n\n满到把空白也填满了。\n\n\n有人看见标题，  \n\n有人看见照片，  \n\n有人听见别人说了一句话。\n\n\n后来，大家把这些东西放进同一张记忆里。\n\n\n哥哥说，人不喜欢空白。\n\n\n我觉得，  \n\n空白不是一定要马上填满的地方。  \n\n有时候，「我还不知道」  \n\n比一个很完整、却把别人困住的故事更诚实。\n\n\n哥哥 **教** 我画三种海报—— 标题放哪都不一样。\n\n\n没有一张是同一张。\n\n\n慧美 姐姐沉默的时候，  \n\n大家 帮她把空白填成「删稿」。\n\n\n我觉得，  \n\n沉默有时候是保护——\n\n不是删东西的证据。\n\n\n——第三案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A003\n\n\n---\n\n【EDITOR · PRODUCTION META · A003 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A003】\n\n  · 案③《每个人都记得的海报》\n\n  · 案号：A003 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n  · 八秒句：全班都记得那张海报——可学校连一张完整的都找不到。\n\ false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改2稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n序 · 三张不同的海报\n\n------------------\n\n\n「那张海报呢？」\n\n\n「红底黑字，标题占半栏。」\n\n\n「不对，标题在左上角，字更粗。」\n\n\n第三个人更小声：「我明明看见贴在这。」\n\n\n侧廊 **壁报栏** 上，四枚磁铁。一块长方形的 **空白**。\n\n\n没有海报。\n\n\n三、每个人都记得的海报\n\n----------------------\n\n\n公开日周，侧廊 **引き戸** 那一侧还留着昨天黑板的胶带印。四月的光把 **空栏** 和 **钉印** 切得清清楚楚。人人 **上履き**，鞋边不留泥。\n\n\n侧廊尽头，观察社折叠桌旁，**翘角+观察眼** 社徽别在慧美开衫上 —— 像提醒：空白栏不是删稿，是给还没核实的事留的。\n\n\n志郎从器材车折返，翻备份文件夹：「**又查了，还是没有。**」\n\n\n慧美银框眼镜后的眼睛没抬：「听说栏记口述。成稿栏等实体。」\n\n\n志郎 **又** 查打印登记。 **又** 查壁报张贴表。 **又** 查教师审批夹 —— 三处皆无「水野不得参加」成稿记录。\n\n\n「**又查了，还是没有。**」他第三次说，像对自己。\n\n\n陸珣让三人背过身，各画一张「你记得的海报」。三张纸并排：A 红底半栏 · B 左上粗标题 · C 居中黑字 —— 连边框都不重合。\n\n\n本子：**口述 A · B · C · 无实体**。\n\n\n「观察社 **删稿** 了吧？」有人让开半步 —— 不是欢迎，是留证距离。\n\n\n慧美停住。她没否认 **记得** 那张海报。她否认的是另一件事：「…… **没有贴完。**」\n\n\n「什么叫没贴完？」有人追问，「你裁过边总是真的吧？」\n\n\n没人接「没有贴完」。大家接的是印象：慧美管壁报 · 慧美认识水野 · 慧美沉默过。\n\n\n光站在人群外，袖口的小徽没亮。嗓子仍轻 —— 案①里，他也曾被听见过。此刻他只记一件事：没有人拿出完整海报的照片。\n\n\n走廊里的人越来越多。「昨天你不是一直在整理器材车？」「你还把水野的照片收走了。」\n\n\n最后一句话最轻，却像一根线，把前两天发生的事全部串了起来。广播里的声音被解释成误播。黑板上的道歉被解释成材料残留。现在，连一张大家都见过的海报，也要说不存在。\n\n\n这一次，被看的人不是光，也不是志郎。是慧美。\n\n\n慧美把笔记本摊在壁报栏下的折叠桌。四栏格：**已确认** · **听说** · **仍不知道** · **趣事**。\n\n\n她在 **已确认** 写：三人口述版式 **不一致** · 栏位 **无残胶完整轮廓**。  \n\n在 **听说** 写：红底黑字 · 水野不得参加 · 慧美裁边。\n\n仍不知道那一栏，她停笔很久，没填「谁删的」。\n\n\n志郎 **又** 查器材车备份：公开日班级合照文件夹里，侧廊壁报栏空 —— 没有那张海报。\n\n\n「正式照片没有。」志郎说，「不是拍糊了，是 **没有**。」\n\n\n慧美指尖发白：「……排练照片另存了。还没公开。」\n\n\n这句话像承认什么。人群往前涌一寸。\n\n\n有人嚷：「没有贴完也是你管的！」\n\n\n慧美没辩。她只把仍不知道栏空着 —— 不替空栏填「删稿人」。\n\n\n陸珣没围在慧美前面。他站在侧廊尽头，看远处标题 —— 公开日指引牌上写着「我们眼中的学校」，和口述里的标题只差两个字。\n\n\n又看 **占位**：壁报栏左下角，还留着半枚 **图钉印**，尺寸和口述 C 的「左上角小标题」 **有点像**，又像 **只是旧钉痕**。\n\n\n钉印旁没有 A3 残胶矩形 —— 像从未贴满过一张整海报。\n\n\n他在本子画：远标题 · 钉印 · 三版式 **不重合** · 无完整轮廓。\n\n\n他们把器材车上的材料摊在空教室地板上：红标题条、水野排练照、蓝箭头、便签、安全说明、空白底纸、四枚磁铁 —— 每一件都真实存在，却没有一件单独构成「水野不得参加展示」。\n\n\n陸珣把空白海报底纸单独举起：「这张从未被贴满。」\n\n\n「昨天车拐弯时，它们排在一起过。」陸珣把前一天拍下的照片放到桌上。画面里，红色「不得参加」在水野照片上方，蓝箭头正好指向她。如果只看两秒，确实像一张完整海报。\n\n\n「两秒像整张。」慧美轻声，「像不等于是。」\n\n\n远标题「我们眼中的学校」+ 钉印 + 口述碎片 → **可能** 拼出 **从未存在** 的 **整张**。\n\n\n班主任来时，壁报栏前已经 **站满**。\n\n\n「壁报张贴须登记。」班主任看慧美，「排练照片为何不并入公开文件夹？」\n\n\n慧美张嘴，又闭上。她看的是志郎手里另一袋样品 —— 里面不是膜，是排练现场的备份卡，角上写着：水野 · 未授权 · 勿播。\n\n\n「……我在保护一段不该被贴出来的声音。」\n\n\n教室侧廊静了一秒。不是理解的静。是重新编故事的静。\n\n\n年级老师暂时收回了观察社编辑展示板的权限。放学前，如果无法说明那张海报是否存在，展示资料将由教师统一保管。\n\n\n慧美点头，没有辩解。她的沉默让走廊里的声音更响。\n\n\n有人把沉默翻译成删稿：「不辩就是默认 ！」\n\n\n光第一次开口，声音低：「她否认的是贴完 —— 你们听成否认存在。」\n\n\n没人接光的气声之后的句子。大家接的是慧美沉默的形状。\n\n\n慧美被请去 **准备室** 前，把笔记本留在折叠桌上。最后一行还没写完：\n\n\n 已确认：无实体完整海报 · 口述 **三版**\n\n\n志郎捡起一张草稿夹页，尺寸和口述 B 的「半栏标题」 对不上 —— 夹页更小，像误把排练分镜当成了成稿。夹页角上铅笔写着：「排练 · 勿贴 · 哭声段打码」—— 不是壁报成稿标题。\n\n\n他们分别采访走廊里的五个人。第一个人只看见红色标题和照片。第二个人没看见，只听第一个人说「水野上了不得参加的海报」。第三个人看到黄色便签，于是补上「公开日」。第四个人记得蓝色边框，其实那是展示板本身。第五个人说名字被划掉，因为他听别人说「她被取消了」。\n\n\n第六个人坚持「红底占半栏」——陸珣请她指壁报栏：空。她愣住：「我明明看见……」\n\n\n「两秒照片和半栏海报不是同一件。」慧美把上一案相机抓拍递过去。\n\n\n第七个人说慧美裁过边——慧美伸出手给看创可贴：「裁的是排练卡角，不是成稿。」\n\n\n每一次转述，都补上一个让故事更完整的细节。没有人撒谎。他们只是在回忆时，把后来听到的内容放回了自己最初看到的两秒钟里。\n\n\n第八个人说看见「水野不得参加公开日展示」完整句——陸珣请她在空白底纸上写标题：写出来的和口述 C 仍不同。\n\n\n第九个人没看见任何海报——但说「大家都在说有」所以觉得自己也见过。像上一案：先有传播，后有记忆。\n\n\n三次强调无实体：打印登记无 · 正式照无 · 残胶轮廓无——第三次写在壁报边，用红铅笔圈空白底纸。\n\n\n陸珣把九份口述画成九张小海报——没有两张相同。像案③的公平线索不是「找到海报」，而是「找不到同一张」。\n\n\n志郎 **又** 查印刷室废纸桶—— 无「水野不得参加」成稿残页。第三次核对「无实体」。\n\n\n陸珣看向侧廊另一头：失物招领柜的玻璃门反着光，像还有下一件怪事在等被打开。\n\n\n准备室门关上。走廊里，故事已经自己跑完：慧美删了海报 · 慧美包庇水野 · 观察社又要帮熟人。\n\n\n「壁报编辑 **资格**，今天就得停。」有人嚷。\n\n\n志郎举起草稿夹页：「这不是成稿。是排练分镜的角。」\n\n\n陸珣在本子写：碎片 ≠ 整张 · 记得 ≠ 见过。\n\n\n慧美做了一张采访表。第一列：你亲眼看见什么？第二列：你后来听见什么？第三列：你现在记得什么？九个人填写后，三列几乎没有一张相同。\n\n\n佐佐木盯着自己的表看了很久。「我真的觉得我看到完整句子了。」「水野的名字呢？」「听别人说的。」\n\n\n他又补一句：「如果没有完整海报，那我记得的是什么？」\n\n\n陸珣只在本子写：完整句 = 碎片 + 转述 + 空白。\n\n\n他不是被骗了。他的大脑只是讨厌不完整。看见标题、照片和箭头以后，它替他把缺少的部分补齐了。补得太自然，以至于他忘了哪些是眼睛看见的，哪些是后来知道的。\n\n\n光翻查班级群的纸质留言记录和校内平板公告。最早的一条留言是：「走廊那张关于水野的海报怎么回事？」没有照片。没有完整描述。但这句话默认「那张海报」已经存在。后面的人不再问「有没有」，只问「为什么」。\n\n\n「第一句话把问题问错了。」陸珣说。\n\n\n慧美点头：「从那以后，所有回答都只能在『海报存在』的前提里选。」\n\n\n她 **又** 补一句：「 **完整海报没有存在过** —— 这不是 **辩护**，是 **已确认**。」\n\n\n修复分三步当众做：\n\n①贴九份采访表——让人看见记忆分叉；  \n\n②贴空白底纸——让人看见「无实体」；  \n\n③贴三标识——让人看见「仍不知道」可以合法空着。\n\n\n观察社把折叠桌又摊开。慧美手还在抖，四栏格却 **写得稳**：\n\n\n**已确认**：无实体完整海报 · 三人口述版式 **不一致** · 正式合照文件夹 **无该图** · 草稿夹页为 **排练分镜角**\n\n\n听说：红底黑字 · 水野不得参加 · 慧美裁边 · 标题左上/居中/半栏三版\n\n\n仍不知道：谁删稿（因无稿可删）\n\n\n她在 **趣事** 栏补一行：\n\n\n 远标题「我们眼中的学校」+ 钉印 + 口述碎片 → 记忆拼出了从没存在过的整张。\n\n\n慧美终于说清动机：「排练照片里……有水野哭的那一段。我不该让那段被贴出来。」\n\n\n放学前，他们在展示板前说明。慧美没有说「你们都记错了」。她先把九份采访表贴出来。\n\n\n「每个人都记得一张海报。」她说，「但大家记得的内容来自不同时间、不同物件和不同人的转述。」\n\n\n她把真实材料一件件贴回原位。最后，空白海报底纸仍旧空着。\n\n\n「没有完整实体。」慧美指空白底纸，「三次核对：打印登记无 · 正式照无 · 残胶轮廓无。」\n\n\n「我没有删除完整海报。」慧美说，「因为 **完整海报没有存在过**。」\n\n\n班主任来时，慧美递上登记表。壁报栏旁，新贴三张 **小标识**：\n\n\n  已确认 · 听说 · 仍不知道\n\n\n修复动作就写在这三张边上—— **不替空栏填名字**。\n\n\n侧廊安静了一截。可误传没停——它只是换了一个抽屉。\n\n\n他们推着媒体器材车回资料室。经过展示准备室时，车轮再次压过门槛。柜子里传来很轻的一声「嗒」。\n\n\n最下方抽屉贴着水野的名字。她走过来，打开。一枚本应在一班展示盒里的蓝色徽章，静静躺在她的抽屉角落。所有人都看见了。这一次，没有任何视觉碎片。东西确实在那里。\n\n\n慧美先在纸上写：\n\n\n  我们亲眼看见：蓝色徽章位于最下层抽屉。  \n\n  我们尚不知道：它怎样进去。\n\n\n采访表贴出后，侧廊静了半分钟。有人问：「所以……海报到底有没有？」\n\n\n慧美指空白底纸：「完整的，没有。碎片，有。记忆把碎片拼满了空白。」\n\n\n陸珣在本子画：空白·三版·无实体——公平线索不是找到海报，是找不到同一张。\n\n\n光补一句：「完整海报没有——这句要早说。」\n\n\n让开半步的动作，像给慧美留一个审判席。她没坐。只把笔记本摊在折叠桌——席位换成格子。\n\n\n走廊越长，故事越满：删稿、包庇、观察社特权。每一个词都不需要完整海报，只需要慧美沉默过。\n\n\n空教室地板上七件物件围成圈——像案③的「反海报」：每件都真，没有一件是成稿。\n\n\n黄色便签写「节目调整中」；安全说明写「不得参加搬运」——口述时，它们被听成「水野不得参加」。\n\n\n陸珣把七件拍成一圈照片：「碎片≠整张。这张照片才是案③的实体。」\n\n\n九份表贴墙后，佐佐木问：「那我该信哪张？」慧美：「信你第一列——你亲眼看见的。第三列若更满，说明后来听太多。」\n\n\n三人 背身画海报后，陸珣把三张纸叠在空白底纸上——没有一张能贴满A3。\n\n\n「** 记得的，是三张不同的海报。」他说。「学校找不到第四张——因为完整的从未存在。」\n\n\n壁报资格要停的喊声里，慧美没哭。只把采访表抱紧——像抱一叠「仍不知道」的证据。\n\n\n志郎 举草稿夹页：「排练分镜角≠成稿。」有人接：「那也说明你藏东西！」光气声：「藏排练声≠删海报。」\n\n\n嗒一声后，慧美纸上两行成为案④的第一格：看见徽章在抽屉·不知如何进入。不写偷。\n\n\n打印 登记无、正式照无、残胶无——志郎把三句写在透明胶带上贴空白底纸边。像给「无实体」立碑。\n\n\n慧美 指尖白：「排练照片另存……」被听成「我藏了成稿」。她后来说：沉默的代价，是别人替你写满空白。\n\n\n第三次 强调无实体时，低年级问：「那大家记得的是什么？」慧美：「碎片、转述、和讨厌空白的脑子。」\n\n\n七件 物件摊圈后，陸珣请每人只选一件写「海报标题」——七个标题仍不同。完整海报在记忆里，不在地上。\n\n\n九表 贴墙后，三标识贴旁：已确认·听说·仍不知道成为案③repair的可见部分。第四栏空白留给下案——失物柜的嗒声。\n\n\n打印无、正式照无、残胶无——第三次写在公开说明横幅上：完整海报从未存在过。慧美说：沉默的代价，是别人替你写满空白。repair=九表+空白底纸+三标识，不替空栏填删稿人。\n\n\n失物柜打开前，慧美把采访表最后一行读出来：「完整海报没有存在过——这不是辩护，是已确认。」侧廊风把纸角掀起，她用胶带压平——像预演案⑤壁报。\n\n\n陸珣补笔记：案③FC总结——口述三版不重合·打印正式照残胶三无·两秒抓拍≠半栏海报·空白底纸仍空。失物柜的嗒声，是案④的第一格已确认。慧美不喊偷——只写：看见徽章在抽屉，尚不知如何进入。三标识贴壁后，案③repair完成。完整海报从未存在——三次核对无实体写进观察栏档案，供案④失物柜对照：实体在时，先写机制再写名字。陸珣记：案③八秒句——都记得，却找不到完整一张。观察社档案袋上贴空白底纸复印件——袋口写：无实体×3核对済。案③收——记得≠见过同一张，沉默≠删稿，空白可以合法空着。三标识成为全单元规矩预告——已确认·听说·仍不知道。案③八秒句归档：都记得，却找不到完整一张。失物柜嗒声后，案③向案④递交第一格：看见实体·不知进入方式。案③repair完成，误传进抽屉。三标识·九表·空白底纸——案③完。\n\n\n（案③ 收束 · L3 → 案④ · puzzle_piece）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：三张不同颜色的纸条（写「不得参加」「公开日」、贴一张小人照片）· 一枚箭头贴纸。\n\n步骤：把三张纸条 **分开** 摆在桌上。请三位家人各看两秒钟，然后背过身描述「你看见的海报」。\n\n观察：三人描述是否像同一张完整海报？再 **拼在一起** 给第四人看——是否像「一直贴在那里」？\n\n要点：所有人都记得，不等于所有人见过同一件东西。空白会让人把碎片拼成 **从未存在** 的整张。\n\n\n**追问实验**：请第四人只看上一案两秒抓拍——能否画出「半栏红底海报」？多数会画——像案③机制的家庭版。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 大家记得同一张海报。  \n\n> 可画出来，连标题 **放哪** 都不一样。\n\n> 哥哥说，也许是 **碎片** 拼错了。\n\n> 我觉得，慧美沉默的时候，大家已经替她判完了。\n\n\n今天有一张所有人都记得的海报。\n\n\n它没有被撕掉。  \n\n也没有被藏起来。\n\n\n**因为它从来没有完整地存在过。**\n\n\n哥哥 **画** 了三张「大家记得的海报」。\n\n三张 **连标题放哪** 都不一样。\n\n\n我觉得，记得有时候比看见更满 —— \n\n满到把空白也填满了。\n\n\n有人看见标题，  \n\n有人看见照片，  \n\n有人听见别人说了一句话。\n\n\n后来，大家把这些东西放进同一张记忆里。\n\n\n哥哥说，人不喜欢空白。\n\n\n我觉得，  \n\n空白不是一定要马上填满的地方。  \n\n有时候，「我还不知道」  \n\n比一个很完整、却把别人困住的故事更诚实。\n\n\n哥哥 **教** 我画三种海报—— 标题放哪都不一样。\n\n\n没有一张是同一张。\n\n\n慧美 姐姐沉默的时候，  \n\n大家 帮她把空白填成「删稿」。\n\n\n我觉得，  \n\n沉默有时候是保护——\n\n不是删东西的证据。\n\n\n——第三案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A003\n\n\n---\n\n【EDITOR · PRODUCTION META · A003 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A003】\n\n  · 案③《每个人都记得的海报》\n\n  · 案号：A003 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n  · 八秒句：全班都记得那张海报——可学校连一张完整的都找不到。\n\n  · 错误责任：加藤慧美删除一张排斥水野的海报，替同学掩盖事实。\n\n  · 真实责任：无完整实体海报；慧美为保护排练照片沉默，空白被传言填满。\n\n  · FC概要：FC-1 口述版式不一致 · FC-2 正式照无海报 · FC-3 草稿夹页尺寸不符 · FC-4 远标题+占位\n\n  · 钩子：碎片化信息 → 失物柜/抽屉 → A004\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n--
