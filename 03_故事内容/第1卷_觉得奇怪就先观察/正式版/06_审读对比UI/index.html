屉半开 · 失物在内 · 水野 **无钥匙**\n\n\n**听说**：水野偷窃 · 破坏公开日\n\n\n陸珣蹲下，看锁孔周围：**无撬痕** · 无新划痕。\n\n\n公开日徽章在抽屉里叠着，标签角没折 —— 像滑进来，不是抓进来。\n\n\n志郎量抽屉深度：最下层后方无隔板 —— 与上层不同。\n\n\n「物在哪 ……」慧美没写完，停在仍不知道栏：谁放进不等于谁偷。\n\n\n观察社把折叠桌搬到柜前。志郎从器材车折返，袋子里还有 **水平仪**。\n\n\n慧美在仍不知道栏停笔：「谁放进抽屉的？」\n\n\n志郎把水平仪搁在柜顶。水泡 **偏了一格**——柜顶向抽屉一侧斜了。\n\n\n「柜体倾斜。」志郎说，「不是今天才歪。」\n\n\n他又测第二列柜：水泡居中 —— 只有靠墙这列低。\n\n\n陸珣看柜后：两列临时柜靠墙，中间有一条窄缝 —— 像连通的缝道。\n\n\n本子：**倾斜 · 缝 · 无撬锁 · 仅此列**。\n\n\n志郎用备用的班级标签做试验：放在上一格柜面，标签缓缓滑向低侧，在缝口停住 —— 像被坡道接着。\n\n\n他轻敲柜顶五下 —— 标签跳进缝半寸。\n\n\n班主任敲柜沿：「公开日物资 **清点前** 必须结案。」\n\n\n又看水野：「若不能说明，展示资格取消，通知家长。」\n\n\n**事件钟**：一小时后，物资上车。\n\n社交钟：现在，水野已被编成小偷。\n\n\n水野肩缩了一下。她没哭出声。像怕一哭，故事就更像真的。\n\n\n器材车从侧门经过。地面轻轻震。最下一排抽屉晃了一下。\n\n\n陸珣看向震动的 **时刻** —— 不是看向水野的脸。\n\n\n前面三案中，观察社每次都证明「大家认错了」。到了第四次，连光自己都觉得一句「先观察」显得太轻。「东西确实在她抽屉。」他说。「是。」慧美回答。「封条也没破。」「是。」\n\n\n「是不等于她偷。」陸珣没提高声音，只指柜缝：「先看路。」\n\n\n水野听见 「是」 连说两遍，肩缩得更小 —— 像两个是拼成了一个偷。\n\n\n志郎调出器材车轮转表：侧门经过 · 10:07 · 10:22 · 10:41。\n\n\n「10:41 这班，」志郎指清单，「刚好是 **徽章** 从准备室 **撤下** 的时间。」\n\n\n10:07那班对应标签滑入缝口的第一次微移。10:22名牌角在上层格沿露出一毫米。\n\n\n慧美在 **已确认** 写：轻物 · 倾斜柜 · 缝道 · 振动 **时刻重合**。\n\n\n他们测量柜体。左侧比右侧低三毫米。背板向后倾斜。每次媒体车经过门槛，地板都会产生短促振动。轻、薄、边缘光滑的物件，容易从抽屉后部滑入贯通缝，再在一次次震动中逐层下落。\n\n\n志郎 用粉笔在柜顶标低侧—— 像上一案在黑板槽标膜边。\n\n\n为什么最后都进入水野抽屉？因为她在最下层。其他抽屉的后板下方仍有隔板；最下层后方则直接连通抽屉内部。\n\n\n封条完好的抽屉仍可「进物」—— 因为物从后缝进不是从前锁进。\n\n\n陸珣把一枚备用标签放在上一格柜面——标签滑向低侧，像被看不见的坡拉着走。\n\n\n「最下抽屉 **先有物**。」他轻声，「不是 **有人开锁**。」\n\n\n志郎建立复现实验。他在上层分别放入厚橡皮、纸片、金属徽章、塑料名牌、小钥匙、录音卡。先让全班记：厚橡皮不动，纸片只挪一点——轻的东西才听地板的话。然后让器材车以相同速度通过门槛五次。徽章、名牌、小钥匙和录音卡先后滑入最下层。每一件一侧都留下了与失物相似的细擦痕。\n\n\n全班围在柜后看缝道——像看上一案板槽里的膜边：看不见的路，却能送物。\n\n\n第五次车过时，录音卡滑入——与封条后「多出来」的时刻对上。封条没破，因为物从后进。\n\n\n班主任蹲下看擦痕方向：全部指向低侧缝口——与失物上的痕一致。她没说「洗白」，只说「报修柜体」。\n\n\n「最下抽屉 **先有物**。」陸珣轻声，「不是 **有人开锁**。」\n\n\n慧美补已确认：封条完好 · 10:41 车过 · 轻物迁移可复现 · 录音卡另论。\n\n\n「就算柜子歪，」一个女生站起来，「也是她先偷，再装无辜！」\n\n\n全班已经连好故事：水野偷物资 · 观察社又要帮她说话。\n\n\n有人把上一案海报和这一案抽屉接在一起：「她早就被排斥了。」\n\n\n光 想反驳——嗓子仍气声。他只在本上写：先机制，后动机；藏卡≠偷三件。\n\n\n慧美拦在柜前：「观察社写趣事，不写审判。」\n\n\n水野终于开口，声音发颤：「……抽屉里 **不只有** 徽章。」\n\n\n她看向那袋录音卡，像看一块很烫的东西。\n\n\n准备室里，志郎用 **试听耳机** 听了一秒，立刻摘下。\n\n\n「……朋友哭的声音。」慧美低声，「排练那天。上一案 不让贴的那段。」\n\n\n耳机里只有三秒——像上一案被剪短的录音一样危险。\n\n\n水野闭了闭眼：「卡滑进来的时候，我吓到了。」\n\n\n她没看抽屉，只看自己的手——像那三秒哭声还贴在指尖。\n\n\n「我藏起来……怕大家又播。」\n\n\n她没说「偷」——说「藏」。字差一个，故事差一整条链。\n\n\n有人已经在走廊说，要把「水野不得参加」的海报和排练录音一起公开，证明她们拖累活动。她害怕卡片被误播，就把它藏进自己的抽屉。第二天发现封条后，她不敢承认——因为一旦承认藏过一件，别人会自然认为其余三件也是她拿的。\n\n\n「藏和偷 ……」慧美分两行写：动机层分开。\n\n\n动机层分开：机制是振动转移；动机是藏起不想被播的哭声。不是偷。是怕。\n\n\n陸珣在本子写：物在哪 ≠ 谁拿过 · 找到 ≠ 故意放。\n\n\n班主任沉吟很久：「展示资格…… 暂缓取消。录音卡归还，不播放内容。」\n\n\n这一次，真相不能只说「她没偷」。因为她确实藏了录音卡。\n\n\n观察社在展示准备室做了两份说明。第一份写物理过程：分类柜后缝贯通 · 柜体倾斜 · 媒体车通过门槛产生振动 · 轻薄物品逐层迁移 · 三件失物由实验复现。第二份写责任边界：水野未拿走蓝色徽章、名牌和钥匙；水野未经许可藏起录音卡；录音卡涉及同学隐私，只由教师确认，不公开播放。\n\n\n第一份贴在柜区——给路过的人看机制。第二份只给教师——给藏卡留隐私边界。\n\n\n水野对全班，也是对自己：「对不起……我不该藏。可我真的没偷。」\n\n\n有人仍只记住「对不起」两个字——像上一案黑板上那三个字的回声。\n\n\n志郎在登记表补一行：\n\n\n  柜体倾斜须报修 · 振动时段避开清点\n\n\n修复动作：归还录音卡 · 公开说明不播放 · 失物逐一登记归位 · 封住后缝 · 调整柜脚水平 · 移动路线增加减速垫。\n\n\n志郎垫平柜脚，水泡回中。陸珣记：这一案 尾钩在午后光 —— 不是这里结束。\n\n\n下午，体育馆开始拍摄班级全景照。移动媒体器材车停在队伍后方，平板架在车顶。因为普通镜头装不下全班，志郎建议使用全景模式，从左向右缓慢移动拍摄。\n\n\n拍摄进行到一半，器材车旁的一根电源线被人踩住。清扫委员只好把车从队伍后面推开。**水野真帆** 向前让了半步，给志郎递器材。\n\n\n志郎接器材时侧身，挡住半秒侧光—— 只有水野脚边那一块地变暗又变亮。\n\n\n云在这时遮住太阳。十几秒后，拍摄结束。平板上的预览看起来很正常。\n\n\n水野看着自己的脚下。「我的影子怎么这么淡？」「因为刚才有云。」有人说。\n\n\n陸珣没接「云」。他看平板角：全景小图标亮着。\n\n\n侧廊传来欢呼。「合照 **投屏** 了！」\n\n\n陸珣把本子合上。这一案最后一行：**振动 · 倾斜 · 藏卡**。\n\n\n他跟着人群往体育馆走。大屏上，五人肩并肩——光 · 志郎 · 慧美 · 珣 · 水野。五人都在。\n\n\n可只有水野脚下，没有影子。光、志郎、慧美、陸珣和器材车的影子，都在。\n\n\n不是五人全无影——**仅水野** 脚下 **空** 一块。灯杆影 **仍** 横在 **地上**。\n\n\n水野没跑。她看自己的鞋尖—— 像上一案里听广播却开不了口的同一种累。\n\n（这一案 收束 · L4 → 案⑤ · 卷终）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：多层抽屉或叠放的纸盒 · 几枚轻小物件（纽扣、纸片）· 手机轻敲桌面模拟振动。\n\n步骤：把纸盒 **垫高一侧** 制造倾斜，轻物放在上层抽屉后部。轻敲桌面五下，观察物件是否滑向最低层。\n\n观察：擦痕方向是否一致？出现时间是否与「敲桌」同步？\n\n要点：东西出现在谁那里，不等于就是谁拿的。位置只能证明最后在哪里。\n\n\n**对照**：厚橡皮不滑入——只有轻薄物迁移。像给「偷」和「滑」分重量级。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 抽屉里不只有失物。  \n\n> 还有她不想让人听的那张卡。  \n\n> 哥哥说，东西滑进去的时候，没有人开锁。\n\n> 我觉得，大家先定了她是小偷，才后去打开抽屉。\n\n\n四件失物都在同一个抽屉里。\n\n\n三件是柜子和震动送进去的。  \n\n一件是水野同学自己藏的。\n\n\n哥哥做了倾斜抽屉实验。\n\n纽扣自己滑到 **最下层** —— 没人开锁。\n\n\n如果她什么都没做，  \n\n洗清她会比较容易。\n\n\n可她真的做错了一件事。\n\n\n哥哥说，  \n\n一个人做错一件事，  \n\n不会让她自动做错另外三件。\n\n\n洗清冤屈，  \n\n不是证明一个人从来没错。  \n\n是把每一件事，  \n\n放回它真正属于的地方。\n\n\n合照那天下午，  \n\n哥哥 说水野姐姐脚下少了影。\n\n\n不是五个人都没有——\n\n只有她那一块空着。\n\n\n我觉得，  \n\n四件失物和一张无影照，\n\n被大家用同一把尺子量——\n\n量成「都是她干的」。\n\n\n尺子错了。\n\n\n——第四案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A004\n\n\n---\n\n【EDITOR · PRODUCTION META · A004 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A004】\n\n  · 这一案《只出现在她抽屉里的失物》\n\n  · 案号：A004 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n  · 八秒句：四件失物都在她抽屉里——可她手里没有钥匙。\n\n  · 错误责任：水野真帆连续拿走公开日用品，并藏进自己的抽屉。\n\n  · 真实责任：三件失物因柜倾+振动滑入；水野藏起一张保护隐私的录音卡。\n\n  · FC概要：FC-1 无撬锁痕 · FC-2 柜体倾斜水泡 · FC-3 振动时刻重合 · FC-4 最下抽屉先有物\n\n  · 钩子：器材车路线、午后光线 → 合照/预展 → A005\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 清点 · SC-02 抽屉半开 · SC-03 证据格/无撬锁\n\nSC-04 双倒计时 · SC-05 振动线/倾斜 · SC-06 误指峰值\n\nSC-07 哭泣声/动机 · SC-08 修复/还卡 · SC-09 合照尾钩\n\nFC-1 无撬锁痕 · FC-2 柜体倾斜水泡 · FC-3 振动时刻重合 · FC-4 最下抽屉先有物\n\nwrong_responsibility：水野偷窃 · true_responsibility：振动转移；藏哭泣声录音卡\n\nrelation：A003 puzzle_piece → A005 无影合照\n\n科学样本：V2迁移/05_科学验证/A001-A005_机制科学验证清单_V0.2.md §A004\n\n---\n\n【EDITOR NOTE · C4 + C5 · 2026-06-08】\nC4：振动/柜倾/轮转表为机制主因 · 器材车 **非** direct 滑入因果 · 下一 pass 改间接 framing。\nC5：READER_TRIM 瑆尾重复收束 — Reader 派生时删圈 · EDIT 层暂保留。\nSSOT：README_两轨说明_V0.1 §6 · 20_C1-C7_IP裁定 · 正文本批次不改场景。\n", "paragraphs": ["《学堂趣事录》", "第1卷 · 觉得奇怪，就先观察", "单元 · （待定 · 工作名：全校都认错了人）", "========================", "四、只出现在她抽屉里的失物", "----------------------------", "公开日物资清点，在 **失物招领临时柜区**。", "四月下旬的名古屋，侧门还留着樱瓣。灰白色的器材车刚转走一班，地面像还记着那一阵轻震。门槛边细灰被轮胎压成短弧。", "班主任念名单：公开日徽章 · 班级标签 · 钥匙扣 · 备用录音卡 —— 一样样对不上。", "「最后见到的人？」", "没人举手。名单却指向一个名字：水野真帆 · 5年1組 · 展示协助候补 —— 因为最下抽屉是她的名字签。", "陸珣站在柜区尽头，看的是柜脚 —— 不是人。左前脚垫了一枚折叠传单，右前脚实贴地面。", "志郎从器材车折返，袋口还贴着上一案的展示膜标签。他没说话，只把水平仪搁在折叠桌角——像上一案教会他：现场会留痕，不一定是人写的。", "本子：**失物 · 清单 · 震动余韵**。", "第一件失物，是蓝色徽章。第二件，是写着「广播组」的名牌。第三件，是一把小钥匙。第四件，是一张录音卡。它们来自不同班级、不同盒子，由不同的人最后确认。", "失物登 se, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改1稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n四、只出现在她抽屉里的失物\n\n----------------------------\n\n\n公开日物资清点，在 **失物招领临时柜区**。\n\n\n四月下旬的名古屋，侧门还留着樱瓣。灰白色的器材车刚转走一班，地面像还记着那一阵轻震。门槛边细灰被轮胎压成短弧。\n\n\n班主任念名单：公开日徽章 · 班级标签 · 钥匙扣 · 备用录音卡 —— 一样样对不上。\n\n\n「最后见到的人？」\n\n\n没人举手。名单却指向一个名字：水野真帆 · 5年1組 · 展示协助候补 —— 因为最下抽屉是她的名字签。\n\n\n陸珣站在柜区尽头，看的是柜脚 —— 不是人。左前脚垫了一枚折叠传单，右前脚实贴地面。\n\n\n志郎从器材车折返，袋口还贴着上一案的展示膜标签。他没说话，只把水平仪搁在折叠桌角——像上一案教会他：现场会留痕，不一定是人写的。\n\n\n本子：**失物 · 清单 · 震动余韵**。\n\n\n第一件失物，是蓝色徽章。第二件，是写着「广播组」的名牌。第三件，是一把小钥匙。第四件，是一张录音卡。它们来自不同班级、不同盒子，由不同的人最后确认。\n\n\n失物登记簿上四行「最后经手人」各不同—— 却在同一抽屉相遇。\n\n\n星期三放学前，他们亲眼看见蓝色徽章躺在水野抽屉里。星期四早晨，名牌和钥匙也在那里。十点二十分，老师当着所有人的面封住抽屉，在边缘贴上纸条并签名。十一点整，封条完好。抽屉里却多了一张录音卡。没人打开过抽屉。东西仍然进去了。\n\n\n封条没断。锁孔没新痕。\n\n\n最下一排第三格抽屉半开着——像有人从后面推了一把，不是从前开锁。\n\n\n柜区在侧门走廊：两列临时柜靠墙，标签和封条一排排对齐。四月风从侧门缝进来，地板上是 **上履き** 的软边，不是室外鞋印。\n\n\n里面堆着：徽章两枚 · 标签一叠 · 钥匙扣三个 · 透明袋里的 **录音卡** —— 全在。\n\n\n水野真帆站在两步外。双手远离锁孔。钥匙不在她手上。\n\n\n「……不是我放的。」她声音很轻。\n\n\n「没钥匙 **怎么开**？」有人接得很快。\n\n\n慧美笔记本已经翻开，四栏格先写机制，不写小偷：\n\n\n**已确认**：抽屉半开 · 失物在内 · 水野 **无钥匙**\n\n\n**听说**：水野偷窃 · 破坏公开日\n\n\n陸珣蹲下，看锁孔周围：**无撬痕** · 无新划痕。\n\n\n公开日徽章在抽屉里叠着，标签角没折 —— 像滑进来，不是抓进来。\n\n\n志郎量抽屉深度：最下层后方无隔板 —— 与上层不同。\n\n\n「物在哪 ……」慧美没写完，停在仍不知道栏：谁放进不等于谁偷。\n\n\n观察社把折叠桌搬到柜前。志郎从器材车折返，袋子里还有 **水平仪**。\n\n\n慧美在仍不知道栏停笔：「谁放进抽屉的？」\n\n\n志郎把水平仪搁在柜顶。水泡 **偏了一格**——柜顶向抽屉一侧斜了。\n\n\n「柜体倾斜。」志郎说，「不是今天才歪。」\n\n\n他又测第二列柜：水泡居中 —— 只有靠墙这列低。\n\n\n陸珣看柜后：两列临时柜靠墙，中间有一条窄缝 —— 像连通的缝道。\n\n\n本子：**倾斜 · 缝 · 无撬锁 · 仅此列**。\n\n\n志郎用备用的班级标签做试验：放在上一格柜面，标签缓缓滑向低侧，在缝口停住 —— 像被坡道接着。\n\n\n他轻敲柜顶五下 —— 标签跳进缝半寸。\n\n\n班主任敲柜沿：「公开日物资 **清点前** 必须结案。」\n\n\n又看水野：「若不能说明，展示资格取消，通知家长。」\n\n\n**事件钟**：一小时后，物资上车。\n\n社交钟：现在，水野已被编成小偷。\n\n\n水野肩缩了一下。她没哭出声。像怕一哭，故事就更像真的。\n\n\n器材车从侧门经过。地面轻轻震。最下一排抽屉晃了一下。\n\n\n陸珣看向震动的 **时刻** —— 不是看向水野的脸。\n\n\n前面三案中，观察社每次都证明「大家认错了」。到了第四次，连光自己都觉得一句「先观察」显得太轻。「东西确实在她抽屉。」他说。「是。」慧美回答。「封条也没破。」「是。」\n\n\n「是不等于她偷。」陸珣没提高声音，只指柜缝：「先看路。」\n\n\n水野听见 「是」 连说两遍，肩缩得更小 —— 像两个是拼成了一个偷。\n\n\n志郎调出器材车轮转表：侧门经过 · 10:07 · 10:22 · 10:41。\n\n\n「10:41 这班，」志郎指清单，「刚好是 **徽章** 从准备室 **撤下** 的时间。」\n\n\n10:07那班对应标签滑入缝口的第一次微移。10:22名牌角在上层格沿露出一毫米。\n\n\n慧美在 **已确认** 写：轻物 · 倾斜柜 · 缝道 · 振动 **时刻重合**。\n\n\n他们测量柜体。左侧比右侧低三毫米。背板向后倾斜。每次媒体车经过门槛，地板都会产生短促振动。轻、薄、边缘光滑的物件，容易从抽屉后部滑入贯通缝，再在一次次震动中逐层下落。\n\n\n志郎 用粉笔在柜顶标低侧—— 像上一案在黑板槽标膜边。\n\n\n为什么最后都进入水野抽屉？因为她在最下层。其他抽屉的后板下方仍有隔板；最下层后方则直接连通抽屉内部。\n\n\n封条完好的抽屉仍可「进物」—— 因为物从后缝进不是从前锁进。\n\n\n陸珣把一枚备用标签放在上一格柜面——标签滑向低侧，像被看不见的坡拉着走。\n\n\n「最下抽屉 **先有物**。」他轻声，「不是 **有人开锁**。」\n\n\n志郎建立复现实验。他在上层分别放入厚橡皮、纸片、金属徽章、塑料名牌、小钥匙、录音卡。先让全班记：厚橡皮不动，纸片只挪一点——轻的东西才听地板的话。然后让器材车以相同速度通过门槛五次。徽章、名牌、小钥匙和录音卡先后滑入最下层。每一件一侧都留下了与失物相似的细擦痕。\n\n\n全班围在柜后看缝道——像看上一案板槽里的膜边：看不见的路，却能送物。\n\n\n第五次车过时，录音卡滑入——与封条后「多出来」的时刻对上。封条没破，因为物从后进。\n\n\n班主任蹲下看擦痕方向：全部指向低侧缝口——与失物上的痕一致。她没说「洗白」，只说「报修柜体」。\n\n\n「最下抽屉 **先有物**。」陸珣轻声，「不是 **有人开锁**。」\n\n\n慧美补已确认：封条完好 · 10:41 车过 · 轻物迁移可复现 · 录音卡另论。\n\n\n「就算柜子歪，」一个女生站起来，「也是她先偷，再装无辜！」\n\n\n全班已经连好故事：水野偷物资 · 观察社又要帮她说话。\n\n\n有人把上一案海报和这一案抽屉接在一起：「她早就被排斥了。」\n\n\n光 想反驳——嗓子仍气声。他只在本上写：先机制，后动机；藏卡≠偷三件。\n\n\n慧美拦在柜前：「观察社写趣事，不写审判。」\n\n\n水野终于开口，声音发颤：「……抽屉里 **不只有** 徽章。」\n\n\n她看向那袋录音卡，像看一块很烫的东西。\n\n\n准备室里，志郎用 **试听耳机** 听了一秒，立刻摘下。\n\n\n「……朋友哭的声音。」慧美低声，「排练那天。上一案 不让贴的那段。」\n\n\n耳机里只有三秒——像上一案被剪短的录音一样危险。\n\n\n水野闭了闭眼：「卡滑进来的时候，我吓到了。」\n\n\n她没看抽屉，只看自己的手——像那三秒哭声还贴在指尖。\n\n\n「我藏起来……怕大家又播。」\n\n\n她没说「偷」——说「藏」。字差一个，故事差一整条链。\n\n\n有人已经在走廊说，要把「水野不得参加」的海报和排练录音一起公开，证明她们拖累活动。她害怕卡片被误播，就把它藏进自己的抽屉。第二天发现封条后，她不敢承认——因为一旦承认藏过一件，别人会自然认为其余三件也是她拿的。\n\n\n「藏和偷 ……」慧美分两行写：动机层分开。\n\n\n动机层分开：机制是振动转移；动机是藏起不想被播的哭声。不是偷。是怕。\n\n\n陸珣在本子写：物在哪 ≠ 谁拿过 · 找到 ≠ 故意放。\n\n\n班主任沉吟很久：「展示资格…… 暂缓取消。录音卡归还，不播放内容。」\n\n\n这一次，真相不能只说「她没偷」。因为她确实藏了录音卡。\n\n\n观察社在展示准备室做了两份说明。第一份写物理过程：分类柜后缝贯通 · 柜体倾斜 · 媒体车通过门槛产生振动 · 轻薄物品逐层迁移 · 三件失物由实验复现。第二份写责任边界：水野未拿走蓝色徽章、名牌和钥匙；水野未经许可藏起录音卡；录音卡涉及同学隐私，只由教师确认，不公开播放。\n\n\n第一份贴在柜区——给路过的人看机制。第二份只给教师——给藏卡留隐私边界。\n\n\n水野对全班，也是对自己：「对不起……我不该藏。可我真的没偷。」\n\n\n有人仍只记住「对不起」两个字——像上一案黑板上那三个字的回声。\n\n\n志郎在登记表补一行：\n\n\n  柜体倾斜须报修 · 振动时段避开清点\n\n\n修复动作：归还录音卡 · 公开说明不播放 · 失物逐一登记归位 · 封住后缝 · 调整柜脚水平 · 移动路线增加减速垫。\n\n\n志郎垫平柜脚，水泡回中。陸珣记：这一案 尾钩在午后光 —— 不是这里结束。\n\n\n下午，体育馆开始拍摄班级全景照。移动媒体器材车停在队伍后方，平板架在车顶。因为普通镜头装不下全班，志郎建议使用全景模式，从左向右缓慢移动拍摄。\n\n\n拍摄进行到一半，器材车旁的一根电源线被人踩住。清扫委员只好把车从队伍后面推开。**水野真帆** 向前让了半步，给志郎递器材。\n\n\n志郎接器材时侧身，挡住半秒侧光—— 只有水野脚边那一块地变暗又变亮。\n\n\n云在这时遮住太阳。十几秒后，拍摄结束。平板上的预览看起来很正常。\n\n\n水野看着自己的脚下。「我的影子怎么这么淡？」「因为刚才有云。」有人说。\n\n\n陸珣没接「云」。他看平板角：全景小图标亮着。\n\n\n侧廊传来欢呼。「合照 **投屏** 了！」\n\n\n陸珣把本子合上。这一案最后一行：**振动 · 倾斜 · 藏卡**。\n\n\n他跟着人群往体育馆走。大屏上，五人肩并肩——光 · 志郎 · 慧美 · 珣 · 水野。五人都在。\n\n\n可只有水野脚下，没有影子。光、志郎、慧美、陸珣和器材车的影子，都在。\n\n\n不是五人全无影——**仅水野** 脚下 **空** 一块。灯杆影 **仍** 横在 **地上**。\n\n\n水野没跑。她看自己的鞋尖—— 像上一案里听广播却开不了口的同一种累。\n\n（这一案 收束 · L4 → 案⑤ · 卷终）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：多层抽屉或叠放的纸盒 · 几枚轻小物件（纽扣、纸片）· 手机轻敲桌面模拟振动。\n\n步骤：把纸盒 **垫高一侧** 制造倾斜，轻物放在上层抽屉后部。轻敲桌面五下，观察物件是否滑向最低层。\n\n观察：擦痕方向是否一致？出现时间是否与「敲桌」同步？\n\n要点：东西出现在谁那里，不等于就是谁拿的。位置只能证明最后在哪里。\n\n\n**对照**：厚橡皮不滑入——只有轻薄物迁移。像给「偷」和「滑」分重量级。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 抽屉里不只有失物。  \n\n> 还有她不想让人听的那张卡。  \n\n> 哥哥说，东西滑进去的时候，没有人开锁。\n\n> 我觉得，大家先定了她是小偷，才后去打开抽屉。\n\n\n四件失物都在同一个抽屉里。\n\n\n三件是柜子和震动送进去的。  \n\n一件是水野同学自己藏的。\n\n\n哥哥做了倾斜抽屉实验。\n\n纽扣自己滑到 **最下层** —— 没人开锁。\n\n\n如果她什么都没做，  \n\n洗清她会比较容易。\n\n\n可她真的做错了一件事。\n\n\n哥哥说，  \n\n一个人做错一件事，  \n\n不会让她自动做错另外三件。\n\n\n洗清冤屈，  \n\n不是证明一个人从来没错。  \n\n是把每一件事，  \n\n放回它真正属于的地方。\n\n\n合照那天下午，  \n\n哥哥 说水野姐姐脚下少了影。\n\n\n不是五个人都没有——\n\n只有她那一块空着。\n\n\n我觉得，  \n\n四件失物和一张无影照，\n\n被大家用同一把尺子量——\n\n量成「都是她干的」。\n\n\n尺子错了。\n\n\n——第四案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A004\n\n\n---\n\n【EDITOR · PRODUCTION META · A004 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A004】\n\n  · 这一案《只出现在她抽屉里的失物》\n\n  · 案号：A004 · Engine V2.0 · Campus Ripple\n\n  · 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n  · 八秒句：四件失物都在她抽屉里——可她手里没有钥匙。\n\n  · 错误责任：水野真帆连续拿走公开日用品，并藏进自己的抽屉。\n\n  · 真实责任：三件失物因柜倾+振动滑入；水野藏起一张保护隐私的录音卡。\n\n  · FC概要：FC-1 无撬锁痕 · FC-2 柜体倾斜水泡 · FC-3 振动时刻重合 · FC-4 最下抽屉先有物\n\n  · 钩子：器材车路线、午后光线 → 合照/预展 → A005\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 清点 · SC-02 抽屉半开 · SC-03 证据格/无撬锁\n\nSC-04 双倒计时 · SC-05 振动线/倾斜 · SC-06 误指峰值\n\nSC-07 哭泣声/动机 · SC-08 修复/还卡 · SC-09 合照尾钩\n\nFC-1 无撬锁痕 · FC-2 柜体倾斜水泡 · FC-3 振动时刻重合 · FC-4 最下抽屉先有物\n\nwrong_responsibility：水野偷窃 · true_responsibility：振动转移；藏哭泣声录音卡\n\nrelation：A003 puzzle_piece → A005 无影合照\n\n科学样本：V2迁移/05_科学验证/A001-A005_机制科学验证清单_V0.2.md §A004\n\n---\n\n【EDITOR NOTE · C4 + C5 · 2026-06-08】\nC4：振动/柜倾/轮转表为机制主因 · 器材车 **非** direct 滑入因果 · 下一 pass 改间接 framing。\nC5：READER_TRIM 瑆尾重复收束 — Reader 派生时删圈 · EDIT 层暂保留。\nSSOT：README_两轨说明_V0.1 §6 · 20_C1-C7_IP裁定 · 正文本批次不改场景。\n", "paragraphs": ["《学堂趣事录》", "第1卷 · 觉得奇怪，就先观察", "单元 · （待定 · 工作名：全校都认错了人）", "========================", "四、只出现在她抽屉里的失物", "----------------------------", "公开日物资清点，在 **失物招领临时柜区**。", "四月下旬的名古屋，侧门还留着樱瓣。灰白色的器材车刚转走一班，地面像还记着那一阵轻震。门槛边细灰被轮胎压成短弧。", "班主任念名单：公开日徽章 · 班级标签 · 钥匙扣 · 备用录音卡 —— 一样样对不上。", "「最后见到的人？」", "没人举手。名单却指向一个名字：水野真帆 · 5年1組 · 展示协助候补 —— 因为最下抽屉是她的名字签。", "陸珣站在柜区尽头，看的是柜脚 —— 不是人。左前脚垫了一枚折叠传单，右前脚实贴地面。", "志郎从器材车折返，袋口还贴着上一案的展示膜标签。他没说话，只把水平仪搁在折叠桌角——像上一案教会他：现场会留痕，不一定是人写的。", "本子：**失物 · 清单 · 震动余韵**。", "第一件失物，是蓝色徽章。第二件，是写着「广播组」的名牌。第三件，是一把小钥匙。第四件，是一张录音卡。它们来自不同班级、不同盒子，由不同的人最后确认。", "失物登记簿上四行「最后经手人」各不同—— 却在同一抽屉相遇。", "星期三放学前，他们亲眼看见蓝色徽章躺在水野抽屉里。星期四早晨，名牌和钥匙也在那里。十点二十分，老师当着所有人的面封住抽屉，在边缘贴上纸条并签名。十一点整，封条完好。抽屉里却多了一张录音卡。没人打开过抽屉。东西仍然进去了。", "封条没断。锁 没人开锁。", "如果她什么都没做，", "洗清她会比较容易。", "可她真的做错了一件事。", "哥哥说，", "一个人做错一件事，", "不会让她自动做错另外三件。", "洗清冤屈，", "不是证明一个人从来没错。", "是把每一件事，", "放回它真正属于的地方。", "合照那天下午，", "哥哥 说水野姐姐脚下少了影。", "不是五个人都没有——", "只有她那一块空着。", "我觉得，", "四件失物和一张无影照，", "被大家用同一把尺子量——", "量成「都是她干的」。", "尺子错了。", "——第四案完——", "---", "【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A004", "---", "【EDITOR · PRODUCTION META · A004 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A004】", "· 这一案《只出现在她抽屉里的失物》", "· 案号：A004 · Engine V2.0 · Campus Ripple", "· 状态：REVIEW_LOOP_R2 · Hybrid Voice v3 · reader-flow 2026-06-08", "· 八秒句：四件失物都在她抽屉里——可她手里没有钥匙。", "· 错误责任：水野真帆连续拿走公开日用品，并藏进自己的抽屉。", "· 真实责任：三件失物因柜倾+振动滑入；水野藏起一张保护隐私的录音卡。", "· FC概要：FC-1 无撬锁痕 · FC-2 柜体倾斜水泡 · FC-3 振动时刻重合 · FC-4 最下抽屉先有物", "· 钩子：器材车路线、午后光线 → 合照/预展 → A005\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08", "---", "【V2.0 场级对照 · G-SHOT-T ready】", "SC-01 清点 · SC-02 抽屉半开 · SC-03 证据格/无撬锁", "SC-04 双倒计时 · SC-05 振动线/倾斜 · SC-06 误指峰值", "SC-07 哭泣声/动机 · SC-08 修复/还卡 · SC-09 合照尾钩", "FC-1 无撬锁痕 · FC-2 柜体倾斜水泡 · FC-3 振动时刻重合 · FC-4 最下抽屉先有物", "wrong_responsibility：水野偷窃 · true_responsibility：振动转移；藏哭泣声录音卡", "relation：A003 puzzle_piece → A005 无影合照", "科学样本：V2迁移/05_科学验证/A001-A005_机制科学验证清单_V0.2.md §A004", "---", "【EDITOR NOTE · C4 + C5 · 2026-06-08】\nC4：振动/柜倾/轮转表为机制主因 · 器材车 **非** direct 滑入因果 · 下一 pass 改间接 framing。\nC5：READER_TRIM 瑆尾重复收束 — Reader 派生时删圈 · EDIT 层暂保留。\nSSOT：README_两轨说明_V0.1 §6 · 20_C1-C7_IP裁定 · 正文本批次不改场景。"], "highlights": [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改2稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n序 · 封条没破\n\n------------------\n\n\n封条没断。锁孔没新痕。\n\n\n抽屉里，多了一张 **录音卡**。\n\n\n没人打开过。东西却 **进去了**。\n\n\n四、只出现在她抽屉里的失物\n\n----------------------------\n\n\n公开日物资清点，在 **失物招领临时柜区**。\n\n\n四月下旬的名古屋，侧门还留着樱瓣。灰白色的器材车刚转走一班，地面像还记着那一阵轻震。门槛边细灰被轮胎压成短弧。\n\n\n班主任念名单：公开日徽章 · 班级标签 · 钥匙扣 · 备用录音卡 —— 一样样对不上。\n\n\n「最后见到的人？」\n\n\n没人举手。名单却指向一个名字：水野真帆 · 5年1組 · 展示协助候补 —— 因为最下抽屉是她的名字签。\n\n\n陸珣站在柜区尽头，看的是柜脚 —— 不是人。左前脚垫了一枚折叠传单，右前脚实贴地面。\n\n\n志郎从器材车折返，袋口还贴着上一案的展示膜标签。他先把 **水平仪** 搁在柜顶 —— 水泡 **偏了一格**。\n\n\n「**偏了一格。**」志郎自言自语，像案②里贴膜前先动手一样。\n\n\n慧美银框眼镜后的眼睛扫过来：「柜还是人？」\n\n\n「柜。」志郎又测第二列：水泡居中 —— 只有靠墙这列低。「**又偏了一格。** 不是今天才歪。」\n\n\n本子：**失物 · 清单 · 倾斜 · 偏了一格**。\n\n\n第一件失物，是蓝色徽章。第二件，是写着「广播组」的名牌。第三件，是一把小钥匙。第四件，是一张录音卡。它们来自不同班级、不同盒子，由不同的人最后确认。\n\n\n失物登记簿上四行「最后经手人」各不同 —— 却在同一抽屉相遇。\n\n\n星期三放学前，他们亲眼看见蓝色徽章躺在水野抽屉里。星期四早晨，名牌和钥匙也在那里。十点二十分，老师当着所有人的面封住抽屉，在边缘贴上纸条并签名。十一点整，封条完好。抽屉里却多了一张录音卡。没人打开过抽屉。东西仍然进去了。\n\n\n最下一排第三格抽屉半开着 —— 像有人从后面推了一把，不是从前开锁。\n\n\n柜区在侧门走廊：两列临时柜靠墙，标签和封条一排排对齐。四月风从侧门缝进来，地板上是 **上履き** 的软边，不是室外鞋印。\n\n\n里面堆着：徽章两枚 · 标签一叠 · 钥匙扣三个 · 透明袋里的 **录音卡** —— 全在。\n\n\n水野真帆站在两步外。双手远离锁孔。钥匙不在她手上。\n\n\n「……不是我放的。」她声音很轻 —— 像怕一开口，故事就更像真的。\n\n\n「没钥匙 **怎么开**？」有人接得很快。\n\n\n慧美笔记本已经翻开，四栏格先写机制，不写小偷：\n\n\n**已确认**：抽屉半开 · 失物在内 · 水野 **无钥匙** · 封条完好\n\n\n**听说**：水野偷窃 · 破坏公开日\n\n\n陸珣蹲下，看锁孔周围：**无撬痕** · 无新划痕。\n\n\n公开日徽章在抽屉里叠着，标签角没折 —— 像滑进来，不是抓进来。\n\n\n志郎 **又** 量抽屉深度：最下层后方无隔板 —— 与上层不同。水平仪在柜顶晃了晃：「**偏了一格** —— 物会往低侧走。」\n\n\n慧美在仍不知道栏停笔：「谁放进不等于谁偷。」\n\n\n观察社把折叠桌搬到柜前。侧廊尽头 **观察社角落** 的证物盒里，翘角社徽压着上一案的空白底纸 —— 像提醒：先看路，再写名字。\n\n\n器材车从侧门经过。地面轻轻震。最下一排抽屉晃了一下。\n\n\n陸珣看向震动的 **时刻** —— 不是看向水野的脸。\n\n\n前面三案中，观察社每次都证明「大家认错了」。到了第四次，连光自己都觉得一句「先观察」显得太轻。「东西确实在她抽屉。」他说。「是。」慧美回答。「封条也没破。」「是。」\n\n\n「是不等于她偷。」陸珣没提高声音，只指柜缝：「先看路。」\n\n\n水野听见 「是」 连说两遍，肩缩得更小 —— 像两个是拼成了一个偷。\n\n\n志郎调出器材车轮转表：侧门经过 · 10:07 · 10:22 · 10:41。\n\n\n「10:41 这班，」志郎指清单，「刚好是 **徽章** 从准备室 **撤下** 的时间。」\n\n\n10:07那班对应标签滑入缝口的第一次微移。10:22名牌角在上层格沿露出一毫米。\n\n\n慧美在 **已确认** 写：轻物 · 倾斜柜 · 缝道 · 振动 **时刻重合** · 水平仪 **偏了一格**\n\n\n他们测量柜体。左侧比右侧低三毫米。背板向后倾斜。每次媒体车经过门槛，地板都会产生短促振动。轻、薄、边缘光滑的物件，容易从抽屉后部滑入贯通缝，再在一次次震动中逐层下落。\n\n\n志郎 用粉笔在柜顶标低侧—— 像上一案在黑板槽标膜边。\n\n\n为什么最后都进入水野抽屉？因为她在最下层。其他抽屉的后板下方仍有隔板；最下层后方则直接连通抽屉内部。\n\n\n封条完好的抽屉仍可「进物」—— 因为物从后缝进不是从前锁进。\n\n\n陸珣把一枚备用标签放在上一格柜面——标签滑向低侧，像被看不见的坡拉着走。\n\n\n「最下抽屉 **先有物**。」他轻声，「不是 **有人开锁**。」\n\n\n志郎建立复现实验。他在上层分别放入厚橡皮、纸片、金属徽章、塑料名牌、小钥匙、录音卡。先让全班记：厚橡皮不动，纸片只挪一点——轻的东西才听地板的话。然后让器材车以相同速度通过门槛五次。徽章、名牌、小钥匙和录音卡先后滑入最下层。每一件一侧都留下了与失物相似的细擦痕。\n\n\n全班围在柜后看缝道——像看上一案板槽里的膜边：看不见的路，却能送物。\n\n\n第五次车过时，录音卡滑入——与封条后「多出来」的时刻对上。封条没破，因为物从后进。\n\n\n班主任蹲下看擦痕方向：全部指向低侧缝口——与失物上的痕一致。她没说「洗白」，只说「报修柜体」。\n\n\n「最下抽屉 **先有物**。」陸珣轻声，「不是 **有人开锁**。」\n\n\n慧美补已确认：封条完好 · 10:41 车过 · 轻物迁移可复现 · 录音卡另论。\n\n\n「就算柜子歪，」一个女生站起来，「也是她先偷，再装无辜！」\n\n\n全班已经连好故事：水野偷物资 · 观察社又要帮她说话。\n\n\n有人把上一案海报和这一案抽屉接在一起：「她早就被排斥了。」\n\n\n光 想反驳——嗓子仍气声。他只在本上写：先机制，后动机；藏卡≠偷三件。\n\n\n慧美拦在柜前：「观察社写趣事，不写审判。」\n\n\n水野终于开口，声音发颤：「……抽屉里 **不只有** 徽章。」\n\n\n她看向那袋录音卡，像看一块很烫的东西。\n\n\n准备室里，志郎用 **试听耳机** 听了一秒，立刻摘下。\n\n\n「……朋友哭的声音。」慧美低声，「排练那天。上一案 不让贴的那段。」\n\n\n耳机里只有三秒——像上一案被剪短的录音一样危险。\n\n\n水野闭了闭眼：「卡滑进来的时候，我吓到了。」\n\n\n她没看抽屉，只看自己的手——像那三秒哭声还贴在指尖。\n\n\n「我藏起来……怕大家又播。」\n\n\n她没说「偷」——说「藏」。字差一个，故事差一整条链。\n\n\n有人已经在走廊说，要把「水野不得参加」的海报和排练录音一起公开，证明她们拖累活动。她害怕卡片被误播，就把它藏进自己的抽屉。第二天发现封条后，她不敢承认——因为一旦承认藏过一件，别人会自然认为其余三件也是她拿的。\n\n\n「藏和偷 ……」慧美分两行写：动机层分开。\n\n\n动机层分开：机制是振动转移；动机是藏起不想被播的哭声。不是偷。是怕。\n\n\n陸珣在本子写：物在哪 ≠ 谁拿过 · 找到 ≠ 故意放。\n\n\n班主任沉吟很久：「展示资格…… 暂缓取消。录音卡归还，不播放内容。」\n\n\n这一次，真相不能只说「她没偷」。因为她确实藏了录音卡。\n\n\n观察社在展示准备室做了两份说明。第一份写物理过程：分类柜后缝贯通 · 柜体倾斜 · 媒体车通过门槛产生振动 · 轻薄物品逐层迁移 · 三件失物由实验复现。第二份写责任边界：水野未拿走蓝色徽章、名牌和钥匙；水野未经许可藏起录音卡；录音卡涉及同学隐私，只由教师确认，不公开播放。\n\n\n第一份贴在柜区——给路过的人看机制。第二份只给教师——给藏卡留隐私边界。\n\n\n水野对全班，也是对自己：「对不起……我不该藏。可我真的没偷。」\n\n\n有人仍只记住「对不起」两个字——像上一案黑板上那三个字的回声。\n\n\n志郎在登记表补一行：\n\n\n  柜体倾斜须报修 · 振动时段避开清点\n\n\n修复动作：归还录音卡 · 公开说明不播放 · 失物逐一登记归位 · 封住后缝 · 调整柜脚水平 · 移动路线增加减速垫。\n\n\n志郎垫平柜脚，水泡回中。陸珣记：这一案 尾钩在午后光 —— 不是这里结束。\n\n\n下午，体育馆开始拍摄班级全景照。移动媒体器材车停在队伍后方，平板架在车顶。因为普通镜头装不下全班，志郎建议使用全景模式，从左向右缓慢移动拍摄。\n\n\n拍摄进行到一半，器材车旁的一根电源线被人踩住。清扫委员只好把车从队伍后面推开。**水野真帆** 向前让了半步，给志郎递器材。\n\n\n志郎接器材时侧身，挡住半秒侧光—— 只有水野脚边那一块地变暗又变亮。\n\n\n云在这时遮住太阳。十几秒后，拍摄结束。平板上的预览看起来很正常。\n\n\n水野看着自己的脚下。「我的影子怎么这么淡？」「因为刚才有云。」有人说。\n\n\n陸珣没接「云」。他看平板角：全景小图标亮着。\n\n\n侧廊传来欢呼。「合照 **投屏** 了！」\n\n\n陸珣把本子合上。这一案最后一行：**振动 · 倾斜 · 藏卡**。\n\n\n他跟着人群往体育馆走。大屏上，五人肩并肩——光 · 志郎 · 慧美 · 珣 · 水野。五人都在。\n\n\n可只有水野脚下，没有影子。光、志郎、慧美、陸珣和器材车的影子，都在。\n\n\n不是五人全无影——**仅水野** 脚下 **空** 一块。灯杆影 **仍** 横在 **地上**。\n\n\n水野没跑。她看自己的鞋尖—— 像上一案里听广播却开不了口的同一种累。\n\n（这一案 收束 · L4 → 案⑤ · 卷终）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：多层抽屉或叠放的纸盒 · 几枚轻小物件（纽扣、纸片）· 手机轻敲桌面模拟振动。\n\n步骤：把纸盒 **垫高一侧** 制造倾斜，轻物放在上层抽屉后部。轻敲桌面五下，观察物件是否滑向最低层。\n\n观察：擦痕方向是否一致？出现时间是否与「敲桌」同步？\n\n要点：东西出现在谁那里，不等于就是谁拿的。位置只能证明最后在哪里。\n\n\n**对照**：厚橡皮不滑入——只有轻薄物迁移。像给「偷」和「滑」分重量级。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 抽屉里不只有失物。  \n\n> 还有她不想让人听的那张卡。  \n\n> 哥哥说，东西滑进去的时候，没有人开锁。\n\n> 我觉得，大家先定了她是小偷，才后去打开抽屉。\n\n\n四件失物都在同一个抽屉里。\n\n\n三件是柜子和震动送进去的。  \n\n一件是水野同学自己藏的。\n\n\n哥哥做了倾斜抽屉实验。\n\n纽扣自己滑到 **最下层** —— 没人开锁。\n\n\n如果她什么都没做，  \n\n洗清她会比较容易。\n\n\n可她真的做错了一件事。\n\n\n哥哥说，  \n\n一个人做错一件事，  \n\n不会让她自动做错另外三件。\n\n\n洗清冤屈，  \n\n不是证明一个人从来没错。  \n\n是把每一件事，  \n\n放回它真正属于的地方。\n\n\n合照那天下午，  \n\n哥哥 说水野姐姐脚下少了影。\n\n\n不是五个人都没有——\n\n只有她那一块空着。\n\n\n我觉得，  \n\n四件失物和一张无影照，\n\n被大家用同一把尺子量——\n\n量成「都是她干的」。\n\n\n尺子错了。\n\n\n——第四案完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A004\n\n\n---\n\n【EDITOR · PRODUCTION META · A004 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A004】\n\n  · 这一 脸色发白。她没跑。像一跑，故事就更像真的。\n\n\n「我参加拍摄了。」她说。\n\n\n有人回答：「照片里有你，不等于你真的在。」\n\n\n这句话像一把钥匙。它把前四天所有怀疑一起打开了。\n\n\n慧美笔记本翻开，四栏格 **先写画面**：\n\n\n**已确认**：合照五人同框 · **仅水野脚下无影** · 四人+器材车+灯杆 **有影**\n\n\n**听说**：水野搞鬼 · 观察社合谋 · 公开日破坏\n\n\n志郎 **蹲** 下去看光脚下的影：「我有。」又看慧美：「她有。」看光：「他也有。」\n\n\n他也看器材车轮胎、灯杆底座 —— 影都在。不是「今天没太阳」 那种全无。\n\n\n轮到水野，地面空一块——像只挖走了她的那一截。\n\n\n「不是五人都没有。」志郎抬头，「是只有她。」\n\n\n这句话没能立刻压住谣言。谣言更快。\n\n\n「观察社写趣事，不写审判。」慧美声音稳，手却发白。\n\n\n志郎举平板：「先查 **怎么拍的**。」\n\n\n班主任敲栏杆：「二十分钟后预展。若不能说明，取消展示。」\n\n\n**事件钟**：二十分钟。\n\n社交钟：现在，连观察社也被编成共犯。\n\n\n陸珣看向大屏角落：一个小小的全景拍摄图标，像一颗不起眼的钉。\n\n\n有男生嚷：「是静电！上一案里柜子震过！」\n\n\n志郎当场试：气球擦头发 · 靠近地面——影 **还在**。\n\n\n他又试湿地面 · 反光地板 · 镜头炫光 —— 影仍在。\n\n\n「失败。」志郎咧嘴，「静电 **洗不掉** 这一块。」\n\n\n慧美在仍不知道写：静电对照失败 · 待查拍摄 · 不是五人同时无影\n\n\n水野低声：「……不是我 **弄的**。」\n\n\n没人接不是。大家接的是只有她没影 —— 这就够了。\n\n\n陸珣没反驳静电。他只在本子写：对照失败 · 下一项拍摄。\n\n\n陸珣要的是照片里的时间记录，不是谣言。\n\n\n平板里，合照分段曝光：10:52:03 · 10:52:05 · 10:52:07 —— 三段拼接。拍摄开始：13:12:08。拍摄结束：13:12:22。十四秒。不是一个瞬间。\n\n\n每一帧角上有曝光值——10:52:05比前后两帧亮0.3档——像侧光在那一秒挪了位置。\n\n\n「先别看人。」陸珣说，「看 **地面**。」\n\n\n在光与水野脚边，同一块有小裂纹的地砖出现了两次。画面左侧，书包带从一个学生肩上伸出，到中间突然消失，又在三十厘米外重新出现。\n\n\n「拼接缝。」志郎放大像素：「不是修图涂掉人——是扫到一半接下一半。」\n\n\n10:52:05 那一帧，水野真帆为志郎递器材而侧让半步；侧光变了，她脚下的阴影落在上一帧的地面区域。相邻帧覆盖时，只有她的那块影被吃掉了。\n\n\n志郎接上器材车日志：10:52 侧门经过 · 地面轻震 · 她刚好移动。\n\n\n本子：**全景 · 侧让 · 覆盖**。\n\n\n志郎把同一地点的单次快门试拍投上小屏：五人脚下皆有影。对照组成立。\n\n\n「不是她不带影。」陸珣轻声，「是这一张把她脚下的影弄丢了。」\n\n\n不是「我们几个移动」让五人全无影——只有水野在扫描到关键帧时侧让，只有她的地面阴影被相邻画面覆盖。\n\n\n「就算拍摄问题，」有人喊，「也是她故意站位！」\n\n\n故事已经拼完：A001 广播羞辱 · A002 志郎写字 · A003 慧美删稿 · A004 水野偷窃 · A005 无影合谋 —— 五件真事，一个假故事。\n\n\n走廊里有人把五案画成一条链：光 → 志郎 → 慧美 → 水野 → 观察社——像早就写好的犯人名单。\n\n\n陸珣把链拆开，重排成五行机制：误播 · 膜显 · 无实体 · 振动 · 拼接——没有一行写「合谋」。\n\n\n水野站在链的最末——不是因为她最该被指，是因为照片最会让人先看见缺什么。\n\n\n陸珣把五案记录夹摊在折叠桌：时间戳、膜边、空白底纸、倾斜水泡、拍摄信息——像五枚不同的钉。\n\n\n全班把五案串成一条链：水野和观察社用怪事破坏公开日。\n\n\n水野肩缩到最小。她没辩白五次指认里的任何一次。像累到不想再解释。\n\n\n陸珣开口，声音不大：「照片是真的。可你们讲的故事，还没有被证明。」\n\n\n剩下十二分钟。志郎把五个人排成一列，在体育馆侧门复现实验。\n\n\n侧门外就是上一案器材车过门槛的同一条线——五案的路在地理上也接上了。\n\n\n第一次拍摄，所有人保持不动。每个人都有影子。\n\n\n第二次，只有水野在扫描到一半时侧让半步，再站回原位。全景预览中，水野脚下的影子少了一半——光、志郎、慧美、陸珣的影仍在。\n\n\n第三次，水野侧让时用幕布短暂遮住高窗，让光线变化更明显。她的身体完整保留。脚下却是一块没有影子的地面。实验成功。\n\n\n第四次，对照：同一地点单次快门 —— 五人皆有影。\n\n\n光看四次预览：「不是她不带影。是这一张弄丢了她的那一块。」\n\n\n七分钟。\n\n\n慧美把四栏格摊大，像卷终清单：\n\n\n**已确认**：A001 旧录音误播+**失声日** · A002 膜显字 · A003 **无实体海报** · A004 振动滑入 · A005 全景 **仅水野** 阴影错位\n\n\n**听说**：五人合谋 · 水野厄运\n\n\n仍不知道：谁最先把五案串成一场破坏\n\n\n志郎指对照组：同一地点单次快门试拍——五人脚下皆有影。\n\n\n机制闭合：不是诅咒 · 不是静电 · 是拼接 + 水野侧让 + 光变。\n\n\n「就像第三案。」光说，「很多真实碎片拼成一个从来没有同时存在的整体。」\n\n\n「也像第一案。」慧美说，「先后发生的东西，被听成同一句。」\n\n\n「还像第二案。」志郎说，「表面留下了我们看不见的差异。」\n\n\n陸珣看向器材车：「第四案告诉我们，车经过哪里，会改变什么。」\n\n\n五案的答案第一次同时放在一张桌上。声音有时间。表面有记忆。人也有记忆。物品有路线。照片也不是没有时间的。\n\n\n前四案保存下来的记录，不再只是旧答案。它们成为第五案的公平线索。\n\n\n慧美把四栏改成卷终清单 —— 每一行只写机制短句，不写审判词：\n\n A001 · 旧文件误播 + **失声日** \n\n  A002 · 膜显字 · 未登记  \n\n A003 · **无实体** 海报 · 口述拼整 \n\n A004 · 倾斜振动 · 藏卡 **另论** \n\n A005 · 全景拼接 · 仅水野侧让丢影\n\n\n「……再拍一次。」水野声音发颤，「这一次，我 **不挪**。」\n\n\n全班决定重新拍一张。**这次不用全景拍摄。** 他们分成两组拍摄，再把两张照片并排展示，不假装所有人必须挤进同一个瞬间。\n\n\n光点头。志郎架平板，关掉全景拍摄。慧美数三。水野站定，脚不挪。\n\n\n第一组：光 · 志郎 · 慧美。第二组：陸珣 · 水野 · 班主任 **旁听**。\n\n\n快门。新合照上屏。\n\n\n五人都在。这一次，水野脚下也有影 —— 淡淡一块，像终于被允许站在地上。\n\n\n美纪拉着水野往中间走了一步。光站到另一边。志郎检查脚下地砖。慧美确认时间。陸珣没有先看镜头。他看了一眼每个人脚下。影子都在那里。\n\n\n有人 **小声**：「原来不是诅咒……」\n\n\n水野 没笑。她 只把鞋尖 往影里挪半寸。\n\n\n侧廊壁报栏，慧美贴 **四栏** 终稿：\n\n\n  我们看见的 / 我们以为的 / 后来证明的 / 仍然不知道的\n\n\n第三栏写着五案机制一行行短句。第四栏留白 —— 不替空栏填名字。\n\n\n她在我们看见的最末，用细笔写回一个名字：\n\n\n **水野真帆**\n\n\n名字旁边不写 「洗白」 不写 「无辜」 —— 只写名字回到并列。\n\n\n修复动作：全班重拍，慧美四栏壁报，水野名字并列写回，五案机制并列不串成阴谋。\n\n\n水野伸手，指尖碰了一下壁上自己名字。很轻。像确认影子和名字都还在。\n\n\n预展开始前三分钟，他们把三组图投上大屏幕：原始照片 · 无移动对照 · 移动与光线变化复现。\n\n\n志郎解释全景扫描和拼接。慧美展示时间线。光播放拍摄现场的环境声音：13:12:14，器材车轮子压过门槛，紧接着有人喊「向前让一下」——不是五个人一起躲，是水野在给志郎递器材。\n\n\n年级主任也来看拍摄信息。分段曝光三帧并排 —— 缝在水野脚边最明显。\n\n\n最后，水野站到屏幕前。「我参加了拍摄。」她说，「这张照片没有证明我没参加。」\n\n\n有人问：「那为什么 **只有她** 的影子不见了？」\n\n\n「因为车经过时，**只有我需要侧让**。」陸珣说，「照片没被修改。被软件拼接过。全景照片本来就是拼接。但不是观察社事后把人加进去。」\n\n\n**仅水野** 脚下无影 · 四人+车+灯杆 **有影** —— **不是** 五人 全无影的「集体消失」。\n\n\n班主任确认原文件和设备记录，允许展示继续。可事情还没有结束。\n\n\n年级主任问：「前四案为什么每次都由观察社给出解释？你们有没有选择只公布对自己有利的部分？」\n\n\n慧美拿出记录夹。「有。」\n\n\n所有人看向她。\n\n\n「第一案，我们先公布了录音拼接，却没有第一时间说光传播过未经确认的消息。」光点头。\n\n\n「第二案，我们证明志郎没写道歉，但他未经许可做实验，是后来才完整说明。」志郎点头。\n\n\n「第三案，我没有删海报，但我确实拿走了照片并保持沉默。」\n\n\n「第四案，水野没有拿三件失物，但藏了一张录音卡。」水野点头。\n\n\n慧美把记录夹翻到最后一页：「我们的解释没有造假。但我们每次都太急着证明『不是他』，没有先把『他到底做过什么』全部公开。这样会让别人觉得，我们只是在替朋友找理由。」\n\n\n观察社也有真实责任。不是伪造证据。是只顾把错误指控拆掉，却没有及时把真实责任放回去。\n\n\n陸珣说：「如果我们只说一个人没做过什么，却不说他真正做过什么，别人就会觉得真相少了一块。」\n\n\n年级主任 沉默几秒。几秒里体育馆只有预展音乐的底噪。\n\n\n年级主任没有停止观察社活动。他要求他们把之后的案件记录改成五栏：\n\n\n  我们看见的 · 我们以为的 · 后来证明的 · 仍然不知道的 · 当事人真正需要承担的\n\n\n公开日预展照常。器材车转下一班，地面轻轻震 —— 像提醒：怪事还会再来，误会也会。\n\n\n预展尾声，低年级停在壁报前读四栏—— 不全懂，但记住 「仍不知道」 四个字。\n\n\n活动结束后，光、慧美和志郎在观察社教室门口等陸珣。桌上放着一张临时社员申请表。\n\n\n申请表角压着案① 三周前彩排 打印条 —— 像书签，提醒 「时间」 第一。\n\n\n「这周已经结束了。」陸珣说。\n\n\n「所以才问你。」光说，「不是为了临时帮忙。」\n\n\n志郎指着申请表：「我们缺一个会先检查条件的人。」\n\n\n慧美补充：「也缺一个在大家已经得出结论以后，还敢说『这还没有被证明』的人。」\n\n\n「你们自己也会说。」「我们有时候说得太晚。」光承认。\n\n\n陸珣拿起笔。「我不是侦探。」「我们也不是。」慧美说，「我们是观察社。」「负责在怪事变成伤人的故事以前，给事实多一点时间。」\n\n\n陸珣在申请表上写下自己的名字。陸　珣。字写得不快。却没有停。\n\n\n慧美 递观察社笔记本角贴—— 眼睛+问号很小很小。\n\n\n志郎 念八秒句最后半句：「……大家都说是 她干的。」 念完自己摇头：「 下次要先写格子。」\n\n\n光补：「觉得奇怪，就先观察 —— 你已经观察一个月了。」\n\n\n水野从侧廊经过，停了一下，没说谢谢。只看了一眼壁上自己名字——像确认还在。\n\n\n陸珣 也看那名字。名字在第三栏和第一栏之间—— 不单独被贴在「听说」里。\n\n\n怪事不会伤人。误会会。所以，觉得奇怪，就先观察。\n\n\n侧廊 四月的风把壁报角掀起一丝—— 慧美用胶带压平。压平不是结束。是存档。\n\n（案⑤ 收束 · 卷终 · 第一单元完）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：手机全景/慢扫拍照功能 · 五人站一排 · 手电筒模拟侧光。\n\n步骤：第一次全员不动拍摄。第二次让 **中间一人** 在扫描到一半时侧让半步，同时用手电筒改变地面亮度，再站回原位。\n\n观察：是否可能出现「人在、影不在」？再用 **普通单次快门** 对照——影子是否都在？\n\n要点：照片可以真实，却不一定保存了同一个瞬间。全景照片本来就是拼接。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 重新拍照以后，**她的**影子回来了。\n\n> 哥哥说，照片可以修，故事也要重看。\n\n> 可我觉得，真正回来的不是影子——  \n\n> 是他们终于又愿意 **站在一起**。\n\n\n今天，照片里有一个人没有影子。\n\n\n她明明站在那里，  \n\n却有人说：「照片里有你，不等于你真的在。」\n\n\n哥哥 **把** 五案记录排在桌上像五张卡片。\n\n\n卡片没有写「坏人」只写「机制」。\n\n\n我觉得，  \n\n第一单元 **最难** 的不是找到答案。\n\n\n是 在所有人都觉得已经有答案的时候，  \n\n还 肯把空栏留着。\n\n\n哥哥证明，  \n\n照片没有说谎。  \n\n可照片也没有把同一个瞬间完整留下来。\n\n\n它把十四秒里的许多小片段，  \n\n拼成了一张看起来只用了一秒的照片。\n\n\n前四天也是这样。  \n\n一句话、一行字、一张海报、几件失物，  \n\n每一样都是真的。\n\n\n可是大家把它们拼得太快，  \n\n就拼出了一个不存在的人：  \n\n一个故意说坏话、写道歉、删海报、偷东西、修改照片的人。\n\n\n哥哥说，  \n\n他们没有抓到幕后黑手。\n\n\n我觉得，他们抓到了一件更难抓的东西：  \n\n就是一个故事，  \n\n怎样在所有人都觉得自己有证据的时候，  \n\n悄悄变错。\n\n\n四月最后一个公开日周的夜里，陸瑆把五案画进一本「观察日记」——喇叭、黑板、空白格、抽屉、无影脚边各一页。\n\n\n她在无影页画了五个人——四个有影，一个脚边空。哥哥说：「不是五个人都没有。」她改了——只空水野姐姐那一块。\n\n\n我觉得，第一单元像五块拼图——每块都真，拼法错了就变成另一张图。\n\n\n重拍以后，拼图换了拼法——名字和影子都回到该在的地方。\n\n\n——第五案完——  \n\n——第一单元完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A005\n\n\n---\n\n【EDITOR · PRODUCTION META · A005 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A005】\n\n  · 案⑤《午休后消失的影子》\n\n  · 案号：A005 · Engine V2.0 · Campus Ripple\n\n  · 状态：G-CN_LOCK · LOCK aligned · Hybrid Voice v3 · 卷末瘦圈 2026-06-08\n\n  · 八秒句：合照里只有一个人的影子不见了——大家都说是她干的。\n\n  · 错误责任：水野带来厄运/观察社帮她遮丑；前四案解释是集体包庇。\n\n  · 真实责任：全景拼接+水野侧让致单人阴影错位；各人传播/沉默/未及时说明。\n\n  · FC概要：FC-1 全景icon · FC-2 分段曝光拍摄信息 · FC-3 器材车时间线 · FC-4 单次快门对照有影\n\n  · 钩子：卷终重拍 · 写回名字 · 陸珣正式入社 · 单元收束\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 投屏无影 · SC-02 诅咒议论 · SC-03 观察社/双倒计时\n\nSC-04 静电误推失败 · SC-05 拍摄信息时间线 · SC-06 误指峰值/五案串\n\nSC-07 卷级回收 · SC-08 重拍有影 · SC-09 四栏壁报 · SC-10 卷终\n\nFC-1 全景icon · FC-2 分段曝光拍摄信息 · FC-3 器材车时间线 · FC-4 单次快门对照有影 · 静电失败\n\n误指：水野/观察社搞鬼 · true_responsibility：全景拼接；各人传播/沉默/未及时说明\n\nrelation：卷终 · 回收 A001–A004 · EXPERT_LOCK 仅水野无影\n\n科学样本：V2迁移/05_科学验证/A001-A005_机制科学验证清单_V0.2.md §A005\n", "paragraphs": ["《学堂趣事录》", "第1卷 · 觉得奇怪，就先观察", "单元 · （待定 · 工作名：全校都认错了人）", "========================", "五、午休后消失的影子", "----------------------", "午休结束后，体育馆的大屏幕亮了。预展音乐低了一格，像给照片让路。", "全班合照慢慢铺满整面白墙。四十多个孩子站成三排。每个人都穿着相同的 **室内鞋**。每个人都朝镜头看。每个人都在照片里。", "体育馆穹顶把回声托高一层。侧门停着灰白 **器材车**，灯杆把长影投在地上。大屏前的五人 —— 光 **橙红导播背心**，志郎 **绿格+绿背心**，慧美 **黄开衫银框镜**，珣 **藏青外套** —— 都穿着 **上履き**，肩并肩站成一排。", "大屏边角还亮着公开日倒计时：十九分钟。", "预展合照上，五人肩并肩：伊藤光 · 松本志郎 · 加藤慧美 · 陸珣 · **水野真帆**。", "器材车停在侧门。灯杆的影子长长投在地上。车辙边，轮胎也有影。", "然后，有人 **咦** 了一声。", "「水野脚下…… **空的**？」", "陸珣没看水野的脸。他看的是地面 —— 四人的鞋边都有影，只有水野站着的那一块，像被挖走了一截。光、志郎、慧美、陸珣和器材车的影子，都在。", "本子：**五人都在 · 仅一人无影**。", "大屏的光很亮。亮到大家先看见缺了什么，才想起五个人都在。", "议论比预展音乐 **还快**。", "「她带来厄运。」「上一案 偷东西的报应。」「观察社帮她遮丑吧？」", "有人把五案串成一条绳：广播 · 黑板 · 海报 · 抽屉 · 无影 —— 像早就写好的剧本。", "**八秒传播句**在走廊里自己成形：合照 false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改1稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n五、午休后消失的影子\n\n----------------------\n\n\n午休结束后，体育馆的大屏幕亮了。预展音乐低了一格，像给照片让路。\n\n\n全班合照慢慢铺满整面白墙。四十多个孩子站成三排。每个人都穿着相同的 **室内鞋**。每个人都朝镜头看。每个人都在照片里。\n\n\n体育馆穹顶把回声托高一层。侧门停着灰白 **器材车**，灯杆把长影投在地上。大屏前的五人 —— 光 **橙红导播背心**，志郎 **绿格+绿背心**，慧美 **黄开衫银框镜**，珣 **藏青外套** —— 都穿着 **上履き**，肩并肩站成一排。\n\n\n大屏边角还亮着公开日倒计时：十九分钟。\n\n\n预展合照上，五人肩并肩：伊藤光 · 松本志郎 · 加藤慧美 · 陸珣 · **水野真帆**。\n\n\n器材车停在侧门。灯杆的影子长长投在地上。车辙边，轮胎也有影。\n\n\n然后，有人 **咦** 了一声。\n\n\n「水野脚下…… **空的**？」\n\n\n陸珣没看水野的脸。他看的是地面 —— 四人的鞋边都有影，只有水野站着的那一块，像被挖走了一截。光、志郎、慧美、陸珣和器材车的影子，都在。\n\n\n本子：**五人都在 · 仅一人无影**。\n\n\n大屏的光很亮。亮到大家先看见缺了什么，才想起五个人都在。\n\n\n议论比预展音乐 **还快**。\n\n\n「她带来厄运。」「上一案 偷东西的报应。」「观察社帮她遮丑吧？」\n\n\n有人把五案串成一条绳：广播 · 黑板 · 海报 · 抽屉 · 无影 —— 像早就写好的剧本。\n\n\n**八秒传播句**在走廊里自己成形：合照里只有一个人的影子不见了——大家都说是她干的。\n\n\n水野真帆站在大屏下，脸色发白。她没跑。像一跑，故事就更像真的。\n\n\n「我参加拍摄了。」她说。\n\n\n有人回答：「照片里有你，不等于你真的在。」\n\n\n这句话像一把钥匙。它把前四天所有怀疑一起打开了。\n\n\n慧美笔记本翻开，四栏格 **先写画面**：\n\n\n**已确认**：合照五人同框 · **仅水野脚下无影** · 四人+器材车+灯杆 **有影**\n\n\n**听说**：水野搞鬼 · 观察社合谋 · 公开日破坏\n\n\n志郎 **蹲** 下去看光脚下的影：「我有。」又看慧美：「她有。」看光：「他也有。」\n\n\n他也看器材车轮胎、灯杆底座 —— 影都在。不是「今天没太阳」 那种全无。\n\n\n轮到水野，地面空一块——像只挖走了她的那一截。\n\n\n「不是五人都没有。」志郎抬头，「是只有她。」\n\n\n这句话没能立刻压住谣言。谣言更快。\n\n\n「观察社写趣事，不写审判。」慧美声音稳，手却发白。\n\n\n志郎举平板：「先查 **怎么拍的**。」\n\n\n班主任敲栏杆：「二十分钟后预展。若不能说明，取消展示。」\n\n\n**事件钟**：二十分钟。\n\n社交钟：现在，连观察社也被编成共犯。\n\n\n陸珣看向大屏角落：一个小小的全景拍摄图标，像一颗不起眼的钉。\n\n\n有男生嚷：「是静电！上一案里柜子震过！」\n\n\n志郎当场试：气球擦头发 · 靠近地面——影 **还在**。\n\n\n他又试湿地面 · 反光地板 · 镜头炫光 —— 影仍在。\n\n\n「失败。」志郎咧嘴，「静电 **洗不掉** 这一块。」\n\n\n慧美在仍不知道写：静电对照失败 · 待查拍摄 · 不是五人同时无影\n\n\n水野低声：「……不是我 **弄的**。」\n\n\n没人接不是。大家接的是只有她没影 —— 这就够了。\n\n\n陸珣没反驳静电。他只在本子写：对照失败 · 下一项拍摄。\n\n\n陸珣要的是照片里的时间记录，不是谣言。\n\n\n平板里，合照分段曝光：10:52:03 · 10:52:05 · 10:52:07 —— 三段拼接。拍摄开始：13:12:08。拍摄结束：13:12:22。十四秒。不是一个瞬间。\n\n\n每一帧角上有曝光值——10:52:05比前后两帧亮0.3档——像侧光在那一秒挪了位置。\n\n\n「先别看人。」陸珣说，「看 **地面**。」\n\n\n在光与水野脚边，同一块有小裂纹的地砖出现了两次。画面左侧，书包带从一个学生肩上伸出，到中间突然消失，又在三十厘米外重新出现。\n\n\n「拼接缝。」志郎放大像素：「不是修图涂掉人——是扫到一半接下一半。」\n\n\n10:52:05 那一帧，水野真帆为志郎递器材而侧让半步；侧光变了，她脚下的阴影落在上一帧的地面区域。相邻帧覆盖时，只有她的那块影被吃掉了。\n\n\n志郎接上器材车日志：10:52 侧门经过 · 地面轻震 · 她刚好移动。\n\n\n本子：**全景 · 侧让 · 覆盖**。\n\n\n志郎把同一地点的单次快门试拍投上小屏：五人脚下皆有影。对照组成立。\n\n\n「不是她不带影。」陸珣轻声，「是这一张把她脚下的影弄丢了。」\n\n\n不是「我们几个移动」让五人全无影——只有水野在扫描到关键帧时侧让，只有她的地面阴影被相邻画面覆盖。\n\n\n「就算拍摄问题，」有人喊，「也是她故意站位！」\n\n\n故事已经拼完：A001 广播羞辱 · A002 志郎写字 · A003 慧美删稿 · A004 水野偷窃 · A005 无影合谋 —— 五件真事，一个假故事。\n\n\n走廊里有人把五案画成一条链：光 → 志郎 → 慧美 → 水野 → 观察社——像早就写好的犯人名单。\n\n\n陸珣把链拆开，重排成五行机制：误播 · 膜显 · 无实体 · 振动 · 拼接——没有一行写「合谋」。\n\n\n水野站在链的最末——不是因为她最该被指，是因为照片最会让人先看见缺什么。\n\n\n陸珣把五案记录夹摊在折叠桌：时间戳、膜边、空白底纸、倾斜水泡、拍摄信息——像五枚不同的钉。\n\n\n全班把五案串成一条链：水野和观察社用怪事破坏公开日。\n\n\n水野肩缩到最小。她没辩白五次指认里的任何一次。像累到不想再解释。\n\n\n陸珣开口，声音不大：「照片是真的。可你们讲的故事，还没有被证明。」\n\n\n剩下十二分钟。志郎把五个人排成一列，在体育馆侧门复现实验。\n\n\n侧门外就是上一案器材车过门槛的同一条线——五案的路在地理上也接上了。\n\n\n第一次拍摄，所有人保持不动。每个人都有影子。\n\n\n第二次，只有水野在扫描到一半时侧让半步，再站回原位。全景预览中，水野脚下的影子少了一半——光、志郎、慧美、陸珣的影仍在。\n\n\n第三次，水野侧让时用幕布短暂遮住高窗，让光线变化更明显。她的身体完整保留。脚下却是一块没有影子的地面。实验成功。\n\n\n第四次，对照：同一地点单次快门 —— 五人皆有影。\n\n\n光看四次预览：「不是她不带影。是这一张弄丢了她的那一块。」\n\n\n七分钟。\n\n\n慧美把四栏格摊大，像卷终清单：\n\n\n**已确认**：A001 旧录音误播+**失声日** · A002 膜显字 · A003 **无实体海报** · A004 振动滑入 · A005 全景 **仅水野** 阴影错位\n\n\n**听说**：五人合谋 · 水野厄运\n\n\n仍不知道：谁最先把五案串成一场破坏\n\n\n志郎指对照组：同一地点单次快门试拍——五人脚下皆有影。\n\n\n机制闭合：不是诅咒 · 不是静电 · 是拼接 + 水野侧让 + 光变。\n\n\n「就像第三案。」光说，「很多真实碎片拼成一个从来没有同时存在的整体。」\n\n\n「也像第一案。」慧美说，「先后发生的东西，被听成同一句。」\n\n\n「还像第二案。」志郎说，「表面留下了我们看不见的差异。」\n\n\n陸珣看向器材车：「第四案告诉我们，车经过哪里，会改变什么。」\n\n\n五案的答案第一次同时放在一张桌上。声音有时间。表面有记忆。人也有记忆。物品有路线。照片也不是没有时间的。\n\n\n前四案保存下来的记录，不再只是旧答案。它们成为第五案的公平线索。\n\n\n慧美把四栏改成卷终清单 —— 每一行只写机制短句，不写审判词：\n\n A001 · 旧文件误播 + **失声日** \n\n  A002 · 膜显字 · 未登记  \n\n A003 · **无实体** 海报 · 口述拼整 \n\n A004 · 倾斜振动 · 藏卡 **另论** \n\n A005 · 全景拼接 · 仅水野侧让丢影\n\n\n「……再拍一次。」水野声音发颤，「这一次，我 **不挪**。」\n\n\n全班决定重新拍一张。**这次不用全景拍摄。** 他们分成两组拍摄，再把两张照片并排展示，不假装所有人必须挤进同一个瞬间。\n\n\n光点头。志郎架平板，关掉全景拍摄。慧美数三。水野站定，脚不挪。\n\n\n第一组：光 · 志郎 · 慧美。第二组：陸珣 · 水野 · 班主任 **旁听**。\n\n\n快门。新合照上屏。\n\n\n五人都在。这一次，水野脚下也有影 —— 淡淡一块，像终于被允许站在地上。\n\n\n美纪拉着水野往中间走了一步。光站到另一边。志郎检查脚下地砖。慧美确认时间。陸珣没有先看镜头。他看了一眼每个人脚下。影子都在那里。\n\n\n有人 **小声**：「原来不是诅咒……」\n\n\n水野 没笑。她 只把鞋尖 往影里挪半寸。\n\n\n侧廊壁报栏，慧美贴 **四栏** 终稿：\n\n\n  我们看见的 / 我们以为的 / 后来证明的 / 仍然不知道的\n\n\n第三栏写着五案机制一行行短句。第四栏留白 —— 不替空栏填名字。\n\n\n她在我们看见的最末，用细笔写回一个名字：\n\n\n **水野真帆**\n\n\n名字旁边不写 「洗白」 不写 「无辜」 —— 只写名字回到并列。\n\n\n修复动作：全班重拍，慧美四栏壁报，水野名字并列写回，五案机制并列不串成阴谋。\n\n\n水野伸手，指尖碰了一下壁上自己名字。很轻。像确认影子和名字都还在。\n\n\n预展开始前三分钟，他们把三组图投上大屏幕：原始照片 · 无移动对照 · 移动与光线变化复现。\n\n\n志郎解释全景扫描和拼接。慧美展示时间线。光播放拍摄现场的环境声音：13:12:14，器材车轮子压过门槛，紧接着有人喊「向前让一下」——不是五个人一起躲，是水野在给志郎递器材。\n\n\n年级主任也来看拍摄信息。分段曝光三帧并排 —— 缝在水野脚边最明显。\n\n\n最后，水野站到屏幕前。「我参加了拍摄。」她说，「这张照片没有证明我没参加。」\n\n\n有人问：「那为什么 **只有她** 的影子不见了？」\n\n\n「因为车经过时，**只有我需要侧让**。」陸珣说，「照片没被修改。被软件拼接过。全景照片本来就是拼接。但不是观察社事后把人加进去。」\n\n\n**仅水野** 脚下无影 · 四人+车+灯杆 **有影** —— **不是** 五人 全无影的「集体消失」。\n\n\n班主任确认原文件和设备记录，允许展示继续。可事情还没有结束。\n\n\n年级主任问：「前四案为什么每次都由观察社给出解释？你们有没有选择只公布对自己有利的部分？」\n\n\n慧美拿出记录夹。「有。」\n\n\n所有人看向她。\n\n\n「第一案，我们先公布了录音拼接，却没有第一时间说光传播过未经确认的消息。」光点头。\n\n\n「第二案，我们证明志郎没写道歉，但他未经许可做实验，是后来才完整说明。」志郎点头。\n\n\n「第三案，我没有删海报，但我确实拿走了照片并保持沉默。」\n\n\n「第四案，水野没有拿三件失物，但藏了一张录音卡。」水野点头。\n\n\n慧美把记录夹翻到最后一页：「我们的解释没有造假。但我们每次都太急着证明『不是他』，没有先把『他到底做过什么』全部公开。这样会让别人觉得，我们只是在替朋友找理由。」\n\n\n观察社也有真实责任。不是伪造证据。是只顾把错误指控拆掉，却没有及时把真实责任放回去。\n\n\n陸珣说：「如果我们只说一个人没做过什么，却不说他真正做过什么，别人就会觉得真相少了一块。」\n\n\n年级主任 沉默几秒。几秒里体育馆只有预展音乐的底噪。\n\n\n年级主任没有停止观察社活动。他要求他们把之后的案件记录改成五栏：\n\n\n  我们看见的 · 我们以为的 · 后来证明的 · 仍然不知道的 · 当事人真正需要承担的\n\n\n公开日预展照常。器材车转下一班，地面轻轻震 —— 像提醒：怪事还会再来，误会也会。\n\n\n预展尾声，低年级停在壁报前读四栏—— 不全懂，但记住 「仍不知道」 四个字。\n\n\n活动结束后，光、慧美和志郎在观察社教室门口等陸珣。桌上放着一张临时社员申请表。\n\n\n申请表角压着案① 三周前彩排 打印条 —— 像书签，提醒 「时间」 第一。\n\n\n「这周已经结束了。」陸珣说。\n\n\n「所以才问你。」光说，「不是为了临时帮忙。」\n\n\n志郎指着申请表：「我们缺一个会先检查条件的人。」\n\n\n慧美补充：「也缺一个在大家已经得出结论以后，还敢说『这还没有被证明』的人。」\n\n\n「你们自己也会说。」「我们有时候说得太晚。」光承认。\n\n\n陸珣拿起笔。「我不是侦探。」「我们也不是。」慧美说，「我们是观察社。」「负责在怪事变成伤人的故事以前，给事实多一点时间。」\n\n\n陸珣在申请表上写下自己的名字。陸　珣。字写得不快。却没有停。\n\n\n慧美 递观察社笔记本角贴—— 眼睛+问号很小很小。\n\n\n志郎 念八秒句最后半句：「……大家都说是 她干的。」 念完自己摇头：「 下次要先写格子。」\n\n\n光补：「觉得奇怪，就先观察 —— 你已经观察一个月了。」\n\n\n水野从侧廊经过，停了一下，没说谢谢。只看了一眼壁上自己名字——像确认还在。\n\n\n陸珣 也看那名字。名字在第三栏和第一栏之间—— 不单独被贴在「听说」里。\n\n\n怪事不会伤人。误会会。所以，觉得奇怪，就先观察。\n\n\n侧廊 四月的风把壁报角掀起一丝—— 慧美用胶带压平。压平不是结束。是存档。\n\n（案⑤ 收束 · 卷终 · 第一单元完）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：手机全景/慢扫拍照功能 · 五人站一排 · 手电筒模拟侧光。\n\n步骤：第一次全员不动拍摄。第二次让 **中间一人** 在扫描到一半时侧让半步，同时用手电筒改变地面亮度，再站回原位。\n\n观察：是否可能出现「人在、影不在」？再用 **普通单次快门** 对照——影子是否都在？\n\n要点：照片可以真实，却不一定保存了同一个瞬间。全景照片本来就是拼接。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 重新拍照以后，**她的**影子回来了。\n\n> 哥哥说，照片可以修，故事也要重看。\n\n> 可我觉得，真正回来的不是影子——  \n\n> 是他们终于又愿意 **站在一起**。\n\n\n今天，照片里有一个人没有影子。\n\n\n她明明站在那里，  \n\n却有人说：「照片里有你，不等于你真的在。」\n\n\n哥哥 **把** 五案记录排在桌上像五张卡片。\n\n\n卡片没有写「坏人」只写「机制」。\n\n\n我觉得，  \n\n第一单元 **最难** 的不是找到答案。\n\n\n是 在所有人都觉得已经有答案的时候，  \n\n还 肯把空栏留着。\n\n\n哥哥证明，  \n\n照片没有说谎。  \n\n可照片也没有把同一个瞬间完整留下来。\n\n\n它把十四秒里的许多小片段，  \n\n拼成了一张看起来只用了一秒的照片。\n\n\n前四天也是这样。  \n\n一句话、一行字、一张海报、几件失物，  \n\n每一样都是真的。\n\n\n可是大家把它们拼得太快，  \n\n就拼出了一个不存在的人：  \n\n一个故意说坏话、写道歉、删海报、偷东西、修改照片的人。\n\n\n哥哥说，  \n\n他们没有抓到幕后黑手。\n\n\n我觉得，他们抓到了一件更难抓的东西：  \n\n就是一个故事，  \n\n怎样在所有人都觉得自己有证据的时候，  \n\n悄悄变错。\n\n\n四月最后一个公开日周的夜里，陸瑆把五案画进一本「观察日记」——喇叭、黑板、空白格、抽屉、无影脚边各一页。\n\n\n她在无影页画了五个人——四个有影，一个脚边空。哥哥说：「不是五个人都没有。」她改了——只空水野姐姐那一块。\n\n\n我觉得，第一单元像五块拼图——每块都真，拼法错了就变成另一张图。\n\n\n重拍以后，拼图换了拼法——名字和影子都回到该在的地方。\n\n\n——第五案完——  \n\n——第一单元完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A005\n\n\n---\n\n【EDITOR · PRODUCTION META · A005 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A005】\n\n  · 案⑤《午休后消失的影子》\n\n  · 案号：A005 · Engine V2.0 · Campus Ripple\n\n  · 状态：G-CN_LOCK · LOCK aligned · Hybrid Voice v3 · 卷末瘦圈 2026-06-08\n\n  · 八秒句：合照里只有一个人的影子不见了——大家都说是她干的。\n\n  · 错误责任：水野带来厄运/观察社帮她遮丑；前四案解释是集体包庇。\n\n  · 真实责任：全景拼接+水野侧让致单人阴影错位；各人传播/沉默/未及时说明。\n\n  · FC概要：FC-1 全景icon · FC-2 分段曝光拍摄信息 · FC-3 器材车时间线 · FC-4 单次快门对照有 一张。**这次不用全景拍摄。** 他们分成两组拍摄，再把两张照片并排展示，不假装所有人必须挤进同一个瞬间。", "光点头。志郎架平板，关掉全景拍摄。慧美数三。水野站定，脚不挪。", "第一组：光 · 志郎 · 慧美。第二组：陸珣 · 水野 · 班主任 **旁听**。", "快门。新合照上屏。", "五人都在。这一次，水野脚下也有影 —— 淡淡一块，像终于被允许站在地上。", "美纪拉着水野往中间走了一步。光站到另一边。志郎检查脚下地砖。慧美确认时间。陸珣没有先看镜头。他看了一眼每个人脚下。影子都在那里。", "有人 **小声**：「原来不是诅咒……」", "水野 没笑。她 只把鞋尖 往影里挪半寸。", "侧廊壁报栏，慧美贴 **四栏** 终稿：", "我们看见的 / 我们以为的 / 后来证明的 / 仍然不知道的", "第三栏写着五案机制一行行短句。第四栏留白 —— 不替空栏填名字。", "她在我们看见的最末，用细笔写回一个名字：", "**水野真帆**", "名字旁边不写 「洗白」 不写 「无辜」 —— 只写名字回到并列。", "修复动作：全班重拍，慧美四栏壁报，水野名字并列写回，五案机制并列不串成阴谋。", "水野伸手，指尖碰了一下壁上自己名字。很轻。像确认影子和名字都还在。", "预展开始前三分钟，他们把三组图投上大屏幕：原始照片 · 无移动对照 · 移动与光线变化复现。", "志郎解释全景扫描和拼接。慧美展示时间线。光播放拍摄现场的环境声音：13:12:14，器材车轮子压过门槛，紧接着有人喊「向前让一下」——不是五个人一起躲，是水野在给志郎递器材。", "年级主任也来看拍摄信息。分段曝光三帧并排 —— 缝在水野脚边最明显。", "最后，水野站到屏幕前。「我参加了拍摄。」她说，「这张照片没有证明我没参加。」", "有人问：「那为什么 **只有她** 的影子不见了？」", "「因为车经过时，**只有我需要侧让**。」陸珣说，「照片没被修改。被软件拼接过。全景照片本来就是拼接。但不是观察社事后把人加进去。」", "**仅水野** 脚下无影 · 四人+车+灯杆 **有影** —— **不是** 五人 全无影的「集体消失」。", "班主任确认原文件和设备记录，允许展示继续。可事情还没有结束。", "年级主任问：「前四案为什么每次都由观察社给出解释？你们有没有选择只公布对自己有利的部分？」", "慧美拿出记录夹。「有。」", "所有人看向她。", "「第一案，我们先公布了录音拼接，却没有第一时间说光传播过未经确认的消息。」光点头。", "「第二案，我们证明志郎没写道歉，但他未经许可做实验，是后来才完整说明。」志郎点头。", "「第三案，我没有删海报，但我确实拿走了照片并保持沉默。」", "「第四案，水野没有拿三件失物，但藏了一张录音卡。」水野点头。", "慧美把记录夹翻到最后一页：「我们的解释没有造假。但我们每次都太急着证明『不是他』，没有先把『他到底做过什么』全部公开。这样会让别人觉得，我们只是在替朋友找理由。」", "观察社也有真实责任。不是伪造证据。是只顾把错误指控拆掉，却没有及时把真实责任放回去。", "陸珣说：「如果我们只说一个人没做过什么，却不说他真正做过什么，别人就会觉得真相少了一块。」", "年级主任 沉默几秒。几秒里体育馆只有预展音乐的底噪。", "年级主任没有停止观察社活动。他要求他们把之后的案件记录改成五栏：", "我们看见的 · 我们以为的 · 后来证明的 · 仍然不知道的 · 当事人真正需要承担的", "公开日预展照常。器材车转下一班，地面轻轻震 —— 像提醒：怪事还会再来，误会也会。", "预展尾声，低年级停在壁报前读四栏—— 不全懂，但记住 「仍不知道」 四个字。", "活动结束后，光、慧美和志郎在观察社教室门口等陸珣。桌上放着一张临时社员申请表。", "申请表角压着案① 三周前彩排 打印条 —— 像书签，提醒 「时间」 第一。", "「这周已经结束了。」陸珣说。", "「所以才问你。」光说，「不是为了临时帮忙。」", "志郎指着申请表：「我们缺一个会先检查条件的人。」", "慧美补充：「也缺一个在大家已经得出结论以后，还敢说『这还没有被证明』的人。」", "「你们自己也会说。」「我们有时候说得太晚。」光承认。", "陸珣拿起笔。「我不是侦探。」「我们也不是。」慧美说，「我们是观察社。」「负责在怪事变成伤人的故事以前，给事实多一点时间。」", "陸珣在申请表上写下自己的名字。陸　珣。字写得不快。却没有停。", "慧美 递观察社笔记本角贴—— 眼睛+问号很小很小。", "志郎 念八秒句最后半句：「……大家都说是 她干的。」 念完自己摇头：「 下次要先写格子。」", "光补：「觉得奇怪，就先观察 —— 你已经观察一个月了。」", "水野从侧廊经过，停了一下，没说谢谢。只看了一眼壁上自己名字——像确认还在。", "陸珣 也看那名字。名字在第三栏和第一栏之间—— 不单独被贴在「听说」里。", "怪事不会伤人。误会会。所以，觉得奇怪，就先观察。", "侧廊 四月的风把壁报角掀起一丝—— 慧美用胶带压平。压平不是结束。是存档。", "（案⑤ 收束 · 卷终 · 第一单元完）", "---", "【读者可以试 · P06家庭实验】", "材料：手机全景/慢扫拍照功能 · 五人站一排 · 手电筒模拟侧光。", "步骤：第一次全员不动拍摄。第二次让 **中间一人** 在扫描到一半时侧让半步，同时用手电筒改变地面亮度，再站回原位。", "观察：是否可能出现「人在、影不在」？再用 **普通单次快门** 对照——影子是否都在？", "要点：照片可以真实，却不一定保存了同一个瞬间。全景照片本来就是拼接。", "---", "瑆笔记 · 第二真相", "----------------", "> 重新拍照以后，**她的**影子回来了。", "> 哥哥说，照片可以修，故事也要重看。", "> 可我觉得，真正回来的不是影子——", "> 是他们终于又愿意 **站在一起**。", "今天，照片里有一个人没有影子。", "她明明站在那里，", "却有人说：「照片里有你，不等于你真的在。」", "哥哥 **把** 五案记录排在桌上像五张卡片。", "卡片没有写「坏人」只写「机制」。", "我觉得，", "第一单元 **最难** 的不是找到答案。", "是 在所有人都觉得已经有答案的时候，", "还 肯把空栏留着。", "哥哥证明，", "照片没有说谎。", "可照片也没有把同一个瞬间完整留下来。", "它把十四秒里的许多小片段，", "拼成了一张看起来只用了一秒的照片。", "前四天也是这样。", "一句话、一行字、一张海报、几件失物，", "每一样都是真的。", "可是大家把它们拼得太快，", "就拼出了一个不存在的人：", "一个故意说坏话、写道歉、删海报、偷东西、修改照片的人。", "哥哥说，", "他们没有抓到幕后黑手。", "我觉得，他们抓到了一件更难抓的东西：", "就是一个故事，", "怎样在所有人都觉得自己有证据的时候，", "悄悄变错。", "四月最后一个公开日周的夜里，陸瑆把五案画进一本「观察日记」——喇叭、黑板、空白格、抽屉、无影脚边各一页。", "她在无影页画了五个人——四个有影，一个脚边空。哥哥说：「不是五个人都没有。」她改了——只空水野姐姐那一块。", "我觉得，第一单元像五块拼图——每块都真，拼法错了就变成另一张图。", "重拍以后，拼图换了拼法——名字和影子都回到该在的地方。", "——第五案完——", "——第一单元完——", "---", "【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A005", "---", "【EDITOR · PRODUCTION META · A005 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A005】", "· 案⑤《午休后消失的影子》", "· 案号：A005 · Engine V2.0 · Campus Ripple", "· 状态：G-CN_LOCK · LOCK aligned · Hybrid Voice v3 · 卷末瘦圈 2026-06-08", "· 八秒句：合照里只有一个人的影子不见了——大家都说是她干的。", "· 错误责任：水野带来厄运/观察社帮她遮丑；前四案解释是集体包庇。", "· 真实责任：全景拼接+水野侧让致单人阴影错位；各人传播/沉默/未及时说明。", "· FC概要：FC-1 全景icon · FC-2 分段曝光拍摄信息 · FC-3 器材车时间线 · FC-4 单次快门对照有影", "· 钩子：卷终重拍 · 写回名字 · 陸珣正式入社 · 单元收束\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08", "---", "【V2.0 场级对照 · G-SHOT-T ready】", "SC-01 投屏无影 · SC-02 诅咒议论 · SC-03 观察社/双倒计时", "SC-04 静电误推失败 · SC-05 拍摄信息时间线 · SC-06 误指峰值/五案串", "SC-07 卷级回收 · SC-08 重拍有影 · SC-09 四栏壁报 · SC-10 卷终", "FC-1 全景icon · FC-2 分段曝光拍摄信息 · FC-3 器材车时间线 · FC-4 单次快门对照有影 · 静电失败", "误指：水野/观察社搞鬼 · true_responsibility：全景拼接；各人传播/沉默/未及时说明", "relation：卷终 · 回收 A001–A004 · EXPERT_LOCK 仅水野无影", "科学样本：V2迁移/05_科学验证/A001-A005_机制科学验证清单_V0.2.md §A005"], "highlights": [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]}, "修改2稿": {"text": "《学堂趣事录》\n\n第1卷 · 觉得奇怪，就先观察\n\n单元 · （待定 · 工作名：全校都认错了人）\n\n========================\n\n五、午休后消失的影子\n\n----------------------\n\n\n「水野脚下…… **空的**？」\n\n\n四人的鞋边都有影。器材车的轮胎也有影。只有水野站着的那一块，像被挖走了一截。\n\n\n午休结束后，体育馆的大屏幕亮了。预展音乐低了一格，像给照片让路。\n\n\n全班合照慢慢铺满整面白墙。四十多个孩子站成三排。每个人都穿着相同的 **室内鞋**。每个人都朝镜头看。每个人都在照片里。\n\n\n体育馆穹顶把回声托高一层。侧门停着灰白 **器材车**，灯杆把长影投在地上。大屏前的五人 —— 光 **橙红导播背心**，志郎 **绿格+绿背心**，慧美 **黄开衫银框镜**，珣 **藏青外套** —— 都穿着 **上履き**，肩并肩站成一排。慧美笔记本皮上， **翘角+观察眼** 社徽像一枚小小的邀请。\n\n\n大屏边角还亮着公开日倒计时：十九分钟。\n\n\n预展合照上，五人肩并肩：伊藤光 · 松本志郎 · 加藤慧美 · 陸珣 · **水野真帆**。\n\n\n然后，有人 **咦** 了一声 —— 像序里那一声，只是晚了半拍。\n\n\n陸珣没看水野的脸。他看的是地面 —— 四人的鞋边都有影，只有水野站着的那一块，像被挖走了一截。光、志郎、慧美、陸珣和器材车的影子，都在。\n\n\n本子：**五人都在 · 仅一人无影**。\n\n\n大屏的光很亮。亮到大家先看见缺了什么，才想起五个人都在。\n\n\n议论比预展音乐 **还快**。\n\n\n「她带来厄运。」「上一案 偷东西的报应。」「观察社帮她遮丑吧？」\n\n\n有人把五案串成一条绳：广播 · 黑板 · 海报 · 抽屉 · 无影 —— 像早就写好的剧本。\n\n\n**八秒传播句**在走廊里自己成形：合照里只有一个人的影子不见了——大家都说是她干的。\n\n\n水野真帆站在大屏下，脸色发白。她没跑。像一跑，故事就更像真的。\n\n\n「我参加拍摄了。」她说。\n\n\n有人回答：「照片里有你，不等于你真的在。」\n\n\n这句话像一把钥匙。它把前四天所有怀疑一起打开了。\n\n\n慧美笔记本翻开，四栏格 **先写画面**：\n\n\n**已确认**：合照五人同框 · **仅水野脚下无影** · 四人+器材车+灯杆 **有影**\n\n\n**听说**：水野搞鬼 · 观察社合谋 · 公开日破坏\n\n\n志郎 **蹲** 下去看光脚下的影：「我有。」又看慧美：「她有。」看光：「他也有。」\n\n\n他也看器材车轮胎、灯杆底座 —— 影都在。不是「今天没太阳」 那种全无。\n\n\n轮到水野，地面空一块——像只挖走了她的那一截。\n\n\n「不是五人都没有。」志郎抬头，「是只有她。」\n\n\n这句话没能立刻压住谣言。谣言更快。\n\n\n「观察社写趣事，不写审判。」慧美声音稳，手却发白。\n\n\n志郎举平板：「先查 **怎么拍的**。」\n\n\n有男生嚷：「是静电！上一案里柜子震过！」\n\n\n志郎当场试：气球擦头发 · 靠近地面——影 **还在**。\n\n\n他又试湿地面 · 反光地板 · 镜头炫光 —— 影仍在。\n\n\n「失败。」志郎咧嘴，「静电 **洗不掉** 这一块。」\n\n\n慧美在 **趣事** 栏补一行：志郎对照静电 · 洗不掉 · 待查拍摄。\n\n\n慧美在仍不知道写：静电对照失败 · 待查拍摄 · 不是五人同时无影\n\n\n水野低声：「……不是我 **弄的**。」\n\n\n没人接不是。大家接的是只有她没影 —— 这就够了。\n\n\n陸珣没反驳静电。他只在本子写：对照失败 · 下一项拍摄。\n\n\n班主任敲栏杆：「二十分钟后预展。若不能说明，取消展示。」\n\n\n**事件钟**：二十分钟。\n\n社交钟：现在，连观察社也被编成共犯。\n\n\n陸珣看向大屏角落：一个小小的全景拍摄图标，像一颗不起眼的钉。\n\n\n陸珣要的是照片里的时间记录，不是谣言。\n\n\n平板里，合照分段曝光：10:52:03 · 10:52:05 · 10:52:07 —— 三段拼接。拍摄开始：13:12:08。拍摄结束：13:12:22。十四秒。不是一个瞬间。\n\n\n每一帧角上有曝光值——10:52:05比前后两帧亮0.3档——像侧光在那一秒挪了位置。\n\n\n「先别看人。」陸珣说，「看 **地面**。」\n\n\n在光与水野脚边，同一块有小裂纹的地砖出现了两次。画面左侧，书包带从一个学生肩上伸出，到中间突然消失，又在三十厘米外重新出现。\n\n\n「拼接缝。」志郎放大像素：「不是修图涂掉人——是扫到一半接下一半。」\n\n\n10:52:05 那一帧，水野真帆为志郎递器材而侧让半步；侧光变了，她脚下的阴影落在上一帧的地面区域。相邻帧覆盖时，只有她的那块影被吃掉了。\n\n\n志郎接上器材车日志：10:52 侧门经过 · 地面轻震 · 她刚好移动。\n\n\n本子：**全景 · 侧让 · 覆盖**。\n\n\n志郎把同一地点的单次快门试拍投上小屏：五人脚下皆有影。对照组成立。\n\n\n「不是她不带影。」陸珣轻声，「是这一张把她脚下的影弄丢了。」\n\n\n不是「我们几个移动」让五人全无影——只有水野在扫描到关键帧时侧让，只有她的地面阴影被相邻画面覆盖。\n\n\n「就算拍摄问题，」有人喊，「也是她故意站位！」\n\n\n故事已经拼完：A001 广播羞辱 · A002 志郎写字 · A003 慧美删稿 · A004 水野偷窃 · A005 无影合谋 —— 五件真事，一个假故事。\n\n\n走廊里有人把五案画成一条链：光 → 志郎 → 慧美 → 水野 → 观察社——像早就写好的犯人名单。\n\n\n陸珣把链拆开，重排成五行机制：误播 · 膜显 · 无实体 · 振动 · 拼接——没有一行写「合谋」。\n\n\n水野站在链的最末——不是因为她最该被指，是因为照片最会让人先看见缺什么。\n\n\n陸珣把五案记录夹摊在折叠桌：时间戳、膜边、空白底纸、倾斜水泡、拍摄信息——像五枚不同的钉。\n\n\n全班把五案串成一条链：水野和观察社用怪事破坏公开日。\n\n\n水野肩缩到最小。她没辩白五次指认里的任何一次。像累到不想再解释。\n\n\n陸珣开口，声音不大：「照片是真的。可你们讲的故事，还没有被证明。」\n\n\n剩下十二分钟。志郎把五个人排成一列，在体育馆侧门复现实验。\n\n\n侧门外就是上一案器材车过门槛的同一条线——五案的路在地理上也接上了。\n\n\n第一次拍摄，所有人保持不动。每个人都有影子。\n\n\n第二次，只有水野在扫描到一半时侧让半步，再站回原位。全景预览中，水野脚下的影子少了一半——光、志郎、慧美、陸珣的影仍在。\n\n\n第三次，水野侧让时用幕布短暂遮住高窗，让光线变化更明显。她的身体完整保留。脚下却是一块没有影子的地面。实验成功。\n\n\n第四次，对照：同一地点单次快门 —— 五人皆有影。\n\n\n光看四次预览：「不是她不带影。是这一张弄丢了她的那一块。」\n\n\n七分钟。\n\n\n慧美把四栏格摊大，像卷终清单：\n\n\n**已确认**：A001 旧录音误播+**失声日** · A002 膜显字 · A003 **无实体海报** · A004 振动滑入 · A005 全景 **仅水野** 阴影错位\n\n\n**听说**：五人合谋 · 水野厄运\n\n\n仍不知道：谁最先把五案串成一场破坏\n\n\n志郎指对照组：同一地点单次快门试拍——五人脚下皆有影。\n\n\n机制闭合：不是诅咒 · 不是静电 · 是拼接 + 水野侧让 + 光变。\n\n\n「就像第三案。」光说，「很多真实碎片拼成一个从来没有同时存在的整体。」\n\n\n「也像第一案。」慧美说，「先后发生的东西，被听成同一句。」\n\n\n「还像第二案。」志郎说，「表面留下了我们看不见的差异。」\n\n\n陸珣看向器材车：「第四案告诉我们，车经过哪里，会改变什么。」\n\n\n五案的答案第一次同时放在一张桌上。声音有时间。表面有记忆。人也有记忆。物品有路线。照片也不是没有时间的。\n\n\n前四案保存下来的记录，不再只是旧答案。它们成为第五案的公平线索。\n\n\n慧美把四栏改成卷终清单 —— 每一行只写机制短句，不写审判词：\n\n A001 · 旧文件误播 + **失声日** \n\n  A002 · 膜显字 · 未登记  \n\n A003 · **无实体** 海报 · 口述拼整 \n\n A004 · 倾斜振动 · 藏卡 **另论** \n\n A005 · 全景拼接 · 仅水野侧让丢影\n\n\n「……再拍一次。」水野声音发颤，「这一次，我 **不挪**。」\n\n\n全班决定重新拍一张。**这次不用全景拍摄。** 他们分成两组拍摄，再把两张照片并排展示，不假装所有人必须挤进同一个瞬间。\n\n\n光点头。志郎架平板，关掉全景拍摄。慧美数三。水野站定，脚不挪。\n\n\n第一组：光 · 志郎 · 慧美。第二组：陸珣 · 水野 · 班主任 **旁听**。\n\n\n快门。新合照上屏。\n\n\n五人都在。这一次，水野脚下也有影 —— 淡淡一块，像终于被允许站在地上。\n\n\n美纪拉着水野往中间走了一步。光站到另一边。志郎检查脚下地砖。慧美确认时间。陸珣没有先看镜头。他看了一眼每个人脚下。影子都在那里。\n\n\n有人 **小声**：「原来不是诅咒……」\n\n\n水野 没笑。她 只把鞋尖 往影里挪半寸。\n\n\n侧廊壁报栏，慧美贴 **四栏** 终稿：\n\n\n  我们看见的 / 我们以为的 / 后来证明的 / 仍然不知道的\n\n\n第三栏写着五案机制一行行短句。第四栏留白 —— 不替空栏填名字。\n\n\n她在我们看见的最末，用细笔写回一个名字：\n\n\n **水野真帆**\n\n\n名字旁边不写 「洗白」 不写 「无辜」 —— 只写名字回到并列。\n\n\n修复动作：全班重拍，慧美四栏壁报，水野名字并列写回，五案机制并列不串成阴谋。\n\n\n水野伸手，指尖碰了一下壁上自己名字。很轻。像确认影子和名字都还在。\n\n\n预展开始前三分钟，他们把三组图投上大屏幕：原始照片 · 无移动对照 · 移动与光线变化复现。\n\n\n志郎解释全景扫描和拼接。慧美展示时间线。光播放拍摄现场的环境声音：13:12:14，器材车轮子压过门槛，紧接着有人喊「向前让一下」——不是五个人一起躲，是水野在给志郎递器材。\n\n\n年级主任也来看拍摄信息。分段曝光三帧并排 —— 缝在水野脚边最明显。\n\n\n最后，水野站到屏幕前。「我参加了拍摄。」她说，「这张照片没有证明我没参加。」\n\n\n有人问：「那为什么 **只有她** 的影子不见了？」\n\n\n「因为车经过时，**只有我需要侧让**。」陸珣说，「照片没被修改。被软件拼接过。全景照片本来就是拼接。但不是观察社事后把人加进去。」\n\n\n**仅水野** 脚下无影 · 四人+车+灯杆 **有影** —— **不是** 五人 全无影的「集体消失」。\n\n\n班主任确认原文件和设备记录，允许展示继续。可事情还没有结束。\n\n\n年级主任问：「前四案为什么每次都由观察社给出解释？你们有没有选择只公布对自己有利的部分？」\n\n\n慧美拿出记录夹。「有。」\n\n\n所有人看向她。\n\n\n「第一案，我们先公布了录音拼接，却没有第一时间说光传播过未经确认的消息。」光点头。\n\n\n「第二案，我们证明志郎没写道歉，但他未经许可做实验，是后来才完整说明。」志郎点头。\n\n\n「第三案，我没有删海报，但我确实拿走了照片并保持沉默。」\n\n\n「第四案，水野没有拿三件失物，但藏了一张录音卡。」水野点头。\n\n\n慧美把记录夹翻到最后一页：「我们的解释没有造假。但我们每次都太急着证明『不是他』，没有先把『他到底做过什么』全部公开。这样会让别人觉得，我们只是在替朋友找理由。」\n\n\n观察社也有真实责任。不是伪造证据。是只顾把错误指控拆掉，却没有及时把真实责任放回去。\n\n\n陸珣说：「如果我们只说一个人没做过什么，却不说他真正做过什么，别人就会觉得真相少了一块。」\n\n\n年级主任 沉默几秒。几秒里体育馆只有预展音乐的底噪。\n\n\n年级主任没有停止观察社活动。他要求他们把之后的案件记录改成五栏：\n\n\n  我们看见的 · 我们以为的 · 后来证明的 · 仍然不知道的 · 当事人真正需要承担的\n\n\n公开日预展照常。器材车转下一班，地面轻轻震 —— 像提醒：怪事还会再来，误会也会。\n\n\n预展尾声，低年级停在壁报前读四栏—— 不全懂，但记住 「仍不知道」 四个字。\n\n\n活动结束后，光、慧美和志郎在观察社教室门口等陸珣。桌上放着一张临时社员申请表。\n\n\n申请表角压着案① 三周前彩排 打印条 —— 像书签，提醒 「时间」 第一。\n\n\n「这周已经结束了。」陸珣说。\n\n\n「所以才问你。」光说，「不是为了临时帮忙。」\n\n\n志郎指着申请表：「我们缺一个会先检查条件的人。」\n\n\n慧美补充：「也缺一个在大家已经得出结论以后，还敢说『这还没有被证明』的人。」\n\n\n「你们自己也会说。」「我们有时候说得太晚。」光承认。\n\n\n陸珣拿起笔。「我不是侦探。」「我们也不是。」慧美说，「我们是观察社。」「负责在怪事变成伤人的故事以前，给事实多一点时间。」\n\n\n陸珣在申请表上写下自己的名字。陸　珣。字写得不快。却没有停。\n\n\n慧美 递观察社笔记本角贴—— 眼睛+问号很小很小。\n\n\n志郎 念八秒句最后半句：「……大家都说是 她干的。」 念完自己摇头：「 下次要先写格子。」\n\n\n光补：「觉得奇怪，就先观察 —— 你已经观察一个月了。」\n\n\n水野从侧廊经过，停了一下，没说谢谢。只看了一眼壁上自己名字——像确认还在。\n\n\n陸珣 也看那名字。名字在第三栏和第一栏之间—— 不单独被贴在「听说」里。\n\n\n怪事不会伤人。误会会。所以，觉得奇怪，就先观察。\n\n\n侧廊 四月的风把壁报角掀起一丝—— 慧美用胶带压平。压平不是结束。是存档。\n\n（案⑤ 收束 · 卷终 · 第一单元完）\n\n\n---\n\n【读者可以试 · P06家庭实验】\n\n材料：手机全景/慢扫拍照功能 · 五人站一排 · 手电筒模拟侧光。\n\n步骤：第一次全员不动拍摄。第二次让 **中间一人** 在扫描到一半时侧让半步，同时用手电筒改变地面亮度，再站回原位。\n\n观察：是否可能出现「人在、影不在」？再用 **普通单次快门** 对照——影子是否都在？\n\n要点：照片可以真实，却不一定保存了同一个瞬间。全景照片本来就是拼接。\n\n---\n\n\n瑆笔记 · 第二真相\n\n----------------\n\n\n> 重新拍照以后，**她的**影子回来了。\n\n> 哥哥说，照片可以修，故事也要重看。\n\n> 可我觉得，真正回来的不是影子——  \n\n> 是他们终于又愿意 **站在一起**。\n\n\n今天，照片里有一个人没有影子。\n\n\n她明明站在那里，  \n\n却有人说：「照片里有你，不等于你真的在。」\n\n\n哥哥 **把** 五案记录排在桌上像五张卡片。\n\n\n卡片没有写「坏人」只写「机制」。\n\n\n我觉得，  \n\n第一单元 **最难** 的不是找到答案。\n\n\n是 在所有人都觉得已经有答案的时候，  \n\n还 肯把空栏留着。\n\n\n哥哥证明，  \n\n照片没有说谎。  \n\n可照片也没有把同一个瞬间完整留下来。\n\n\n它把十四秒里的许多小片段，  \n\n拼成了一张看起来只用了一秒的照片。\n\n\n前四天也是这样。  \n\n一句话、一行字、一张海报、几件失物，  \n\n每一样都是真的。\n\n\n可是大家把它们拼得太快，  \n\n就拼出了一个不存在的人：  \n\n一个故意说坏话、写道歉、删海报、偷东西、修改照片的人。\n\n\n哥哥说，  \n\n他们没有抓到幕后黑手。\n\n\n我觉得，他们抓到了一件更难抓的东西：  \n\n就是一个故事，  \n\n怎样在所有人都觉得自己有证据的时候，  \n\n悄悄变错。\n\n\n四月最后一个公开日周的夜里，陸瑆把五案画进一本「观察日记」——喇叭、黑板、空白格、抽屉、无影脚边各一页。\n\n\n她在无影页画了五个人——四个有影，一个脚边空。哥哥说：「不是五个人都没有。」她改了——只空水野姐姐那一块。\n\n\n我觉得，第一单元像五块拼图——每块都真，拼法错了就变成另一张图。\n\n\n重拍以后，拼图换了拼法——名字和影子都回到该在的地方。\n\n\n——第五案完——  \n\n——第一单元完——\n\n\n---\n\n【EDITOR · REVIEW_LOOP R3 · 2026-06-08】\n叙事层已 strip SC/FC 场头 · 场级对照见上方 G-SHOT-T 块 · A005\n\n\n---\n\n【EDITOR · PRODUCTION META · A005 · foot · R3 2026-06-08】\n【Hybrid Voice · V2.0 · A005】\n\n  · 案⑤《午休后消失的影子》\n\n  · 案号：A005 · Engine V2.0 · Campus Ripple\n\n  · 状态：G-CN_LOCK · LOCK aligned · Hybrid Voice v3 · 卷末瘦圈 2026-06-08\n\n  · 八秒句：合照里只有一个人的影子不见了——大家都说是她干的。\n\n  · 错误责任：水野带来厄运/观察社帮她遮丑；前四案解释是集体包庇。\n\n  · 真实责任：全景拼接+水野侧让致单人阴影错位；各人传播/沉默/未及时说明。\n\n  · FC概要：FC-1 全景icon · FC-2 分段曝光拍摄信息 · FC-3 器材车时间线 · FC-4 单次快门对照有影\n\n  · 钩子：卷终重拍 · 写回名字 · 陸珣正式入社 · 单元收束\n· 状态：REVIEW_LOOP_R3 · Hybrid Voice v3 · reader-flow 2026-06-08\n\n\n---\n\n【V2.0 场级对照 · G-SHOT-T ready】\n\nSC-01 投屏无影 · SC-02 诅咒议论 · SC-03 观察社/双倒计时\n\nSC-04 静电误推失败 · SC-05 拍摄信息时间线 · SC-06 误指峰值/五案串\n\nSC-07 卷级回收 · SC-08 重拍有影 · SC-09 四栏壁报 · SC-10 卷终\n\nFC-1 全景icon · FC-2 分段曝光拍摄信息 · FC-3 器材车时间线 · FC-4 单次快门对照有影 · 静电失败\n\n误指：水野/观察社搞鬼 · true_responsibility：全景拼接；各人传播/沉默/未及时说明\n\nrelation：卷终 · 回收 A001–A004 · EXPERT_LOCK 仅水野无影\n\n科学样本：V2迁移/05_科学验证/A001-A005_机制科学验证清单_V0.2.md §A005\n", "paragraphs": ["《学堂趣事录》", "第1卷 · 觉得奇怪，就先观察", "单元 · （待定 · 工作名：全校都认错了人）", "===================   <script>
    const DRAFT_KEYS = ['原稿', '修改1稿', '修改2稿'];
    let DATA = null;
    let currentCase = 'A001';
    let syncScroll = true;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderScoreArrow(obj) {
      if (!obj) return '<span class="value">—</span>';
      if (obj.before == null) return `<span class="value">${obj.after}</span>`;
      const delta = obj.delta;
      const cls = delta >= 0 ? 'delta-up' : 'delta-down';
      const sign = delta >= 0 ? '+' : '';
      return `<div class="score-arrow">
        <span class="before">${obj.before}</span>
        <span>→</span>
        <span class="after">${obj.after}</span>
        <span class="${cls}">(${sign}${delta})</span>
      </div>`;
    }

    function renderTags(tags) {
      return (tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    }

    function renderScores(sc) {
      const ep = sc.expert_panel;
      const rp = sc.reader_panel;
      return `
        <div class="score-grid">
          <div class="score-card">
            <div class="label">专家组 · 文学卷专家</div>
            ${renderScoreArrow(ep['文学卷专家'])}
          </div>
          <div class="score-card">
            <div class="label">专家组 · 机制/科学</div>
            <div class="value">${ep['机制科学']?.illustration_executability ?? '—'}</div>
            <div style="font-size:0.72rem;color:var(--muted)">${esc(ep['机制科学']?.note || '')}</div>
          </div>
          <div class="score-card">
            <div class="label">H · 幽默（专家→自评）</div>
            ${renderScoreArrow(ep['幽默_H'])}
          </div>
          <div class="score-card">
            <div class="label">C · 可爱（专家→自评）</div>
            ${renderScoreArrow(ep['可爱_C'])}
          </div>
          <div class="score-card">
            <div class="label">S · 表层（专家→自评）</div>
            ${renderScoreArrow(ep['表层_S'])}
          </div>
          <div class="score-card">
            <div class="label">读者群 · 卷读者</div>
            ${renderScoreArrow(rp['卷读者'])}
          </div>
          <div class="score-card">
            <div class="label">单元卷读者（汇总）</div>
            <div class="value">${rp.unit_reader ?? '—'}</div>
          </div>
        </div>
        <div class="e20-placeholder">
          <strong>E20 探针</strong> · 状态：${esc(rp.e20_probes?.status || 'NOT_RUN')}
          · 进度 ${esc(rp.e20_probes?.slots || '0/12')}
          · H1 笑过吗 / J1 想加入吗 / C1 角色记忆 — <em>placeholder，待真实试读</em>
        </div>
        <div class="good-bad">
          <div><h4>✓ 亮点</h4><ul>${(sc.good||[]).map(g=>`<li>${esc(g)}</li>`).join('')}</ul></div>
          <div><h4>△ 待验证</h4><ul>${(sc.bad||[]).map(g=>`<li>${esc(g)}</li>`).join('')}</ul></div>
        </div>
        <p style="margin-top:0.75rem;font-size:0.82rem;color:var(--muted)">${esc(sc.why||'')} · 建议：${esc(sc.recommend||'')}</p>
      `;
    }

    function renderChanges(changes, changelog) {
      let html = '';
      if (changelog) html += `<p style="font-size:0.82rem;margin-bottom:0.75rem;color:var(--muted)">${esc(changelog)}</p>`;
      html += '<ul class="changes-list">';
      for (const c of changes) {
        html += `<li>
          ${renderTags(c.tags)}
          <span class="dim">${esc(c.dimension || c.summary)}</span>
          ${c.before && c.after ? `<br><span style="color:var(--muted)">${esc(c.before)} → ${esc(c.after)}</span>` : ''}
        </li>`;
      }
      html += '</ul>';
      return html;
    }

    function renderDiff(caseData) {
      const stats = caseData.stats;
      const vm = caseData.version_mapping;
      let cols = '';
      for (const key of DRAFT_KEYS) {
        const draft = caseData.drafts[key];
        const vmInfo = vm[key];
        const sameBadge = vmInfo.same_as_原稿 ? '<span class="badge">同原稿</span>' : '';
        let body = '';
        if (key === '修改1稿' && vmInfo.same_as_原稿) {
          body = '<div class="para same-note">本案修改1稿与原稿相同<br>（R16 在修改2稿）</div>';
        } else {
          body = draft.paragraphs.map((p, i) => {
            const hl = draft.highlights[i] ? ' highlight' : '';
            return `<div class="para${hl}" data-idx="${i}">${esc(p)}</div>`;
          }).join('');
        }
        cols += `
          <div class="diff-col" data-col="${key}">
            <div class="diff-col-header">
              ${esc(key)} ${sameBadge}
              <span class="sub">${esc(vmInfo.label)} · <code>${esc(vmInfo.commit.slice(0,7))}</code></span>
            </div>
            <div class="diff-scroll">${body}</div>
          </div>`;
      }
      return `
        <div class="stats-bar">
          <span>汉字：原稿 ${stats.chars_原稿} · 改1 ${stats.chars_修改1稿} · 改2 ${stats.chars_修改2稿}</span>
          <span>高亮段：改1 vs 原稿 ${stats.changed_p1_vs_p0} · 改2 vs 改1 ${stats.changed_p2_vs_p1}</span>
        </div>
        <div class="diff-container" id="diff-container">${cols}</div>`;
    }

    function renderCase(caseData) {
      return `
        <div class="panels-row">
          <div class="panel" id="score-panel">
            <div class="panel-header" onclick="togglePanel('score-panel')">
              <h2>📊 打分 · 专家 / 读者群 / H·C·S</h2>
              <span class="chevron">▼</span>
            </div>
            <div class="panel-body">${renderScores(caseData.scores)}</div>
          </div>
          <div class="panel" id="changes-panel">
            <div class="panel-header" onclick="togglePanel('changes-panel')">
              <h2>📝 具体修改内容 · R16 global IP</h2>
              <span class="chevron">▼</span>
            </div>
            <div class="panel-body">${renderChanges(caseData.changes, caseData.scores.r16_changelog)}</div>
          </div>
        </div>
        ${renderDiff(caseData)}
      `;
    }

    function togglePanel(id) {
      document.getElementById(id)?.classList.toggle('collapsed');
    }
    window.togglePanel = togglePanel;

    function setupScrollSync() {
      const cols = document.querySelectorAll('.diff-scroll');
      if (cols.length < 2) return;
      let syncing = false;
      cols.forEach(col => {
        col.addEventListener('scroll', () => {
          if (!syncScroll || syncing) return;
          syncing = true;
          const ratio = col.scrollTop / (col.scrollHeight - col.clientHeight || 1);
          cols.forEach(c => {
            if (c !== col) c.scrollTop = ratio * (c.scrollHeight - c.clientHeight);
          });
          syncing = false;
        });
      });
    }

    function selectCase(id) {
      currentCase = id;
      const caseData = DATA.cases.find(c => c.id === id);
      if (!caseData) return;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.case === id);
      });
      document.getElementById('app').innerHTML = renderCase(caseData);
      setupScrollSync();
    }

    function showLoadError(detail) {
      document.getElementById('app').innerHTML =
        '<div class="loading">' +
        '<p><strong>未能加载对比数据</strong></p>' +
        '<p style="margin-top:0.75rem;font-size:0.85rem">' + detail + '</p>' +
        '<p style="margin-top:1rem;font-size:0.85rem">推荐：双击同目录 <code>打开对比UI.bat</code>（本地 HTTP，规避 file:// 与中文路径限制）</p>' +
        '<p style="margin-top:0.5rem;font-size:0.85rem">或先运行：<code>python 03_故事内容/tools/build_comparison_ui_data.py</code></p>' +
        '</div>';
    }

    function init() {
      DATA = window.__COMPARISON_DATA__;
      if (!DATA) {
        showLoadError('comparison_data.js 未加载（file:// 下含中文/括号路径时常见）。');
        return;
      }
      const g = DATA.version_mapping_global;
      document.getElementById('meta-line').textContent =
        `生成 ${DATA.generated_at} · R${DATA.scores_meta?.ralph_iter} · ${DATA.scores_meta?.method || ''}`;
      document.getElementById('version-legend').innerHTML = DRAFT_KEYS.map(k =>
        `<span><strong>${esc(k)}</strong>：${esc(g[k].meaning)} · <code>${esc(g[k].commit.slice(0,7))}</code></span>`
      ).join('');
      const tabsEl = document.getElementById('case-tabs');
      tabsEl.innerHTML = DATA.cases.map(c =>
        `<button class="tab${c.id==='A001'?' active':''}" data-case="${c.id}">${c.id} ${esc(c.title)}</button>`
      ).join('');
      tabsEl.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => selectCase(btn.dataset.case));
      });
      document.getElementById('sync-scroll').addEventListener('click', function() {
        syncScroll = !syncScroll;
        this.classList.toggle('active', syncScroll);
        this.textContent = syncScroll ? '🔗 同步滚动' : '⛓ 独立滚动';
      });
      document.getElementById('sync-scroll').classList.add('active');
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
        this.textContent = dark ? '🌙 深色' : '☀️ 浅色';
      });
      selectCase('A001');
    }

    function boot() {
      if (window.__COMPARISON_DATA__) {
        init();
        return;
      }
      const embed = document.getElementById('comparison-data-embed');
      if (embed && embed.textContent) {
        try {
          // eslint-disable-next-line no-eval
          eval(embed.textContent);
          if (window.__COMPARISON_DATA__) {
            init();
            return;
          }
        } catch (e) {
          showLoadError('内嵌数据解析失败：' + e.message);
          return;
        }
      }
      const ext = document.querySelector('script[src="comparison_data.js"]');
      if (ext) {
        ext.addEventListener('load', () => init());
        ext.addEventListener('error', () =>
          showLoadError('无法读取 comparison_data.js（file:// + 中文路径时浏览器常拦截）。'));
        if (ext.readyState === 'complete' || ext.getAttribute('data-loaded') === '1') {
          init();
        }
        return;
      }
      showLoadError('未找到数据文件。');
    }
    boot();
  </script>
