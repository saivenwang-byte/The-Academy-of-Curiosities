# ======================================================================
# 《学堂趣事录》角色蒸馏 YAML · Single Source of Truth
# The Academy of Curiosities — Character Scale System
# ======================================================================
# Version: 1.1.0 / Date: 2026-06-04 · 年级班级 V1.0
# 
# Schema: 每个角色 = identity + anchors + constraints + spectrum + voice + triggers + relations
# Usage:  创作时注入上下文 / 校验时逐句对照 / 新角色设计时做光谱定位
# ======================================================================

characters:

  # ===========================================================================
  # 01 · 伊藤光 — 发现者 / 连接者
  # ===========================================================================
  ito_hikaru:
    display_name: "伊藤 光"
    reading: "いとう ひかる / Itō Hikaru"
    id: "01"
    
    identity:
      grade: 5
      age: 11
      class: "5年2組"
      gender: male
      role: "发现者 · 连接者 · 行动发起者"
      persona_solo: "外向的敏锐者"
      core_trait: "用社交感染力串联所有人，力量不在逻辑而在关注"
      join_volume: 1
    
    anchors:
      visual:
        - "圆脸 + 浅褐色月牙笑眼"
        - "黑短发整齐"
        - "冬季橙色围巾（妈妈织的，标志）"
      action:
        - "发现怪事时：突然停步 + 食指竖唇前 + 瞪眼 + 转身找人"
        - "说话时手势丰富——指窗外、比划大小、模仿走路"
      props:
        - "浅灰双肩包 + 各地挂件（葛西店贴纸/文化祭徽章/朋友钥匙扣）"
    
    constraints:
      never_says:
        - "你错了"
        - "听我的"
        - "我不确定"（他会换个方式表达不确定，但不直接说）
      never_does:
        - "忽视一个明显不对劲的细节"
        - "在团队里偏袒某个人"
        - "冷静分析超过三分钟"
    
    spectrum:
      extroversion: 0.95     # 全队最外向
      action_bias: 0.80      # 倾向先行动
      focus_depth: 0.30      # 涉猎广泛但不深
      social_warmth: 0.90    # 社交温度最高
      talkativeness: 0.85    # 话多
      emotional_expression: 0.70  # 情绪外显但不夸张
    
    voice:
      tempo: "偏快"
      register: "清亮，尾音常上扬"
      sentence_length: "中等偏短，10-20字"
      filler: "「ね」「さ」「よ」常做句尾"
      catchphrase: "「喔！何か見つけた？」"
      dialect: "标准日语（名古屋出生长大，但无浓重方言）"
    
    triggers:
      - "看到不公时会变严肃"
      - "被真诚感谢时反而会害羞"
    
    relations:
      kato_keimi: "翻译她的严谨 → 帮志郎理解她在说什么"
      matsumoto_shiro: "搭档——两人一起冲出去，但光负责发现，志郎负责动手"
      riku_shun: "发现他、理解他、向大家解释他的沉默"
      yamamoto_risa: "温和接纳——不催促她开口，但会留空间等她说话"
      riku_hikaru: "友善长辈感——尊重她的观察，有时向她确认细节"


  # ===========================================================================
  # 02 · 加藤慧美 — 实验者 / 证据校准者
  # ===========================================================================
  kato_keimi:
    display_name: "加藤 慧美"
    reading: "かとう けいみ / Katō Keimi"
    id: "02"
    
    identity:
      grade: 5
      age: 11
      class: "5年1組"
      gender: female
      role: "情绪观察 · 采访温度 · 记录整理"
      persona_solo: "内敛的剖析者"
      core_trait: "把混乱线索理成可核对的事实；用温度避免故事变硬"
      join_volume: 1
    
    anchors:
      visual:
        - "圆脸偏椭圆 + 浅琥珀色眼睛"
        - "银框圆眼镜（四年级配的）+ 镜片后微微眯眼（专注习惯）"
        - "黑直发 / 低马尾 / 刘海偏分 / 银色细发夹"
      action:
        - "思考时食指推眼镜鼻梁 → 手指在空中停半秒"
        - "做实验时手极稳——倒水不洒、夹试纸不歪"
      props:
        - "深棕书包 + 硬壳实验记录本（每页编号）+ 银色自动铅笔 + 小卷尺"
        - "书包外侧口袋：一包纸巾（给志郎准备的）"
    
    constraints:
      never_says:
        - "你错了"（替代："まだ確かめてない"——还没验证过）
        - "我确定"（替代："記録と同じ"——和记录一样）
        - "太厉害了！"（替代：推眼镜 + "……うん"）
        - "我来总结一下"（禁止班长腔）
        - 长串专业术语（替代：让陸瑆笔记或附录解释）
      never_does:
        - "在证据不足时下结论"
        - "当面揭穿别人让难堪"
        - "说教或替全队做决定"
        - "情绪崩溃或大哭大笑"
    
    spectrum:
      extroversion: 0.40
      action_bias: 0.25      # 宁可多测一次也不急着冲
      focus_depth: 0.85      # 专注度仅次于陸珣
      social_warmth: 0.50    # 不冷，但行动比话语暖
      talkativeness: 0.35    # 话少
      emotional_expression: 0.25  # 情绪极克制
    
    voice:
      tempo: "中等偏慢"
      register: "平稳，无大起伏"
      sentence_length: "短（6-15字），一句就是一句"
      filler: "「……うん」「まだ」常做回应"
      catchphrase: "「ちょっと待って——まだ確かめてない」"
      dialect: "标准日语"
    
    triggers:
      - "实验数据和预测一致时 → 嘴角动一下（'果然'）"
      - "被志郎的莽撞逗到 → 低头轻轻笑一下，迅速恢复"
      - "被夸奖 → 推眼镜，头偏一边，耳尖红"
    
    relations:
      ito_hikaru: "接收他的发现—第一反应是'どこ？'+ 掏记录本，不是长篇分析"
      matsumoto_shiro: "纠正+关心——从不说'你错了'，说'还没验证'。书包里纸巾是给他准备的"
      riku_shun: "记关键词——如果他讲太快，只问'……それ、今の謎と関係ある？'"
      yamamoto_risa: "逻辑对接——把理紗捕捉的感官异常放到实验框架里验证"
      riku_hikaru: "悄悄惊讶——發現陸瑆的笔记整理出了她自己没注意到的因果关系"


  # ===========================================================================
  # 03 · 松本志郎 — 行动者 / 动手专家
  # ===========================================================================
  matsumoto_shiro:
    display_name: "松本 志郎"
    reading: "まつもと しろう / Matsumoto Shirō"
    id: "03"
    
    identity:
      grade: 5
      age: 11
      class: "5年3組"
      gender: male
      role: "资料查证 · 知识验证 · 动手执行"
      persona_solo: "外显的行动派"
      core_trait: "想到就做——行动永远快于思考。智慧不在脑里在手上"
      join_volume: 1
    
    anchors:
      visual:
        - "圆脸但结实（咬肌发达）+ 小麦色皮肤（晒的）"
        - "黑发根根竖起像静电打过"
        - "黑圆眼——眼神直愣没有算计"
        - "鼻头几颗雀斑"
      action:
        - "困惑时右手掌挠后脑勺 + 呲牙 + えーっと…"
        - "想到时右拳捶左掌心 + よし！"
        - "拧螺丝时屏住呼吸 + 舌尖微伸"
      props:
        - "深绿双肩包（航模社纪念款/拉链头坏一个用回形针替代）"
        - "侧袋：螺丝刀套装 + 铁片铝片 + 迷你合金小汽车"
        - "主舱：航模零件 + 机器人骨架 + 尼龙绳 + 绝缘胶带"
    
    constraints:
      never_says:
        - "我觉得没希望了"
        - "算了不做了"
        - 长段的分析或理论（超过三句就开始挠头）
        - 恶意的嘲笑或讽刺
      never_does:
        - "记仇——被反驳后挠头说'そうか'，立刻投入新行动"
        - "静坐超过五分钟——除非在做精细手工"
        - "（精细手工时例外——可以纹丝不动很久）"
    
    spectrum:
      extroversion: 0.85
      action_bias: 0.95      # 全队行动力最高
      focus_depth: 0.20      # 涉猎不深（但手上能做出来）
      social_warmth: 0.75    # 真诚不加修饰
      talkativeness: 0.70    # 话多但句子短
      emotional_expression: 0.80  # 情绪全写在脸上
    
    voice:
      tempo: "快，句子短"
      register: "声如洪钟，语气词多"
      sentence_length: "极短（3-8字），少于三句"
      filler: "「何だこれ？」「見に行こう！」「そうか！」"
      catchphrase: "「見に行こう！」"
      dialect: "标准日语（妈妈是名古屋人，偶尔冒出'でら'）"
    
    triggers:
      - "被加藤指出错误 → 愣半秒 + 挠头 + 不好意思笑（从不不服）"
      - "遇到需要动手解决的问题 → 眼睛发光，已经开始掏工具"
    
    relations:
      ito_hikaru: "搭档——光一发现，志郎就冲"
      kato_keimi: "最怕她也最信她——被指出错误从不不服"
      riku_shun: "不太理解陸珣的沉默——但不反感，知道他有用"
      yamamoto_risa: "护着她——觉得她太安静需要被照顾，但嘴上不说"
      riku_hikaru: "友善但不太懂她的世界——偶尔问'你一直在写什么？'"


  # ===========================================================================
  # 04 · 陸珣 — 微观猎人 / 领域专家 ★ 男主人公
  # ===========================================================================
  riku_shun:
    display_name: "陸 珣"
    reading: "りく しゅん / Riku Shun"
    id: "04"
    
    identity:
      grade: 5
      age: 11
      class: "5年2組"
      gender: male
      role: "微观猎人 · 领域专家 · 男主人公 · Vol1 新社员"
      persona_solo: "钝感的专注者"
      core_trait: "日常世界迟钝话少；领域世界骤然精准。不觉得自己厉害——以为谁都能做到"
      join_volume: 1
      backstory: "一周前全家从大阪搬到名古屋（父亲设计事务所搬迁）"
    
    anchors:
      visual:
        - "椭圆脸 + 肤色偏白（树荫下的斑驳白）"
        - "深棕短发 / 刘海遮右眉 / 后脑勺常翘一小撮"
        - "深褐单眼皮细长眼—日常眼神平静疏离"
        - "观察时眼神骤然聚焦（最迷人瞬间）"
      action:
        - "蹲下观察：身体蜷起 + 左手撑膝 + 右手靠近目标 + 手指极稳"
        - "紧张时左手摸书包侧袋（放收集管——安全锚点）"
        - "被妹妹叫住：转身弯腰（她矮）+ 表情从钝变温和"
      props:
        - "深蓝尼龙双肩包（功能型/微微褪色）"
        - "侧袋：迷你温度计（真用）"
        - "拉链：放大镜挂坠"
        - "包内：手绘观察笔记本 + 收集管 + 小镊子"
    
    constraints:
      never_says:
        - "我觉得"（替代：沉默，或直接说事实）
        - "对不起"（在非严重错误时不主动道歉——不是不认错，是觉得没做错什么）
        - "谢谢"（被夸奖时不说，替代："……そうかな"）
        - 超过三句的连续解释（一旦发现被盯着看就停）
      never_does:
        - "第一个发现日常异常"（那是伊藤光的领域）
        - "主动和陌生人说话"
        - "在非专业领域发表意见"
        - "情绪外露"（除了面对陸瑆时微微温和）
    
    spectrum:
      extroversion: 0.05     # 全队最内向
      action_bias: 0.15      # 几乎不主动行动
      focus_depth: 1.00      # 领域内专注深度最高
      social_warmth: 0.15    # 社交温度最低（但非冷漠——是注意力不在人身上）
      talkativeness: 0.05    # 话极少——单音节回应为主
      emotional_expression: 0.05  # 几乎面无表情
    
    interests_canon:
      - "收集昆虫并研究生活习性与用途"
      - "自家花园果树与鸟"
      - "车库看爸爸修车（机械兴趣来源）"
      - "弹钢琴与声音"
      - "科学杂志（机器人/航天/汽车）"
    
    voice:
      tempo: "日常极慢/单音节；领域内骤然加快"
      register: "日常低沉含糊；领域内精确清晰"
      sentence_length: "日常1-3字（うん/そう/違う）；领域内中等（8-15字）"
      filler: "几乎不用——沉默就是他的填充"
      catchphrase: "「そこにある。」"
      dialect: "标准日语（原大阪出身，名古屋生活）"
    
    triggers:
      - "话题进入昆虫/机械/声学领域 → 语速加快 + 眼神发亮 + 用词精确"
      - "发现所有人盯着他 → 声音戛然而止 + 耳尖红 + 低头"
      - "陸瑆叫他 → 温和度提升50%"
    
    relations:
      ito_hikaru: "被邀请——光看到了别人没看到的：陸珣笔记本里的东西"
      kato_keimi: "借给她笔记本——她帮他验证直觉"
      matsumoto_shiro: "沉默辅助——志郎不需要理解他，只需要他的铝片"
      yamamoto_risa: "安静共处——两个最安静的人，在一起不用说话"
      riku_hikaru: "唯一的例外——只在她面前会多说几句话"
      nakatani_ki: "无声默契——陸珣蹲下，中谷琦已经举起相机"


  # ===========================================================================
  # 05 · 山本理紗 — 感知者
  # ===========================================================================
  yamamoto_risa:
    display_name: "山本 理紗"
    reading: "やまもと りさ / Yamamoto Risa"
    id: "05"
    
    identity:
      grade: 5
      age: 11
      class: "5年4組"
      gender: female
      role: "感知敏锐者 · 秩序/审美/物品细节"
      persona_solo: "沉默的捕捉者"
      core_trait: "感官超越常人——能捕捉别人忽略的颜色/光影/声音。Vol1 隐藏，后期进主线"
      join_volume: 11
    
    anchors:
      visual:
        - "鹅蛋脸 + 肤色白皙（半透明/可见血管）"
        - "茶褐丹凤眼 / 眼尾微挑 / 眼神迷离（在同时接收太多信息）"
        - "身形纤细 + 走路几乎无声"
      action:
        - "用手触摸不同材质——墙苔/锈铁/玻璃/树皮（用指尖确认，不是用眼睛）"
        - "听到微弱声音时：偏头 + 眼神凝固 + 耳朵朝向声源（像调谐中的收音机）"
      props:
        - "A5 布面速写本（深灰蓝亚麻封面）"
        - "自制色卡本（每页一色 + 标注色相/明度/饱和度——自制符号）"
    
    constraints:
      never_says:
        - "我觉得是这个原因"（替代："色が、違う"——只陈述她看到的）
        - "我确定"（替代：不说话，用色卡比对给你看）
        - 长篇解释（她的贡献是一句话+一个指向）
      never_does:
        - "大声说话或成为中心"
        - "在没有被问到时主动解释"
        - "被催促时慌张——只是更沉默"
    
    spectrum:
      extroversion: 0.10
      action_bias: 0.20
      focus_depth: 0.95      # 感官深度接近满分
      social_warmth: 0.30
      talkativeness: 0.05    # 全队话最少
      emotional_expression: 0.10
    
    voice:
      tempo: "极慢——仿佛确认每个字的准确性后才放出"
      register: "轻柔"
      sentence_length: "极短（3-8字），陈述句多疑问句少"
      filler: 不使用
      catchphrase: "「色が、違う。」"
      dialect: "标准日语"
    
    triggers:
      - "看到完美的色彩过渡或听到和弦共鸣 → 嘴角浮现不为人察觉的微笑"
      - "被夸奖 → 低头让刘海遮眼 + 耳尖泛粉"
      - "需要走进黑暗/触摸腐烂/靠近苔藓 → 毫不犹豫上前——那是她的领域"
    
    relations:
      ito_hikaru: "被温和接纳——光不催促她，但留空间等她开口"
      kato_keimi: "依赖她的逻辑框架——慧美把理紗的捕捉变成可验证的假设"
      matsumoto_shiro: "被保护——志郎觉得她太安静需要被照顾"
      riku_shun: "安静共处——两个最安静的人"
      riku_hikaru: "互相尊重——两人都懂'安静'不是'冷漠'"


  # ===========================================================================
  # 06 · 陸瑆 — 记录者 / 温柔一刀 ★ 女主人公
  # ===========================================================================
  riku_hikaru:
    display_name: "陸 瑆"
    reading: "りく ひかる / Riku Hikaru"
    id: "06"
    
    identity:
      grade: 4
      age: 10
      class: "4年2組"
      gender: female
      role: "记录者 · 《学堂趣事录》作者 · 非社员 · 女主人公"
      persona_solo: "安静的洞察者"
      core_trait: "不喜欢昆虫、喜欢看人。魔术看一遍能逆推手法。对哥哥信任但不盲从"
      join_volume: "全卷（每卷结尾笔记）"
    
    anchors:
      visual:
        - "圆润脸型+婴儿肥 / 黑短发刚好过肩 / 刘海整齐"
        - "深褐圆眼/双眼皮——扫视型眼神（先看眼→手→碰过的东西/1-2秒读完）"
        - "鼻翼淡淡雀斑（凑近才看到）"
        - "嘴角自然微向上"
      action:
        - "听人说话时头微偏+快速扫视对方脸→手→物品"
        - "抱笔记本——左手托底/右手拿笔/笔尾偶尔轻点下巴"
        - "哥哥膝盖沾泥→递纸巾→退半步等（不碰虫）"
      props:
        - "牛皮纸封面线圈本（A5/封面磨损起毛）"
        - "银色自动铅笔（哥哥送的生日礼物/握笔处已磨亮）"
    
    constraints:
      never_says:
        - "哥哥好厉害！"（替代："兄はああ見えて、ちゃんと見てる"）
        - "我觉得你们应该……"（她不等被问——她写下来）
        - 公开纠正哥哥（私下——早餐桌上淡淡说）
        - 说虫子可爱/想摸虫子（她不喜欢虫子——递纸巾但保持距离）
      never_does:
        - "参与现场破案"（她的功能是笔记，不是破案）
        - "在哥哥被夸时代替谦虚"（她只是低头继续写）
        - "碰虫子"（等了六年没碰过）
    
    spectrum:
      extroversion: 0.25
      action_bias: 0.10
      focus_depth: 0.90      # 对人/逻辑的专注极深
      social_warmth: 0.55    # 温和但不外露
      talkativeness: 0.15    # 话少——说出来的都是关键的
      emotional_expression: 0.20  # 克制——但笔记里是另一个世界
    
    voice:
      tempo: "平缓，每个字清晰"
      register: "轻柔、清亮、确定性——和哥哥的含糊低沉完全相反"
      sentence_length: "中等（8-15字），笔记里更长"
      filler: 不使用
      catchphrase: "「ちょっと待って——順番が、たぶん逆。」"
      dialect: "标准日语"
    
    triggers:
      - "发现逻辑漏洞 → 不立即开口，先写下来"
      - "哥哥被夸 → 低头继续写，手指出卖心情——握笔的手指收紧"
    
    relations:
      riku_shun: "信任但不盲从。对他的话：先点头，再自己判断。在笔记里写满钦佩，但早餐桌上会轻轻纠正"
      ito_hikaru: "观察他如何'连接'所有人——笔记里有对他的行为分析"
      kato_keimi: "钦佩——笔记里叫她'加藤さん'"
      matsumoto_shiro: "旁观——偶尔写'志郎君今天又跑出去了'"


